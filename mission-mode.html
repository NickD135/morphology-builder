<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prefix Power-Up</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --panel:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --orange:#f59e0b;
      --orange-dark:#d97706;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#60a5fa;
      --purple:#c084fc;
    }
    
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 18px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
    }

    .brand .icon{
      width:34px;
      height:34px;
      border-radius:10px;
      background:var(--orange);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .hud{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      background:#fff7ed;
      color:#92400e;
      border:1px solid #fed7aa;
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      font-size:14px;
    }

    .backBtn{
      border:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .energyCard,
    .missionCard,
    .gameCard{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
    }

    .label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:var(--muted);
      font-weight:800;
      margin-bottom:10px;
    }

    .energyRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-weight:800;
    }

    .bar{
      width:100%;
      height:16px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .barFill{
      height:100%;
      width:100%;
      background:linear-gradient(90deg,#ef4444 0%, #f59e0b 50%, #22c55e 100%);
      transition:width .2s linear;
    }

    h1,h2,p{
      margin:0;
    }

    .missionBadge{
      display:inline-block;
      background:#fef3c7;
      color:#92400e;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:12px;
    }

    .missionTitle{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .missionSub{
      color:var(--muted);
      font-weight:600;
    }

    .challengeTop{
      text-align:center;
      margin-bottom:22px;
    }

    .challengeTop .mini{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    .challengeTop .miniSub{
      color:var(--muted);
      font-weight:700;
      margin-top:6px;
    }

    .wordArea{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin:30px 0 20px;
    }

    .dropZone{
      width:160px;
      height:110px;
      border:4px dashed #c7d2fe;
      border-radius:24px;
      background:#eef2ff;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .dropZoneText{
      font-size:40px;
      font-weight:900;
      color:#a5b4fc;
      letter-spacing:.05em;
    }

    .baseWord{
      font-size:72px;
      line-height:1;
      font-weight:900;
      color:#1f2a44;
    }

    .baseMeaning{
      text-align:center;
      color:var(--muted);
      font-weight:700;
      margin-bottom:28px;
    }

    .options{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin:10px 0 22px;
    }

    .bubbleBtn{
      width:120px;
      height:120px;
      border-radius:999px;
      border:4px solid;
      background:#fff;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
      animation:float 3s ease-in-out infinite;
    }

    .bubbleBtn:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 24px rgba(0,0,0,.12);
    }

    .bubbleBtn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .bubbleBtn.blue{ border-color:var(--blue); color:#2563eb; }
    .bubbleBtn.green{ border-color:#4ade80; color:#16a34a; }
    .bubbleBtn.purple{ border-color:var(--purple); color:#9333ea; }
    .bubbleBtn.orange{ border-color:#fdba74; color:#ea580c; }

    .bubbleInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      height:100%;
      width:100%;
      padding:8px;
      text-align:center;
    }

    .bubbleInner span{
      font-size:28px;
      font-weight:900;
    }

    .bubbleInner small{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      line-height:1.25;
    }

    .feedback{
      min-height:28px;
      text-align:center;
      font-size:24px;
      font-weight:900;
    }

    .feedback.ok{ color:var(--green); }
    .feedback.bad{ color:var(--red); }

    .subFeedback{
      min-height:26px;
      text-align:center;
      color:var(--muted);
      font-weight:700;
      margin-top:4px;
    }

    .actionRow{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .secondaryBtn,
    .primaryBtn{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-weight:800;
      cursor:pointer;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .secondaryBtn{
      background:#fff;
      border:1px solid var(--line);
      color:#6b7280;
    }

    .primaryBtn{
      background:var(--orange);
      color:#fff;
      box-shadow:0 10px 24px rgba(245,158,11,.25);
    }

    .flashSuccess{
      background:#ecfdf5;
      border-color:#4ade80;
    }

    .flashFail{
      background:#fef2f2;
      border-color:#f87171;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }

    @media (max-width:700px){
      .baseWord{ font-size:54px; }
      .dropZone{ width:130px; height:95px; }
      .dropZoneText{ font-size:30px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="icon">⚡</div>
        <div>
          <div>Prefix Power-Up</div>
          <div style="font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:.14em;">Mission Mode</div>
        </div>
      </div>

      <div class="hud">
        <div class="pill" id="streakPill">Streak: 0</div>
        <div class="pill" id="scorePill">0 XP</div>
        <button class="backBtn" onclick="window.location.href='index.html'">Back to Builder</button>
      </div>
    </div>

    <div class="energyCard">
      <div class="label">Energy level</div>
      <div class="energyRow">
        <span></span>
        <span id="fuelLabel">100%</span>
      </div>
      <div class="bar">
        <div class="barFill" id="fuelBar"></div>
      </div>
    </div>

    <div class="missionCard">
      <div class="missionBadge">Active mission</div>
      <div class="missionTitle">Choose the best prefix</div>
      <div class="missionSub">Match a prefix to a base word. Correct answers build streak and XP. Wrong answers reduce energy.</div>
    </div>

    <div class="gameCard">
      <div class="challengeTop">
        <div class="mini">Prefix challenge</div>
        <div class="miniSub">Choose the best prefix for this base word.</div>
      </div>

      <div class="wordArea">
        <div class="dropZone" id="prefixDropZone">
          <div class="dropZoneText" id="dropZoneText">____</div>
        </div>
        <div class="baseWord" id="word">ACT</div>
      </div>

      <div class="baseMeaning" id="baseMeaning">Base meaning: do</div>

      <div class="options" id="options"></div>

      <div class="feedback" id="feedback"></div>
      <div class="subFeedback" id="subFeedback"></div>

      <div class="actionRow">
        <button class="secondaryBtn" id="recalibrateBtn" type="button">Recalibrate</button>
        <button class="primaryBtn" id="skipBtn" type="button">Skip</button>
      </div>
    </div>
  </div>
<script>
  const PREFIXES = [
    { id:"ad", form:"ad", meaning:"towards; to", meaningPattern:"towards {base}", allowedPos:["noun","adj","verb"] },
    { id:"anti", form:"anti", meaning:"against", meaningPattern:"against {base}", allowedPos:["noun","adj","verb"] },
    { id:"de", form:"de", meaning:"undo; remove; down", meaningPattern:"remove or undo {base}", allowedPos:["verb"] },
    { id:"dis", form:"dis", meaning:"not; opposite; apart", meaningPattern:"not or opposite of {base}", allowedPos:["noun","adj","verb"] },
    { id:"in", form:"in", meaning:"not; into", meaningPattern:"not {base}", allowedPos:["adj","verb"] },
    { id:"inter", form:"inter", meaning:"between", meaningPattern:"between {base}", allowedPos:["noun","adj","verb"] },
    { id:"mis", form:"mis", meaning:"wrong", meaningPattern:"wrongly {base}", allowedPos:["verb"] },
    { id:"non", form:"non", meaning:"not", meaningPattern:"not {base}", allowedPos:["noun","adj"] },
    { id:"over", form:"over", meaning:"too much", meaningPattern:"too much {base}", allowedPos:["verb","adj"] },
    { id:"post", form:"post", meaning:"after", meaningPattern:"after {base}", allowedPos:["noun","adj"] },
    { id:"pre", form:"pre", meaning:"before", meaningPattern:"before {base}", allowedPos:["noun","adj","verb"] },
    { id:"re", form:"re", meaning:"again", meaningPattern:"{base} again", allowedPos:["verb"] },
    { id:"sub", form:"sub", meaning:"under; below", meaningPattern:"under or below {base}", allowedPos:["noun","adj","verb"] },
    { id:"super", form:"super", meaning:"above; beyond", meaningPattern:"above or beyond {base}", allowedPos:["noun","adj","verb"] },
    { id:"trans", form:"trans", meaning:"across", meaningPattern:"across {base}", allowedPos:["noun","adj","verb"] },
    { id:"un", form:"un", meaning:"not", meaningPattern:"not {base}", allowedPos:["adj","verb"] },
    { id:"under", form:"under", meaning:"below", meaningPattern:"below {base}", allowedPos:["noun","adj","verb"] }
  ];

  const BASES = [
    { id:"act", form:"act", meaning:"do", pos:["verb","noun"] },
    { id:"appear", form:"appear", meaning:"come into view", pos:["verb"] },
    { id:"care", form:"care", meaning:"look after; attention", pos:["verb","noun"] },
    { id:"connect", form:"connect", meaning:"join together", pos:["verb"] },
    { id:"construct", form:"construct", meaning:"build", pos:["verb"] },
    { id:"create", form:"create", meaning:"make", pos:["verb"] },
    { id:"direct", form:"direct", meaning:"guide; control", pos:["verb","adj"] },
    { id:"form", form:"form", meaning:"make; shape", pos:["verb","noun"] },
    { id:"legal", form:"legal", meaning:"allowed by law", pos:["adj"] },
    { id:"manage", form:"manage", meaning:"control; run", pos:["verb"] },
    { id:"measure", form:"measure", meaning:"find size or amount", pos:["verb","noun"] },
    { id:"move", form:"move", meaning:"go from one place to another", pos:["verb"] },
    { id:"place", form:"place", meaning:"put in position", pos:["verb","noun"] },
    { id:"play", form:"play", meaning:"take part in an activity", pos:["verb","noun"] },
    { id:"power", form:"power", meaning:"strength; energy", pos:["noun"] },
    { id:"read", form:"read", meaning:"look at words and understand them", pos:["verb"] },
    { id:"regular", form:"regular", meaning:"usual; even pattern", pos:["adj"] },
    { id:"respect", form:"respect", meaning:"treat well; value", pos:["verb","noun"] },
    { id:"return", form:"return", meaning:"go back", pos:["verb"] },
    { id:"view", form:"view", meaning:"look at", pos:["verb","noun"] },
    { id:"write", form:"write", meaning:"put words on a page", pos:["verb"] }
  ];

  let score = 0;
  let streak = 0;
  let fuel = 100;
  let currentQuestion = null;
  let buttonsLocked = false;
  let fuelInterval = null;

  const wordEl = document.getElementById("word");
  const baseMeaningEl = document.getElementById("baseMeaning");
  const optionsEl = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");
  const subFeedbackEl = document.getElementById("subFeedback");
  const scorePillEl = document.getElementById("scorePill");
  const streakPillEl = document.getElementById("streakPill");
  const fuelBarEl = document.getElementById("fuelBar");
  const fuelLabelEl = document.getElementById("fuelLabel");
  const dropZoneEl = document.getElementById("prefixDropZone");
  const dropZoneTextEl = document.getElementById("dropZoneText");

  function shuffleArray(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function getPrefixLabel(prefix) {
    return (prefix.form || "").toUpperCase() + "-";
  }

  function getBaseLabel(base) {
    return (base.form || "").toUpperCase();
  }

  function updateHud() {
    scorePillEl.textContent = `${score} XP`;
    streakPillEl.textContent = `Streak: ${streak}`;
    fuelBarEl.style.width = `${Math.max(fuel, 0)}%`;
    fuelLabelEl.textContent = `${Math.max(Math.round(fuel), 0)}%`;
  }

  function isCompatible(prefix, base) {
    const prefixPos = prefix.allowedPos || ["noun","adj","verb"];
    const basePos = base.pos || ["noun","adj","verb"];
    return basePos.some(pos => prefixPos.includes(pos));
  }

  function buildTargetMeaning(prefix, base) {
    const pattern = prefix.meaningPattern || "{base} " + prefix.meaning;
    return pattern.replace("{base}", base.meaning);
  }

  function generateQuestion() {
    const base = BASES[Math.floor(Math.random() * BASES.length)];
    const compatible = PREFIXES.filter(prefix => isCompatible(prefix, base));
    const correct = compatible[Math.floor(Math.random() * compatible.length)];

    const wrongOptions = shuffleArray(
      PREFIXES.filter(p => p.id !== correct.id)
    ).slice(0, 2);

    return {
      base,
      correct,
      targetMeaning: buildTargetMeaning(correct, base),
      options: shuffleArray([correct, ...wrongOptions])
    };
  }

  function resetDropZone() {
    dropZoneEl.classList.remove("flashSuccess", "flashFail");
    dropZoneTextEl.textContent = "____";
    dropZoneTextEl.style.color = "#a5b4fc";
  }

  function loadQuestion() {
    if (fuel <= 0) return;

    buttonsLocked = false;
    currentQuestion = generateQuestion();

    wordEl.textContent = getBaseLabel(currentQuestion.base);
    baseMeaningEl.innerHTML = `
      <strong>Base meaning:</strong> ${currentQuestion.base.meaning}<br>
      <strong>Target meaning:</strong> ${currentQuestion.targetMeaning}
    `;

    feedbackEl.textContent = "";
    feedbackEl.className = "feedback";
    subFeedbackEl.textContent = "";
    resetDropZone();

    optionsEl.innerHTML = "";

    currentQuestion.options.forEach((option, index) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = `bubbleBtn ${["blue","green","purple","orange"][index % 4]}`;
      btn.style.animationDelay = `${index * 0.18}s`;

      const inner = document.createElement("div");
      inner.className = "bubbleInner";

      const main = document.createElement("span");
      main.textContent = getPrefixLabel(option);

      const small = document.createElement("small");
      small.textContent = option.meaning;

      inner.appendChild(main);
      inner.appendChild(small);
      btn.appendChild(inner);

      btn.addEventListener("click", () => checkAnswer(option));
      optionsEl.appendChild(btn);
    });
  }

  function lockButtons() {
    optionsEl.querySelectorAll("button").forEach(btn => btn.disabled = true);
  }

  function checkAnswer(choice) {
    if (buttonsLocked || fuel <= 0) return;

    buttonsLocked = true;
    lockButtons();

    dropZoneTextEl.textContent = getPrefixLabel(choice);

    if (choice.id === currentQuestion.correct.id) {
      score += 50 + (streak * 10);
      streak += 1;
      fuel = Math.min(fuel + 8, 100);

      feedbackEl.textContent = "Correct";
      feedbackEl.className = "feedback ok";
      subFeedbackEl.textContent = `You built the idea: "${currentQuestion.targetMeaning}"`;
      dropZoneTextEl.style.color = "#16a34a";
      dropZoneEl.classList.add("flashSuccess");
    } else {
      streak = 0;
      fuel = Math.max(fuel - 12, 0);

      feedbackEl.textContent = "Not quite";
      feedbackEl.className = "feedback bad";
      subFeedbackEl.textContent = `Better answer: ${getPrefixLabel(currentQuestion.correct)} because it means "${currentQuestion.targetMeaning}"`;
      dropZoneTextEl.style.color = "#dc2626";
      dropZoneEl.classList.add("flashFail");
    }

    updateHud();

    if (fuel <= 0) {
      setTimeout(endGame, 800);
      return;
    }

    setTimeout(loadQuestion, 1500);
  }

  function startFuelDrain() {
    clearInterval(fuelInterval);
    fuelInterval = setInterval(() => {
      fuel -= 0.25;
      if (fuel <= 0) {
        fuel = 0;
        updateHud();
        endGame();
        clearInterval(fuelInterval);
        return;
      }
      updateHud();
    }, 220);
  }

  function endGame() {
    buttonsLocked = true;
    optionsEl.innerHTML = "";
    feedbackEl.textContent = "Mission over";
    feedbackEl.className = "feedback bad";
    subFeedbackEl.textContent = `Final score: ${score} XP`;
  }

  document.getElementById("recalibrateBtn").addEventListener("click", () => {
    score = 0;
    streak = 0;
    fuel = 100;
    updateHud();
    startFuelDrain();
    loadQuestion();
  });

  document.getElementById("skipBtn").addEventListener("click", () => {
    if (fuel <= 0) return;
    streak = 0;
    fuel = Math.max(fuel - 8, 0);
    updateHud();

    if (fuel <= 0) {
      endGame();
      return;
    }

    loadQuestion();
  });

  updateHud();
  startFuelDrain();
  loadQuestion();
</script>
</body>
</html>
