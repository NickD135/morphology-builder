<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mission Mode Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
      color: #222;
      text-align: center;
    }

    #game {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    #word {
      font-size: 40px;
      margin: 20px 0;
    }

    #options {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    button {
      padding: 14px 20px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3730a3;
    }

    #feedback {
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
    }

    #score {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div id="game">
  <h1>Prefix Power-Up Test</h1>
  <p>Choose the correct prefix.</p>

  <h2 id="word"></h2>
  <div id="options"></div>
  <p id="feedback"></p>
  <p id="score">Score: 0</p>
</div>

<script>
const CORE_BASES = [
  { text: "act" },
  { text: "form" },
  { text: "appear" },
  { text: "design" }
];

const PREFIXES = [
  { text: "re-" },
  { text: "un-" },
  { text: "pre-" },
  { text: "non-" },
  { text: "dis-" }
];

let score = 0;
let currentQuestion = null;

function shuffleArray(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function generatePrefixQuestion() {
  const base = CORE_BASES[Math.floor(Math.random() * CORE_BASES.length)];
  const correctPrefix = PREFIXES[Math.floor(Math.random() * PREFIXES.length)];

  const wrongOptions = shuffleArray(
    PREFIXES.filter(p => p.text !== correctPrefix.text)
  ).slice(0, 2);

  const options = shuffleArray([correctPrefix, ...wrongOptions]);

  return {
    base: base.text,
    correct: correctPrefix.text,
    options: options.map(o => o.text)
  };
}

function loadQuestion() {
  currentQuestion = generatePrefixQuestion();

  document.getElementById("word").innerText = currentQuestion.base;
  document.getElementById("feedback").innerText = "";

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  currentQuestion.options.forEach(option => {
    const btn = document.createElement("button");
    btn.innerText = option;
    btn.addEventListener("click", () => checkAnswer(option));
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(choice) {
  const feedback = document.getElementById("feedback");

  if (choice === currentQuestion.correct) {
    score++;
    feedback.innerText = "Correct!";
    feedback.style.color = "green";
  } else {
    feedback.innerText = `Not quite. Correct answer: ${currentQuestion.correct}`;
    feedback.style.color = "crimson";
  }

  document.getElementById("score").innerText = `Score: ${score}`;

  setTimeout(loadQuestion, 1200);
}

loadQuestion();
</script>

</body>
</html>
