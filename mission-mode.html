<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Lab – Prefix Power-Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f5f5; --panel:#ffffff; --line:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --indigo:#4338ca; --indigo-2:#6366f1; --indigo-soft:#eef2ff;
      --green-soft:#f0fdf4; --green-line:#bbf7d0; --green-text:#166534;
      --orange-soft:#fff7ed; --orange-line:#fed7aa; --orange-text:#9a3412;
      --ok:#15803d; --warn:#b45309; --bad:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; letter-spacing:.02em; }
    button,input{ font:inherit; }
    .header{ position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); box-shadow:0 1px 2px rgba(15,23,42,.05); }
    .headerInner{ max-width:900px; margin:0 auto; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brandIcon{ width:50px; height:50px; border-radius:14px; background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 12px 24px rgba(67,56,202,.18); flex:0 0 auto; }
    .brandText h1{ margin:0; font-size:24px; font-weight:900; letter-spacing:-.02em; color:#312e81; }
    .brandText .sub{ font-size:10px; text-transform:uppercase; letter-spacing:.25em; color:var(--indigo-2); font-weight:900; margin-top:3px; display:block; }
    .hud{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill{ display:inline-flex; align-items:center; justify-content:center; min-height:40px; border:1px solid var(--line); border-radius:999px; background:#fff; padding:8px 16px; font-size:13px; font-weight:800; color:#334155; }
    .pill.score{ background:var(--indigo); color:#fff; border-color:transparent; }
    .pill.streak{ background:var(--orange-soft); color:var(--orange-text); border-color:var(--orange-line); }
    .topBtn{ border:none; background:#0f172a; color:#fff; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.12em; padding:12px 16px; border-radius:14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .topBtn:hover{ background:#000; }
    .wrap{ max-width:900px; margin:0 auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
    .panel{ background:var(--panel); border:4px solid var(--line); border-radius:28px; box-shadow:0 20px 28px rgba(15,23,42,.06); overflow:hidden; }
    .panelInner{ padding:24px; }
    .panelTitle{ margin:0 0 12px 0; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em; color:var(--indigo); }
    .energyRow{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; font-weight:800; color:var(--muted); }
    .bar{ width:100%; height:14px; background:var(--line); border-radius:999px; overflow:hidden; }
    .barFill{ height:100%; width:100%; background:linear-gradient(90deg,var(--bad) 0%,var(--warn) 50%,var(--ok) 100%); transition:width .2s linear; border-radius:999px; }
    .missionBadge{ display:inline-block; background:var(--indigo-soft); color:var(--indigo); padding:6px 12px; border-radius:999px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.12em; margin-bottom:10px; border:1px solid rgba(99,102,241,.2); }
    .missionTitle{ font-size:20px; font-weight:900; margin:0 0 4px; color:#312e81; }
    .missionSub{ color:var(--muted); font-weight:600; font-size:14px; }
    .challengeLabel{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em; color:var(--muted); text-align:center; margin-bottom:6px; }
    .challengeSub{ color:var(--muted); font-weight:700; font-size:13px; text-align:center; margin-bottom:24px; }
    .wordArea{ display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap; margin:24px 0 20px; }
    .dropZone{ width:150px; height:100px; border:4px dashed #c7d2fe; border-radius:20px; background:var(--indigo-soft); display:flex; align-items:center; justify-content:center; transition:.2s ease; }
    .dropZoneText{ font-size:32px; font-weight:900; color:#a5b4fc; letter-spacing:.05em; }
    .baseWord{ font-size:56px; line-height:1; font-weight:900; color:#312e81; text-align:center; letter-spacing:-.02em; }
    .baseMeaning{ text-align:center; color:#334155; font-weight:700; margin-bottom:24px; font-size:15px; line-height:1.7; }
    .baseMeaning strong{ color:var(--indigo); }
    .options{ display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin:8px 0 20px; }
    .bubbleBtn{ width:116px; height:116px; border-radius:999px; border:4px solid; background:#fff; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; animation:float 3s ease-in-out infinite; }
    .bubbleBtn:hover{ transform:translateY(-4px) scale(1.04); box-shadow:0 16px 28px rgba(0,0,0,.12); }
    .bubbleBtn:disabled{ opacity:.55; cursor:not-allowed; transform:none; animation:none; }
    .bubbleBtn.blue{ border-color:#bfdbfe; color:#1e40af; }
    .bubbleBtn.green{ border-color:#bbf7d0; color:#166534; }
    .bubbleBtn.purple{ border-color:#ddd6fe; color:#6d28d9; }
    .bubbleBtn.orange{ border-color:var(--orange-line); color:var(--orange-text); }
    .bubbleInner{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; height:100%; padding:10px; text-align:center; }
    .bubbleInner span{ font-size:24px; font-weight:900; }
    .feedback{ min-height:28px; text-align:center; font-size:22px; font-weight:900; }
    .feedback.ok{ color:var(--ok); }
    .feedback.bad{ color:var(--bad); }
    .subFeedback{ min-height:24px; text-align:center; color:var(--muted); font-weight:700; margin-top:4px; line-height:1.5; font-size:14px; }
    .actionRow{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .secondaryBtn{ border:2px solid var(--line); background:#fff; color:#334155; font-weight:800; font-size:13px; padding:12px 20px; border-radius:16px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; transition:all .15s; }
    .secondaryBtn:hover{ background:#f8fafc; }
    .primaryBtn{ border:none; background:var(--indigo); color:#fff; font-weight:900; font-size:13px; padding:14px 28px; border-radius:16px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; box-shadow:0 10px 20px rgba(67,56,202,.2); transition:all .15s; }
    .primaryBtn:hover{ background:#3730a3; transform:translateY(-1px); }
    .flashSuccess{ background:var(--green-soft) !important; border-color:var(--green-line) !important; }
    .flashFail{ background:#fef2f2 !important; border-color:#fecaca !important; }
    @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
  </style>
</head>
<body>
<header class="header">
  <div class="headerInner">
    <div class="brand">
      <div class="brandIcon">⚡</div>
      <div class="brandText"><h1>Prefix Power-Up</h1><span class="sub">Word Lab · Mission Mode</span></div>
    </div>
    <div class="hud">
      <span class="pill streak" id="streakPill">🔥 Streak: 0</span>
      <span class="pill score" id="scorePill">0 XP</span>
      <a href="index.html" class="topBtn">← Builder</a>
    </div>
  </div>
</header>
<div class="wrap">
  <div class="panel"><div class="panelInner">
    <div class="panelTitle">Energy level</div>
    <div class="energyRow"><span></span><span id="fuelLabel">100%</span></div>
    <div class="bar"><div class="barFill" id="fuelBar"></div></div>
  </div></div>
  <div class="panel"><div class="panelInner">
    <div class="missionBadge">Active mission</div>
    <div class="missionTitle">Prefix Power-Up</div>
    <div class="missionSub">Choose the prefix that changes the base word to match the target meaning.</div>
  </div></div>
  <div class="panel"><div class="panelInner">
    <div class="challengeLabel">Prefix challenge</div>
    <div class="challengeSub">Pick the prefix that gives the base word the right meaning.</div>
    <div class="wordArea">
      <div class="dropZone" id="prefixDropZone"><div class="dropZoneText" id="dropZoneText">____</div></div>
      <div class="baseWord" id="word">BASE</div>
    </div>
    <div class="baseMeaning" id="baseMeaning">Loading...</div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="subFeedback" id="subFeedback"></div>
    <div class="actionRow">
      <button class="secondaryBtn" id="recalibrateBtn" type="button">Restart</button>
      <button class="primaryBtn" id="skipBtn" type="button">Skip →</button>
    </div>
  </div></div>
</div>
<script>
  const PREFIXES=[{id:"ad",form:"ad",meaning:"towards; to",meaningPattern:"towards {base}",allowedPos:["noun","adj","verb"]},{id:"anti",form:"anti",meaning:"against",meaningPattern:"against {base}",allowedPos:["noun","adj","verb"]},{id:"de",form:"de",meaning:"undo; remove; down",meaningPattern:"remove or undo {base}",allowedPos:["verb"]},{id:"dis",form:"dis",meaning:"not; opposite; apart",meaningPattern:"not or opposite of {base}",allowedPos:["noun","adj","verb"]},{id:"in",form:"in",meaning:"not; into",meaningPattern:"not {base}",allowedPos:["adj","verb"]},{id:"inter",form:"inter",meaning:"between",meaningPattern:"between {base}",allowedPos:["noun","adj","verb"]},{id:"mis",form:"mis",meaning:"wrong",meaningPattern:"wrongly {base}",allowedPos:["verb"]},{id:"non",form:"non",meaning:"not",meaningPattern:"not {base}",allowedPos:["noun","adj"]},{id:"over",form:"over",meaning:"too much",meaningPattern:"too much {base}",allowedPos:["verb","adj"]},{id:"post",form:"post",meaning:"after",meaningPattern:"after {base}",allowedPos:["noun","adj"]},{id:"pre",form:"pre",meaning:"before",meaningPattern:"before {base}",allowedPos:["noun","adj","verb"]},{id:"re",form:"re",meaning:"again",meaningPattern:"{base} again",allowedPos:["verb"]},{id:"sub",form:"sub",meaning:"under; below",meaningPattern:"under or below {base}",allowedPos:["noun","adj","verb"]},{id:"super",form:"super",meaning:"above; beyond",meaningPattern:"above or beyond {base}",allowedPos:["noun","adj","verb"]},{id:"trans",form:"trans",meaning:"across",meaningPattern:"across {base}",allowedPos:["noun","adj","verb"]},{id:"un",form:"un",meaning:"not",meaningPattern:"not {base}",allowedPos:["adj","verb"]},{id:"under",form:"under",meaning:"below",meaningPattern:"below {base}",allowedPos:["noun","adj","verb"]}];
  const BASES=[{id:"act",form:"act",meaning:"do",pos:["verb","noun"]},{id:"appear",form:"appear",meaning:"come into view",pos:["verb"]},{id:"care",form:"care",meaning:"look after; attention",pos:["verb","noun"]},{id:"connect",form:"connect",meaning:"join together",pos:["verb"]},{id:"construct",form:"construct",meaning:"build",pos:["verb"]},{id:"create",form:"create",meaning:"make",pos:["verb"]},{id:"direct",form:"direct",meaning:"guide; control",pos:["verb","adj"]},{id:"form",form:"form",meaning:"make; shape",pos:["verb","noun"]},{id:"legal",form:"legal",meaning:"allowed by law",pos:["adj"]},{id:"manage",form:"manage",meaning:"control; run",pos:["verb"]},{id:"measure",form:"measure",meaning:"find size or amount",pos:["verb","noun"]},{id:"move",form:"move",meaning:"go from one place to another",pos:["verb"]},{id:"place",form:"place",meaning:"put in position",pos:["verb","noun"]},{id:"play",form:"play",meaning:"take part in an activity",pos:["verb","noun"]},{id:"power",form:"power",meaning:"strength; energy",pos:["noun"]},{id:"read",form:"read",meaning:"look at words and understand them",pos:["verb"]},{id:"regular",form:"regular",meaning:"usual; even pattern",pos:["adj"]},{id:"respect",form:"respect",meaning:"treat well; value",pos:["verb","noun"]},{id:"return",form:"return",meaning:"go back",pos:["verb"]},{id:"view",form:"view",meaning:"look at",pos:["verb","noun"]},{id:"write",form:"write",meaning:"put words on a page",pos:["verb"]}];
  let score=0,streak=0,fuel=100,currentQuestion=null,buttonsLocked=false,fuelInterval=null,dictWords=null;
  async function loadDictionary(){try{const resp=await fetch('dictionary.txt');const text=await resp.text();dictWords=new Set(text.toLowerCase().split(/\s+/).filter(w=>w.length>0));}catch(e){dictWords=new Set();}}
  function isRealWord(prefix,base){if(!dictWords||dictWords.size===0)return true;return dictWords.has((prefix.form+base.form).toLowerCase());}
  const wordEl=document.getElementById("word"),baseMeaningEl=document.getElementById("baseMeaning"),optionsEl=document.getElementById("options"),feedbackEl=document.getElementById("feedback"),subFeedbackEl=document.getElementById("subFeedback"),scorePillEl=document.getElementById("scorePill"),streakPillEl=document.getElementById("streakPill"),fuelBarEl=document.getElementById("fuelBar"),fuelLabelEl=document.getElementById("fuelLabel"),dropZoneEl=document.getElementById("prefixDropZone"),dropZoneTextEl=document.getElementById("dropZoneText");
  function shuffleArray(arr){return[...arr].sort(()=>Math.random()-.5);}
  function getPrefixLabel(p){return(p.form||"").toUpperCase()+"-";}
  function getBaseLabel(b){return(b.form||"").toUpperCase();}
  function updateHud(){scorePillEl.textContent=`${score} XP`;streakPillEl.textContent=`🔥 Streak: ${streak}`;fuelBarEl.style.width=`${Math.max(fuel,0)}%`;fuelLabelEl.textContent=`${Math.max(Math.round(fuel),0)}%`;}
  function isCompatible(prefix,base){return base.pos.some(pos=>prefix.allowedPos.includes(pos));}
  function buildTargetMeaning(prefix,base){return(prefix.meaningPattern||"{base} "+prefix.meaning).replace("{base}",base.meaning);}
  function generateQuestion(){for(let i=0;i<50;i++){const base=BASES[Math.floor(Math.random()*BASES.length)];const compat=PREFIXES.filter(p=>isCompatible(p,base));const real=compat.filter(p=>isRealWord(p,base));if(!real.length)continue;const correct=real[Math.floor(Math.random()*real.length)];const wrong=shuffleArray(PREFIXES.filter(p=>p.id!==correct.id)).slice(0,2);return{base,correct,targetMeaning:buildTargetMeaning(correct,base),options:shuffleArray([correct,...wrong])};} const base=BASES[Math.floor(Math.random()*BASES.length)];const compat=PREFIXES.filter(p=>isCompatible(p,base));const correct=compat[Math.floor(Math.random()*compat.length)];const wrong=shuffleArray(PREFIXES.filter(p=>p.id!==correct.id)).slice(0,2);return{base,correct,targetMeaning:buildTargetMeaning(correct,base),options:shuffleArray([correct,...wrong])};}
  function resetDropZone(){dropZoneEl.classList.remove("flashSuccess","flashFail");dropZoneTextEl.textContent="____";dropZoneTextEl.style.color="#a5b4fc";}
  function loadQuestion(){if(fuel<=0)return;buttonsLocked=false;currentQuestion=generateQuestion();wordEl.textContent=getBaseLabel(currentQuestion.base);baseMeaningEl.innerHTML=`<strong>Base meaning:</strong> ${currentQuestion.base.meaning}<br><strong>Target meaning:</strong> ${currentQuestion.targetMeaning}`;feedbackEl.textContent="";feedbackEl.className="feedback";subFeedbackEl.textContent="";resetDropZone();optionsEl.innerHTML="";currentQuestion.options.forEach((option,index)=>{const btn=document.createElement("button");btn.type="button";btn.className=`bubbleBtn ${["blue","green","purple","orange"][index%4]}`;btn.style.animationDelay=`${index*.18}s`;const inner=document.createElement("div");inner.className="bubbleInner";const main=document.createElement("span");main.textContent=getPrefixLabel(option);inner.appendChild(main);btn.appendChild(inner);btn.addEventListener("click",()=>checkAnswer(option));optionsEl.appendChild(btn);});}
  function lockButtons(){optionsEl.querySelectorAll("button").forEach(b=>b.disabled=true);}
  function checkAnswer(choice){if(buttonsLocked||fuel<=0)return;buttonsLocked=true;lockButtons();dropZoneTextEl.textContent=getPrefixLabel(choice);if(choice.id===currentQuestion.correct.id){score+=50+(streak*10);streak++;fuel=Math.min(fuel+8,100);feedbackEl.textContent="✅ Correct!";feedbackEl.className="feedback ok";subFeedbackEl.textContent=`You built the idea: "${currentQuestion.targetMeaning}"`;dropZoneTextEl.style.color="var(--ok)";dropZoneEl.classList.add("flashSuccess");}else{streak=0;fuel=Math.max(fuel-12,0);feedbackEl.textContent="❌ Not quite";feedbackEl.className="feedback bad";subFeedbackEl.textContent=`Better answer: ${getPrefixLabel(currentQuestion.correct)} — "${currentQuestion.targetMeaning}"`;dropZoneTextEl.style.color="var(--bad)";dropZoneEl.classList.add("flashFail");}updateHud();if(fuel<=0){setTimeout(endGame,800);return;}setTimeout(loadQuestion,1500);}
  function startFuelDrain(){clearInterval(fuelInterval);fuelInterval=setInterval(()=>{fuel-=.25;if(fuel<=0){fuel=0;updateHud();endGame();clearInterval(fuelInterval);return;}updateHud();},220);}
  function endGame(){buttonsLocked=true;optionsEl.innerHTML="";feedbackEl.textContent="Mission over";feedbackEl.className="feedback bad";subFeedbackEl.textContent=`Final score: ${score} XP`;}
  document.getElementById("recalibrateBtn").addEventListener("click",()=>{score=0;streak=0;fuel=100;updateHud();startFuelDrain();loadQuestion();});
  document.getElementById("skipBtn").addEventListener("click",()=>{if(fuel<=0)return;streak=0;fuel=Math.max(fuel-8,0);updateHud();if(fuel<=0){endGame();return;}loadQuestion();});
  updateHud();loadDictionary().then(()=>{startFuelDrain();loadQuestion();});
</script>
</body>
</html>
