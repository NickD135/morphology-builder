<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – My Scientist</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f0f4f8; --panel:#fff; --line:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --indigo:#4338ca; --indigo-2:#6366f1; --indigo-soft:#eef2ff; --indigo-line:#c7d2fe;
      --green-soft:#f0fdf4; --green-line:#bbf7d0;
      --amber-soft:#fffbeb; --amber-line:#fde68a; --amber-text:#78350f;
      --ok:#15803d; --bad:#dc2626;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
    button,input,select{ font:inherit; }

    /* Header */
    .header{ position:sticky; top:0; z-index:50; background:rgba(255,255,255,.93); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); box-shadow:0 1px 3px rgba(15,23,42,.05); }
    .headerInner{ max-width:1100px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brandIcon{ width:44px; height:44px; border-radius:12px; background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 8px 20px rgba(67,56,202,.22); }
    .brandName{ font-size:20px; font-weight:900; color:#312e81; letter-spacing:-.02em; }
    .brandSub{ font-size:9px; font-weight:900; text-transform:uppercase; letter-spacing:.25em; color:var(--indigo-2); display:block; }
    .headerRight{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .topBtn{ border:none; background:#0f172a; color:#fff; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.1em; padding:10px 14px; border-radius:12px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .topBtn:hover{ background:#000; }
    #wlPillSlot{ display:inline-flex; align-items:center; }

    /* Tabs */
    .wrap{ max-width:1100px; margin:0 auto; padding:32px 24px; }
    .tabRow{ display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .tabBtn{ border:2px solid var(--line); background:#fff; border-radius:14px; padding:10px 20px; font-weight:800; font-size:13px; cursor:pointer; color:var(--muted); transition:all .15s; font-family:'Lexend',sans-serif; }
    .tabBtn.active{ background:var(--indigo); color:#fff; border-color:var(--indigo); }
    .tabBtn:hover:not(.active){ border-color:#cbd5e1; color:var(--text); }
    .tabPanel{ display:none; }
    .tabPanel.active{ display:block; }

    /* My Scientist tab */
    .sciLayout{ display:grid; grid-template-columns:240px 1fr; gap:24px; }
    @media(max-width:700px){ .sciLayout{ grid-template-columns:1fr; } }
    .sciCard{ background:var(--panel); border:2px solid var(--line); border-radius:24px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; }
    .sciSVGWrap{ width:180px; height:220px; margin:0 auto; }
    .sciName{ font-size:20px; font-weight:900; color:#312e81; }
    .sciTitle{ font-size:13px; font-weight:700; color:var(--indigo-2); }
    .xpBar{ width:100%; }
    .xpBarLabels{ display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:var(--muted); margin-bottom:4px; }
    .xpBarTrack{ width:100%; height:10px; background:var(--line); border-radius:999px; overflow:hidden; }
    .xpBarFill{ height:100%; background:linear-gradient(90deg,var(--indigo),var(--indigo-2)); border-radius:999px; transition:width .4s ease; }
    .quarksDisplay{ display:flex; align-items:center; gap:8px; font-size:22px; font-weight:900; color:var(--indigo); }
    .statsGrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
    .statBox{ background:var(--indigo-soft); border:1px solid var(--indigo-line); border-radius:14px; padding:10px; text-align:center; }
    .statVal{ font-size:22px; font-weight:900; color:var(--indigo); }
    .statLbl{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); }

    /* Customise panel */
    .customPanel{ background:var(--panel); border:2px solid var(--line); border-radius:24px; padding:24px; display:flex; flex-direction:column; gap:20px; }
    .custSection{ }
    .custLabel{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.18em; color:var(--indigo); margin-bottom:10px; }
    .swatchRow{ display:flex; gap:8px; flex-wrap:wrap; }
    .swatch{ width:32px; height:32px; border-radius:50%; cursor:pointer; border:3px solid transparent; transition:all .15s; }
    .swatch.active{ border-color:var(--indigo); box-shadow:0 0 0 2px #fff, 0 0 0 4px var(--indigo); }
    .swatch.locked{ opacity:.35; cursor:not-allowed; }
    .optRow{ display:flex; gap:8px; flex-wrap:wrap; }
    .optPill{ border:2px solid var(--line); background:#fff; border-radius:12px; padding:7px 14px; font-size:12px; font-weight:800; cursor:pointer; color:var(--muted); transition:all .15s; font-family:'Lexend',sans-serif; }
    .optPill.active{ background:var(--indigo); color:#fff; border-color:var(--indigo); }
    .optPill:hover:not(.active):not(.locked){ border-color:#cbd5e1; color:var(--text); }
    .optPill.locked{ opacity:.4; cursor:not-allowed; }

    /* Badges tab */
    .badgesGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
    .badgeCard{ background:var(--panel); border:2px solid var(--line); border-radius:18px; padding:16px; text-align:center; }
    .badgeCard.earned{ background:var(--indigo-soft); border-color:var(--indigo-line); }
    .badgeCard.legendary{ background:var(--amber-soft); border-color:var(--amber-line); }
    .badgeCard.legendary.earned{ background:#fffbeb; border-color:#f59e0b; }
    .badgeIcon{ font-size:32px; margin-bottom:6px; }
    .badgeName{ font-size:13px; font-weight:900; color:#312e81; margin-bottom:3px; }
    .badgeDesc{ font-size:11px; color:var(--muted); font-weight:600; line-height:1.4; }
    .badgeLocked{ opacity:.45; }
    .badgeSectionTitle{ font-size:13px; font-weight:900; text-transform:uppercase; letter-spacing:.16em; color:var(--amber-text); margin:24px 0 12px; }

    /* Shop tab */
    .shopBalance{ background:var(--indigo-soft); border:2px solid var(--indigo-line); border-radius:18px; padding:16px 24px; display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .shopBalanceAmt{ font-size:28px; font-weight:900; color:var(--indigo); }
    .shopBalanceLbl{ font-size:13px; font-weight:700; color:var(--muted); }
    .shopSection{ margin-bottom:28px; }
    .shopSectionTitle{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.18em; color:var(--indigo); margin-bottom:12px; padding-bottom:8px; border-bottom:2px solid var(--line); }
    .shopGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .shopItem{ background:var(--panel); border:2px solid var(--line); border-radius:16px; padding:14px; text-align:center; display:flex; flex-direction:column; gap:6px; }
    .shopItem.owned{ border-color:var(--indigo-line); background:var(--indigo-soft); }
    .shopItem.locked{ opacity:.5; }
    .shopItemIcon{ font-size:22px; }
    .shopItemName{ font-size:12px; font-weight:800; color:#1e1b4b; }
    .shopItemCost{ font-size:11px; font-weight:700; color:var(--muted); }
    .shopBtn{ border:none; border-radius:10px; padding:7px 12px; font-size:11px; font-weight:900; cursor:pointer; font-family:'Lexend',sans-serif; transition:all .15s; }
    .shopBtn.buy{ background:var(--indigo); color:#fff; }
    .shopBtn.buy:hover{ background:#3730a3; }
    .shopBtn.equip{ background:var(--green-soft); color:var(--ok); border:2px solid var(--green-line); }
    .shopBtn.equipped{ background:var(--line); color:var(--muted); cursor:default; }
    .shopBtn.cantafford{ background:var(--line); color:var(--muted); cursor:not-allowed; }

    /* Login prompt */
    .loginPrompt{ background:var(--panel); border:2px solid var(--line); border-radius:24px; padding:48px; text-align:center; max-width:480px; margin:80px auto; }
    .loginPromptIcon{ font-size:48px; margin-bottom:12px; }
    .loginPromptTitle{ font-size:22px; font-weight:900; color:#312e81; margin-bottom:8px; }
    .loginPromptDesc{ font-size:14px; color:var(--muted); font-weight:600; margin-bottom:20px; }
    .loginPromptBtn{ border:none; background:var(--indigo); color:#fff; font-weight:900; font-size:14px; padding:14px 28px; border-radius:16px; cursor:pointer; font-family:'Lexend',sans-serif; }
  </style>

  <!-- ═══ DRESSING ROOM THEME ═══ -->
  <style>
  /* ── Scene ── */
  .dressing-scene{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    display:flex; flex-direction:column;
  }
  .dressing-wall{
    flex:0 0 62%; background:#f5f0e8;
    position:relative; overflow:hidden;
  }
  /* Subtle warm paper texture */
  .dressing-wall::before{
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 500px 350px at 22% 45%, rgba(255,190,60,.1) 0%, transparent 65%),
      radial-gradient(ellipse 300px 220px at 78% 35%, rgba(255,190,60,.07) 0%, transparent 65%),
      radial-gradient(ellipse 200px 160px at 50% 20%, rgba(255,210,80,.06) 0%, transparent 60%);
  }
  /* Lower wood panelling */
  .dressing-wall::after{
    content:''; position:absolute; bottom:0; left:0; right:0; height:32%;
    background:#a07828;
    background-image: repeating-linear-gradient(
      90deg, rgba(0,0,0,.06) 0, rgba(0,0,0,.06) 2px,
      transparent 2px, transparent 80px
    );
    border-top:5px solid #b8860b;
    box-shadow:inset 0 10px 20px rgba(0,0,0,.08);
  }
  /* Overhead bulb row */
  .bulb-row{
    position:absolute; top:4px; left:50%; transform:translateX(-50%);
    display:flex; gap:28px; padding:0 10px;
  }
  .bulb{
    width:13px; height:17px;
    border-radius:50% 50% 40% 40%;
    background:radial-gradient(circle at 38% 32%, #fffde0, #ffe96b 55%, #f5c518 100%);
    box-shadow:0 0 10px 4px rgba(255,200,50,.42);
    animation:bulbPulse 3s ease-in-out infinite;
  }
  .bulb:nth-child(2){animation-delay:.55s;}
  .bulb:nth-child(3){animation-delay:1.1s;}
  .bulb:nth-child(4){animation-delay:1.65s;}
  .bulb:nth-child(5){animation-delay:2.2s;}
  .bulb:nth-child(6){animation-delay:2.75s;}
  .bulb:nth-child(7){animation-delay:.3s;}
  .bulb-wire{
    position:absolute; top:-18px; left:50%; transform:translateX(-50%);
    width:1.5px; height:18px; background:#888;
  }
  @keyframes bulbPulse{
    0%,100%{box-shadow:0 0 10px 4px rgba(255,200,50,.42);}
    50%{box-shadow:0 0 20px 8px rgba(255,200,50,.72);}
  }
  /* Mirror frame on wall (decorative left side) */
  .mirror-frame{
    position:absolute; left:4%; top:6%;
    width:110px; height:140px;
    border-radius:50%;
    border:8px solid #b8860b;
    background:radial-gradient(ellipse, rgba(255,230,150,.18), rgba(184,134,11,.06));
    box-shadow:0 0 0 3px rgba(184,134,11,.2), 0 0 20px 8px rgba(255,190,50,.14);
  }
  /* Mirror corner bulbs */
  .mirror-bulb{
    position:absolute;
    width:9px; height:9px; border-radius:50%;
    background:radial-gradient(circle at 38% 35%, #fffde0, #ffe96b 55%, #f5c518);
    box-shadow:0 0 8px 3px rgba(255,200,50,.5);
    animation:bulbPulse 3s ease-in-out infinite;
  }
  /* Trophy shelf */
  .trophy-shelf{
    position:absolute; right:4%; top:10%;
    width:130px;
  }
  .trophy-shelf-board{
    height:8px; background:#8B6914;
    border-top:2px solid #b8860b; border-radius:2px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }
  .trophy-items{
    display:flex; justify-content:space-around; align-items:flex-end;
    padding-bottom:4px;
  }
  .trophy-item{ font-size:26px; }
  /* Coat hook */
  .coat-hook{
    position:absolute; left:18%; top:5%;
    display:flex; flex-direction:column; align-items:center;
  }
  .hook-base{
    width:16px; height:8px; background:#555; border-radius:2px;
  }
  .hook-arm{
    width:3px; height:18px; background:#555;
    transform:rotate(12deg) translateX(-2px);
    transform-origin:top center;
    border-radius:0 0 3px 3px;
  }
  .coat-emoji{ font-size:28px; margin-top:0; opacity:.75; }
  /* Desk nameplate */
  .desk-corner{
    position:absolute; right:6%; bottom:8%;
    background:#3d2b1f; border-radius:6px 6px 0 0;
    width:90px; height:10px;
  }
  .desk-corner::before{
    content:'SCIENTIST';
    position:absolute; top:-20px; left:50%; transform:translateX(-50%);
    background:#3d2b1f; color:#fbbf24; border-radius:4px;
    font-size:7px; font-weight:900; letter-spacing:.15em;
    padding:3px 8px; white-space:nowrap; font-family:'Lexend',sans-serif;
  }

  /* Herringbone floor */
  .dressing-floor{
    flex:1; position:relative;
    background:#c4a35a;
    background-image:
      repeating-linear-gradient(45deg,  rgba(80,50,10,.12) 0, rgba(80,50,10,.12) 2px, transparent 2px, transparent 16px),
      repeating-linear-gradient(-45deg, rgba(80,50,10,.12) 0, rgba(80,50,10,.12) 2px, transparent 2px, transparent 16px);
    border-top:4px solid #8B6914;
  }
  /* Side skirting */
  .skirting{
    position:absolute; bottom:0; width:80px; height:60%;
    background:#8B6914; border-radius:4px 4px 0 0;
    border-top:5px solid #a07828; opacity:.6;
  }
  .skirting.left{ left:8px; }
  .skirting.right{ right:8px; }

  /* Warm dust particles */
  .dust-r{
    position:fixed; border-radius:50%;
    background:rgba(255,200,80,.32);
    pointer-events:none; z-index:1;
    animation:dustR linear infinite;
  }
  @keyframes dustR{
    0%{transform:translateY(30px) translateX(0);opacity:0;}
    15%{opacity:.55;}
    85%{opacity:.2;}
    100%{transform:translateY(-60px) translateX(var(--rdx,10px));opacity:0;}
  }

  /* ── Layout overrides ── */
  body{ background:#f0ebe0!important; }
  .header{
    background:rgba(30,20,10,.62)!important;
    backdrop-filter:blur(10px)!important; -webkit-backdrop-filter:blur(10px)!important;
    border-bottom:1px solid rgba(184,134,11,.25)!important;
    box-shadow:0 2px 12px rgba(0,0,0,.25)!important;
    z-index:50!important;
  }
  .headerInner{ padding:0 20px!important; height:56px!important; }
  .brand{ text-decoration:none; }
  .brandIcon{
    width:34px!important; height:34px!important; border-radius:9px!important;
    background:rgba(184,134,11,.2)!important; border:1px solid rgba(184,134,11,.4)!important;
    font-size:16px!important; box-shadow:none!important;
  }
  .brandName{ color:#fbbf24!important; font-size:17px!important; }
  .brandSub{ color:rgba(251,191,36,.55)!important; }
  .topBtn{
    background:rgba(255,255,255,.1)!important; border:1px solid rgba(255,255,255,.18)!important;
    border-radius:9px!important; font-size:11px!important; padding:6px 10px!important;
    color:#fff!important;
  }
  #wlLoginBtn{
    background:rgba(255,255,255,.08)!important; border:1px solid rgba(255,255,255,.15)!important;
    border-radius:9px!important; color:rgba(255,255,255,.8)!important;
    font-size:11px!important; padding:6px 10px!important;
  }

  .wrap{ max-width:1100px; margin:0 auto; padding:24px; position:relative; z-index:2; }

  /* ── Tabs: folder tab style ── */
  .tabRow{
    display:flex; gap:0; margin-bottom:0!important;
    border-bottom:3px solid rgba(184,134,11,.35);
    flex-wrap:wrap;
  }
  .tabBtn{
    border:2px solid rgba(184,134,11,.3)!important;
    border-bottom:none!important;
    background:rgba(210,190,155,.65)!important;
    border-radius:10px 10px 0 0!important;
    padding:9px 20px!important;
    font-size:12px!important; font-weight:900!important;
    color:rgba(60,30,5,.6)!important;
    margin-right:3px; cursor:pointer;
    transition:all .15s;
    backdrop-filter:blur(4px);
  }
  .tabBtn.active{
    background:rgba(250,247,242,.96)!important;
    border-color:rgba(184,134,11,.45)!important;
    color:#1a0a05!important;
    position:relative; top:2px;
    box-shadow:0 -2px 8px rgba(184,134,11,.15)!important;
  }
  .tabBtn:hover:not(.active){
    background:rgba(225,205,170,.75)!important;
    color:rgba(30,10,0,.7)!important;
  }
  .tabPanel{
    background:rgba(250,247,242,.92);
    border:2px solid rgba(184,134,11,.3);
    border-top:none; border-radius:0 0 18px 18px;
    padding:24px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }

  /* ── Scientist card (mirror station) ── */
  .sciCard{
    background:rgba(250,247,242,.95)!important;
    border:2px solid rgba(184,134,11,.35)!important;
    border-radius:20px!important;
    box-shadow:0 4px 20px rgba(100,60,10,.12)!important;
    position:relative;
  }
  /* Oval mirror glow behind character */
  .sciSVGWrap{
    position:relative!important;
    width:200px!important; height:240px!important;
  }
  .sciSVGWrap::before{
    content:''; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:180px; height:220px; border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,230,130,.22), rgba(184,134,11,.06) 70%, transparent);
    border:5px solid #b8860b;
    box-shadow:0 0 22px 8px rgba(255,200,50,.2), inset 0 0 16px 4px rgba(255,200,50,.08);
    z-index:0;
  }
  .sciSVGWrap > *{ position:relative; z-index:1; }
  /* Ensure the SVG character renders ABOVE particle effects (which use z-index 8-13) */
  .sciSVGWrap > svg, .sciSVGWrap > div > svg, #sciSVGBig svg { position:relative; z-index:15!important; }
  /* Idle bob */
  #sciSVGBig svg{ animation:sciIdleBob 3s ease-in-out infinite; display:block; }
  @keyframes sciIdleBob{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-3px); }
  }
  /* Happy spin on customise */
  .sci-spin{ animation:sciSpin .55s cubic-bezier(.4,0,.2,1) 1!important; }
  @keyframes sciSpin{
    0%{ transform:rotate(0deg) scale(1); }
    50%{ transform:rotate(180deg) scale(1.08); }
    100%{ transform:rotate(360deg) scale(1); }
  }
  /* Nameplate */
  .sciName{
    background:#1a0a05!important; color:#fbbf24!important;
    border-radius:6px!important; padding:5px 18px!important;
    font-size:17px!important; letter-spacing:.05em!important;
    box-shadow:0 2px 8px rgba(0,0,0,.25)!important;
    border:1px solid rgba(184,134,11,.4)!important;
  }
  .sciTitle{ color:#7c5c20!important; font-size:12px!important; }

  /* XP bar: film strip / warm tones */
  .xpBarLabels{ color:#7c5c20!important; }
  .xpBarTrack{ background:rgba(180,140,55,.22)!important; height:12px!important; border-radius:999px!important; }
  .xpBarFill{ background:linear-gradient(90deg,#b8860b,#fbbf24)!important; }

  /* Quarks: coin purse */
  .quarksDisplay{ color:#7c4400!important; font-size:20px!important; }
  .quarksDisplay span{ color:#a07828!important; }

  /* Stats: record card */
  .statsGrid .statBox{
    background:rgba(255,248,225,.85)!important;
    border:1px solid rgba(184,134,11,.22)!important;
    border-radius:12px!important;
  }
  .statVal{ color:#7c4400!important; font-size:20px!important; }
  .statLbl{ color:#a07828!important; }

  /* ── Customisation panel: warm paper ── */
  .customPanel{
    background:rgba(252,249,242,.95)!important;
    border:2px solid rgba(184,134,11,.3)!important;
    border-radius:20px!important;
    box-shadow:0 4px 16px rgba(100,60,10,.1)!important;
    background-image:repeating-linear-gradient(
      0deg, transparent 0, transparent 23px,
      rgba(184,134,11,.04) 24px
    )!important;
  }
  /* Specimen drawer labels */
  .custLabel{
    color:#7c4400!important; font-size:10px!important;
    letter-spacing:.2em!important; padding-bottom:6px!important;
    border-bottom:1px solid rgba(184,134,11,.2)!important;
    margin-bottom:10px!important;
  }
  /* Swatches: gold ring on active */
  .swatch{ width:34px!important; height:34px!important; border:3px solid rgba(184,134,11,.2)!important; }
  .swatch.active{
    border-color:#b8860b!important;
    box-shadow:0 0 0 2px #fff, 0 0 0 4px #b8860b!important;
  }
  /* Wardrobe tags */
  .optPill{
    background:rgba(255,248,225,.9)!important;
    border:1.5px solid rgba(184,134,11,.28)!important;
    border-radius:10px!important; color:#3d2b1f!important;
    font-size:11px!important; padding:6px 13px!important;
  }
  .optPill.active{
    background:rgba(251,191,36,.15)!important;
    border-color:#b8860b!important; color:#7c4400!important;
  }
  .optPill:hover:not(.active):not(.locked){
    border-color:#b8860b!important; background:rgba(255,240,180,.7)!important;
  }
  .optPill.locked{ opacity:.38!important; }

  /* Donut crown notice */
  .customPanel [style*="fdf4ff"]{
    background:rgba(255,248,225,.9)!important;

let _activeTab = 'scientist';

// ── Render ────────────────────────────────────────────────────
async function render() {
  const sd = (typeof WordLabData !== 'undefined') ? await WordLabData.getStudentData() : null;
  const wrap = document.getElementById('mainWrap');

  // Check donut crown status
  let crownActive = false;
  if (sd && typeof WordLabData !== 'undefined') {
    const session = WordLabData.getSession();
    if (session && session.classId) {
      const enabled = await WordLabData.getClassCrownEnabled(session.classId);
      if (enabled) {
        const leaderId = await WordLabData.getClassLeader(session.classId);
        if (leaderId && leaderId === session.studentId) {
          crownActive = true;
          sd.scientist = Object.assign({}, sd.scientist, { head: 'donut_crown' });
        }
      }
    }
  }

  if (!sd) {
    wrap.innerHTML = `<div class="loginPrompt">
      <div class="loginPromptIcon">🧪</div>
      <div class="loginPromptTitle">Log in to see your scientist</div>
      <div class="loginPromptDesc">Pick your class and name to access your personal scientist character, quarks, and badges.</div>
      <button class="loginPromptBtn" onclick="wlShowLogin()">👤 Log in</button>
    </div>`;
    return;
  }

  const lvl  = sd.level;
  const sci  = sd.scientist || {};
  const owned = sci.owned || [];

  wrap.innerHTML = `
    <div class="tabRow">
      <button class="tabBtn active" data-tab="scientist" onclick="switchTab('scientist',this)">🧬 My Scientist</button>

      <button class="tabBtn" data-tab="shop" onclick="switchTab('shop',this)">🛍️ Lab Shop</button>
      <button class="tabBtn" data-tab="effects" onclick="switchTab('effects',this)">✨ Particle Effects</button>
      <button class="tabBtn" data-tab="custom" onclick="switchTab('custom',this)">🎨 Custom</button>
    </div>

        <div class="sciCard">
          <div style="position:relative;width:100%;">

            <div class="sciSVGWrap" id="sciSVGBig">${WLScientist.buildSVG(sci,'neutral')}</div>
          </div>
          <div class="sciName">${sd.name}</div>
          <div class="sciTitle">Level ${lvl.level} · ${lvl.title}</div>
          <div class="xpBar">
            <div class="xpBarLabels"><span>Lv ${lvl.level}</span><span>${lvl.xpToNext} XP to next</span></div>
            <div class="xpBarTrack"><div class="xpBarFill" style="width:${lvl.progress}%"></div></div>
          </div>
          <div class="quarksDisplay">⚛️ ${sd.quarks} <span style="font-size:13px;color:var(--muted);font-weight:700;">quarks</span></div>
          <div class="statsGrid">
            <div class="statBox"><div class="statVal">${sd.stats.totalCorrect}</div><div class="statLbl">Correct</div></div>
            <div class="statBox"><div class="statVal">${sd.stats.sessions}</div><div class="statLbl">Sessions</div></div>
            <div class="statBox"><div class="statVal">${sd.badges.length}</div><div class="statLbl">Badges</div></div>
            <div class="statBox"><div class="statVal">${sd.stats.activitiesPlayed.length}</div><div class="statLbl">Activities</div></div>
          </div>
        </div>

        <div class="customPanel">
          <div class="custSection">
            <div class="custLabel">Skin Tone</div>
            <div class="swatchRow">${SKIN_TONES.map(t=>`<div class="swatch${t===sci.skinTone?' active':''}" style="background:${t};" onclick="applyOption('skinTone','${t}')" title="${t}"></div>`).join('')}</div>
          </div>
          <div class="custSection">
            <div class="custLabel">Coat Colour</div>
            <div class="swatchRow">${SHOP.coatColors.filter(c=> sd.is_teacher || c.free || owned.includes(c.id) || c.id===sci.coatColor).map(c=>{

      ${renderShopSection('Head Accessories',   SHOP.headAccessories, 'head',         sd)}
      ${renderShopSection('Face Accessories',   SHOP.faceAccessories, 'face',         sd)}
      ${renderShopSection('Pet Companions',      SHOP.pets,            'pet',          sd)}
      <div class="shopSection">
        <div class="shopSectionTitle">✨ Particle Effects</div>
        <div class="shopGrid" id="effectsGrid">${renderEffectsSection(sd)}</div>
      </div>
      <div id="customItemsSection" class="shopSection" style="display:none;">
        <div class="shopSectionTitle">🎨 Custom Items</div>
        <div class="shopGrid" id="customItemsGrid"></div>
      </div>
    </div>

    <!-- TAB 4: Particle Effects -->
    <div id="tab-effects" class="tabPanel">
      <div class="shopBalance">
        <span style="font-size:28px;">⚛️</span>
        <div><div class="shopBalanceAmt">${sd.quarks}</div><div class="shopBalanceLbl">quarks available</div></div>
      </div>
      ${renderCurrentEffect(sd)}
      <div style="margin-top:20px;">
        <div class="shopSectionTitle">✨ All Particle Effects</div>
        <div class="shopGrid">${renderEffectsSection(sd)}</div>
      </div>
    </div>

    <!-- TAB 5: Custom Items -->
    <div id="tab-custom" class="tabPanel">
      <div class="shopBalance">
        <span style="font-size:28px;">⚛️</span>
        <div><div class="shopBalanceAmt">${sd.quarks}</div><div class="shopBalanceLbl">quarks available</div></div>
      </div>
      <div class="shopSection">
        <div class="shopSectionTitle">🎨 Custom Items from Your Teacher</div>
        <div class="shopGrid" id="customItemsGridTab"></div>
        <div id="customItemsTabEmpty" style="color:#94a3b8;font-size:13px;font-style:italic;padding:16px;">Loading custom items...</div>
      </div>
    </div>
  `;

  // Restore active tab after re-render
  if (_activeTab !== 'scientist') {
    const tabPanel = document.getElementById('tab-' + _activeTab);
    const tabBtns = document.querySelectorAll('.tabBtn');
    if (tabPanel) {
      document.querySelectorAll('.tabPanel').forEach(p => p.classList.remove('active'));
      tabBtns.forEach(b => b.classList.remove('active'));
      tabPanel.classList.add('active');
      tabBtns.forEach(b => { if (b.getAttribute('data-tab') === _activeTab) b.classList.add('active'); });
    }
  }
  // Load custom items if on shop or custom tab
  if (_activeTab === 'shop' || _activeTab === 'custom') {
    loadCustomShopItems(sd);
  }

  // Restart effect on the big scientist card now that #sciSVGBig exists
  if (typeof WLScientist !== 'undefined') WLScientist._restartEffects(sd);
}

function renderShopSection(title, items, field, sd) {
  const sci   = sd.scientist || {};
  const owned = sci.owned || [];
  const curVal = (field==='head'||field==='face'||field==='pet') ? (sci[field]||null) : sci[field];
  return `<div class="shopSection">
    <div class="shopSectionTitle">${title}</div>
    <div class="shopGrid">${items.map(item => {
      const isOwned   = sd.is_teacher || item.free || owned.includes(item.id) || item.id === '#ffffff' || item.id === 'plain' || item.id === 'none';
      const isEquipped= item.id === curVal || (item.id==='none' && !curVal);
      const canAfford = sd.quarks >= item.cost;
      const reqBadge  = item.requiresBadge;
      const hasReqBadge = sd.is_teacher || !reqBadge || sd.badges.includes(reqBadge);
      const allBadges = [...(WordLabData.ALL_BADGES||[]), ...(WordLabData.LEGENDARY_BADGES||[])];
      const reqBadgeLabel = reqBadge ? (allBadges.find(b=>b.id===reqBadge)||{}).label : '';
      let btn = '';
      if (isEquipped) {
        btn = `<span class="shopBtn equipped">✓ Equipped</span>`;
      } else if (isOwned) {
        btn = `<button class="shopBtn equip" onclick="shopEquip('${field}','${item.id}')">Equip</button>`;
      } else if (!hasReqBadge) {
        btn = `<span class="shopBtn cantafford">🔒 Requires: ${reqBadgeLabel}</span>`;
      } else if (item.cost === 0 && reqBadge) {
        btn = `<button class="shopBtn buy" onclick="shopBuy('${item.id}',0,'${field}')">🏅 Claim Free</button>`;
      } else if (canAfford) {
        btn = `<button class="shopBtn buy" onclick="shopBuy('${item.id}',${item.cost},'${field}')">⚛️ ${item.cost}</button>`;
      } else {
        btn = `<span class="shopBtn cantafford">Need ${item.cost - sd.quarks} more ⚛️</span>`;
      }
      const preview = item.id.startsWith('#') ? `<div class="shopItemIcon" style="width:24px;height:24px;border-radius:50%;background:${item.id};border:2px solid var(--line);margin:0 auto;"></div>` : `<div class="shopItemIcon">${item.icon||'🎨'}</div>`;
      return `<div class="shopItem${isOwned?' owned':''}${item.legendary?' legendary':''}">
        ${preview}
        <div class="shopItemName">${item.name}</div>
        <div class="shopItemCost">${item.free?'Free':item.legendary?'Legendary':(item.cost===0&&item.requiresBadge)?'🏅 Badge':('⚛️ '+item.cost)}</div>
        ${btn}
      </div>`;
    }).join('')}</div>
  </div>`;
}

function renderEffectsSection(sd) {
  if (typeof WLEffects === 'undefined') return '<div style="color:#94a3b8;font-size:13px;">Effects loading...</div>';
  const sci = sd.scientist || {};
  const owned = sci.owned || [];
  const curEffect = sci.effect || null;
  const isTeacher = sd.is_teacher;
  const rarityColors = { common:'#94a3b8', rare:'#3b82f6', epic:'#a855f7', legendary:'#f59e0b' };
  const rarityBg    = { common:'#f8fafc',  rare:'#eff6ff',  epic:'#faf5ff',  legendary:'#fffbeb' };

  return Object.entries(WLEffects.EFFECTS).map(([id, eff]) => {
    const effectOwnId = 'effect_' + id;
    const isOwned = isTeacher || eff.cost === 0 || owned.includes(effectOwnId);
    const hasBadge = isTeacher || !eff.requiresBadge || sd.badges.includes(eff.requiresBadge);
    const canAfford = sd.quarks >= eff.cost;
    const isEquipped = curEffect === id;
    const borderColor = rarityColors[eff.rarity] || '#e2e8f0';
    const bgColor = rarityBg[eff.rarity] || '#fff';

    let btn = '';
    if (!hasBadge) {
      btn = `<span class="shopBtn cantafford" title="Requires ${eff.requiresBadge} badge">🔒 Badge needed</span>`;
    } else if (isOwned && isEquipped) {
      btn = `<button class="shopBtn equipped" onclick="applyEffect(null)">✓ Equipped — Remove</button>`;
    } else if (isOwned) {
      btn = `<button class="shopBtn equip" onclick="applyEffect('${id}')">Equip</button>`;
    } else if (canAfford) {
      btn = `<button class="shopBtn buy" onclick="buyEffect('${id}',${eff.cost})">⚛️ ${eff.cost}</button>`;
    } else {
      btn = `<span class="shopBtn cantafford">Need ${eff.cost - sd.quarks} more ⚛️</span>`;
    }

    return `<div class="shopItem" id="effectCard_${id}" style="border:3px solid ${borderColor};background:${bgColor};position:relative;">
      <div style="font-size:28px;">${eff.icon}</div>
      <div class="shopItemName">${eff.name}</div>
      <div style="font-size:10px;font-weight:700;color:${borderColor};text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;">${eff.rarity}</div>
      <div style="font-size:10px;color:#64748b;text-align:center;margin-bottom:4px;">${eff.desc}</div>
      ${btn}
    </div>`;
  }).join('');
}

function renderCurrentEffect(sd) {
  if (typeof WLEffects === 'undefined') return '';
  const curEffect = (sd.scientist||{}).effect || null;
  if (!curEffect || !WLEffects.EFFECTS[curEffect]) {
    return `<div style="color:#94a3b8;font-size:13px;font-style:italic;">No effect equipped. Visit the shop to add one!</div>`;
  }
  const eff = WLEffects.EFFECTS[curEffect];
  return `<div style="display:flex;align-items:center;gap:10px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;padding:10px 14px;">
    <span style="font-size:24px;">${eff.icon}</span>
    <div>
      <div style="font-size:13px;font-weight:900;color:#312e81;">${eff.name}</div>
      <div style="font-size:11px;color:#64748b;">${eff.desc}</div>
    </div>
    <button style="margin-left:auto;border:none;background:#fee2e2;color:#dc2626;font-weight:800;font-size:11px;border-radius:8px;padding:4px 10px;cursor:pointer;" onclick="applyEffect(null)">Remove</button>
  </div>`;
}

async function applyEffect(effectId) {
  await WordLabData.saveScientist({ effect: effectId });
  await render();
  // render() recreates #sciSVGBig so restart effect afterwards
  if (typeof WLScientist !== 'undefined') {
    const sd = await WordLabData.getStudentData();
    WLScientist._restartEffects(sd);
  }
}

async function buyEffect(effectId, cost) {
  const result = await WordLabData.purchase('effect_' + effectId, cost);
  if (!result.success) { alert('Not enough quarks!'); return; }
  await WordLabData.saveScientist({ effect: effectId });
  if (typeof WLEffects !== 'undefined' && document.getElementById('wlScientistWidget')) {
    WLEffects.start(effectId, document.getElementById('wlScientistWidget'));
  }
  await render();
}

function switchTab(id, btn) {
  _activeTab = id;
  document.querySelectorAll('.tabPanel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'shop' || id === 'custom') {
    WordLabData.getStudentData().then(sd => { if (sd) loadCustomShopItems(sd); });
  }
}

async function applyOption(field, value) {
  const updates = {};
  updates[field] = value === 'null' ? null : value;
  await WordLabData.saveScientist(updates);
  const sci = await WordLabData.getScientist();
  document.getElementById('sciSVGBig').innerHTML = WLScientist.buildSVG(sci, 'neutral');
  await render();
}

async function shopBuy(itemId, cost, field) {
  const result = await WordLabData.purchase(itemId, cost);
  if (!result.success) { alert('Not enough quarks!'); return; }
  const updates = {};
  updates[field] = itemId;
  if (field==='head'||field==='face'||field==='pet') updates[field] = itemId==='none'?null:itemId;
  await WordLabData.saveScientist(updates);
  await render();
}

async function shopEquip(field, itemId) {
  const updates = {};
  updates[field] = (itemId==='none' || itemId==='null') ? null : itemId;
  await WordLabData.saveScientist(updates);
  await render();
}

// Cache of custom shop items: id → { item_type, image_data } (image_data = URL or base64)
let _customItemsData = {};

async function loadCustomShopItems(sd) {
  const section = document.getElementById('customItemsSection');
  const grid    = document.getElementById('customItemsGrid');
  const tabGrid = document.getElementById('customItemsGridTab');
  const tabEmpty = document.getElementById('customItemsTabEmpty');
  if (!section && !grid && !tabGrid) return;

  let items;
  try {
    const { data, error } = await getSciSb().from('shop_items').select('id,name,item_type,rarity,unlock_method,quark_cost,is_active,available_from,available_until,milestone_type,milestone_threshold,secret_code,limited_days,release_date,image_url,image_data').eq('is_active', true);
    if (error) throw error;
    items = data || [];
  } catch(e) {
    return; // silently fail — custom items are optional
  }

  // Populate cache so equipCustomItem can find image_data without another DB call
  _customItemsData = {};
  items.forEach(item => { _customItemsData[item.id] = { item_type: item.item_type, image_data: item.image_url || item.image_data }; });

  const today   = new Date();
  const dayOfWk = today.getDay(); // 0=Sun, 6=Sat
  const isWeekend = (dayOfWk === 0 || dayOfWk === 6);

  const visible = items.filter(item => {
    const m = item.unlock_method;
    if (m === 'purchase' || m === 'gifted' || m === 'milestone' || m === 'secret_code') return true;
    if (m === 'seasonal') {
      const from  = item.available_from  ? new Date(item.available_from)  : null;
      const until = item.available_until ? new Date(item.available_until) : null;
      return (!from || today >= from) && (!until || today <= until);
    }
    if (m === 'weekend') return isWeekend;
    if (m === 'limited') {
      const release = item.release_date ? new Date(item.release_date) : null;
      if (!release) return false;
      const days = item.limited_days || 30;
      const expiry = new Date(release.getTime() + days * 86400000);
      return today <= expiry;
    }
    return true;
  });

  if (!visible.length) {
    if (tabEmpty) tabEmpty.textContent = 'No custom items available yet. Your teacher can create items in the Item Creator!';
    return;
  }
  if (section) section.style.display = 'block';

  const rarityBorder = { common:'#94a3b8', rare:'#3b82f6', epic:'#a855f7', legendary:'#f59e0b' };
  const owned = (sd.scientist||{}).owned || [];
  const isTeacher = sd.is_teacher;

  const itemsHtml = visible.map(item => {
    const border = rarityBorder[item.rarity] || '#e2e8f0';
    const isOwned = isTeacher || owned.includes('custom_' + item.id);
    const canAfford = isTeacher || sd.quarks >= (item.quark_cost || 0);

    let preview = '';
    const imgSrc = item.image_url || item.image_data;
    if (imgSrc) {
      preview = `<img src="${imgSrc}" style="width:60px;height:60px;object-fit:contain;border-radius:6px;" alt="${item.name}">`;
    } else {
      preview = `<div style="font-size:28px;">🎨</div>`;
    }

    const equippedSlot = ((sd.scientist||{}).customSlots||{})[item.item_type];
    const isEquipped = equippedSlot === item.id;
    let btn = '';
    if (isTeacher || isOwned) {
      btn = `<button class="shopBtn equip" onclick="equipCustomItem('${item.id}')">${isEquipped ? '✓ Equipped' : 'Equip'}</button>`;
    } else if (item.unlock_method === 'secret_code') {
      btn = `<button class="shopBtn buy" onclick="enterSecretCode('${item.id}','${(item.secret_code||'').replace(/'/g,"\\'")}')">🔑 Enter Code</button>`;
    } else if (item.unlock_method === 'gifted') {
      btn = `<span class="shopBtn cantafford">🎁 Teacher gift</span>`;
    } else if (item.unlock_method === 'milestone') {
      btn = `<span class="shopBtn cantafford">🏅 Milestone ${item.milestone_threshold||'?'}</span>`;
    } else if (canAfford && item.quark_cost > 0) {
      btn = `<button class="shopBtn buy" onclick="buyCustomItem('${item.id}',${item.quark_cost},'${item.item_type}')">⚛️ ${item.quark_cost}</button>`;
    } else if (item.quark_cost === 0) {
      btn = `<button class="shopBtn equip" onclick="equipCustomItem('${item.id}')">Claim Free</button>`;
    } else {
      btn = `<span class="shopBtn cantafford">Need ${(item.quark_cost||0)-sd.quarks} more ⚛️</span>`;
    }

    return `<div class="shopItem" style="border:3px solid ${border};">
      ${preview}
      <div class="shopItemName">${item.name}</div>
      <div class="shopItemCost" style="font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;">${item.rarity}</div>
      ${btn}
    </div>`;
  }).join('');

  if (grid) grid.innerHTML = itemsHtml;
  // Also populate the dedicated Custom tab grid
  if (tabGrid) { tabGrid.innerHTML = itemsHtml; }
  if (tabEmpty) { tabEmpty.style.display = 'none'; }
}

async function enterSecretCode(itemId, correctCode) {
  const entered = prompt('Enter the secret code:');
  if (!entered) return;
  if (entered.trim().toUpperCase() === correctCode.toUpperCase()) {
    await claimCustomItem(itemId, 'custom');
    alert('Correct! Item unlocked!');
  } else {
    alert('That\'s not quite right. Try again!');
  }
}

async function buyCustomItem(itemId, cost, type) {
  const result = await WordLabData.purchase('custom_' + itemId, cost);
  if (!result.success) { alert('Not enough quarks!'); return; }
  await render();
}

async function claimCustomItem(itemId, type) {
  const current = await WordLabData.getScientist();
  const owned = current.owned || [];
  if (!owned.includes('custom_' + itemId)) {
    await WordLabData.saveScientist({ owned: [...owned, 'custom_' + itemId] });
  }
  await render();
}

async function equipCustomItem(itemId) {
  const cached = _customItemsData[itemId];
  if (!cached) return;
  const itemType = cached.item_type;
  const imageData = cached.image_data;

  // Ensure item is in owned list
  const current = await WordLabData.getScientist();
  const owned = current.owned || [];
  const customSlots = Object.assign({}, current.customSlots || {});
  const updates = {};

  if (!owned.includes('custom_' + itemId)) {
    updates.owned = [...owned, 'custom_' + itemId];
  }

  // Toggle: if already equipped in this slot, unequip; otherwise equip
  if (customSlots[itemType] === itemId) {
    customSlots[itemType] = null;
  } else {
    customSlots[itemType] = itemId;
    // Store image_data in the slot so buildSVG can render it without a DB call
    customSlots['_img_' + itemType] = imageData;
  }
  updates.customSlots = customSlots;

  await WordLabData.saveScientist(updates);
  await render();
}
