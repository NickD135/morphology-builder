<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Word Spectrum</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f5f5; --panel:#ffffff; --line:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --cyan:#0e7490; --cyan-2:#0891b2; --cyan-soft:#ecfeff; --cyan-line:#a5f3fc; --cyan-text:#164e63;
      --indigo:#4338ca; --indigo-2:#6366f1;
      --ok:#15803d; --warn:#b45309; --bad:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; letter-spacing:.02em; }
    button,input{ font:inherit; }

    /* ── Polarity Physics Lab scene ── */
    html,body{ width:100%; height:100%; overflow:hidden; }
    .lab-scene{ position:fixed; inset:0; z-index:0; display:flex; flex-direction:column; pointer-events:none; }

    /* Deep space blue-charcoal wall — physics/electromagnetics */
    .lab-wall{
      flex:0 0 62%; background:#0c1220; position:relative; overflow:hidden;
    }
    /* Circuit board grid lines on wall */
    .lab-wall::before{
      content:''; position:absolute; inset:0;
      background:
        repeating-linear-gradient(0deg, transparent 0, transparent 39px, rgba(14,116,144,.12) 40px),
        repeating-linear-gradient(90deg, transparent 0, transparent 39px, rgba(14,116,144,.12) 40px);
    }
    /* Glowing circuit traces */
    .lab-wall::after{
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 60% 30% at 50% 100%, rgba(14,116,144,.08) 0%, transparent 70%),
        radial-gradient(circle 2px at 20% 30%, rgba(14,116,144,.6) 0%, transparent 2px),
        radial-gradient(circle 2px at 80% 45%, rgba(14,116,144,.5) 0%, transparent 2px),
        radial-gradient(circle 2px at 35% 70%, rgba(14,116,144,.4) 0%, transparent 2px),
        radial-gradient(circle 2px at 65% 20%, rgba(14,116,144,.5) 0%, transparent 2px),
        radial-gradient(circle 1px at 50% 55%, rgba(14,116,144,.7) 0%, transparent 1px);
    }

    /* Spectrum display screens on wall */
    .wall-screen{
      position:absolute; background:#060d18; border:2px solid #0e7490;
      border-radius:6px; padding:8px 12px;
      box-shadow:0 0 12px rgba(14,116,144,.3), inset 0 0 20px rgba(0,0,0,.5);
    }
    .wall-screen-left{ left:18px; top:12%; width:110px; }
    .wall-screen-right{ right:18px; top:12%; width:110px; }
    .screen-label{ font-size:7px; font-weight:900; letter-spacing:.2em; color:#0891b2; text-transform:uppercase; margin-bottom:4px; }
    .screen-wave{
      width:100%; height:28px; position:relative; overflow:hidden;
    }
    .screen-wave svg{ width:100%; height:100%; }

    /* Polarity meter at top centre */
    .polarity-meter{
      position:absolute; top:6%; left:50%; transform:translateX(-50%);
      width:180px; background:#060d18; border:2px solid #0e7490; border-radius:8px;
      padding:8px 12px; box-shadow:0 0 16px rgba(14,116,144,.25);
      text-align:center;
    }
    .meter-label{ font-size:7px; font-weight:900; letter-spacing:.2em; color:#22d3ee; text-transform:uppercase; margin-bottom:6px; }
    .meter-bar-wrap{ display:flex; align-items:center; gap:4px; }
    .meter-pole{ font-size:8px; font-weight:900; }
    .meter-pole.neg{ color:#f87171; }
    .meter-pole.pos{ color:#34d399; }
    .meter-track{ flex:1; height:6px; background:#0f2d3d; border-radius:3px; position:relative; overflow:visible; }
    .meter-needle{
      position:absolute; top:50%; width:10px; height:10px; border-radius:50%;
      background:#22d3ee; transform:translate(-50%,-50%);
      box-shadow:0 0 6px rgba(34,211,238,.8);
      animation:needlePulse 2s ease-in-out infinite;
      left:50%;
      transition:left .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes needlePulse{ 0%,100%{box-shadow:0 0 4px rgba(34,211,238,.6)} 50%{box-shadow:0 0 10px rgba(34,211,238,1)} }

    /* Magnetic coils on left and right walls */
    .magnet-left{
      position:absolute; left:0; top:25%; width:24px; height:110px;
      background:linear-gradient(180deg, #dc2626 0%, #dc2626 50%, #1d4ed8 50%, #1d4ed8 100%);
      border-radius:0 6px 6px 0;
      box-shadow:4px 0 16px rgba(220,38,38,.3);
    }
    .magnet-right{
      position:absolute; right:0; top:25%; width:24px; height:110px;
      background:linear-gradient(180deg, #1d4ed8 0%, #1d4ed8 50%, #dc2626 50%, #dc2626 100%);
      border-radius:6px 0 0 6px;
      box-shadow:-4px 0 16px rgba(29,78,216,.3);
    }
    .magnet-label{ writing-mode:vertical-rl; font-size:7px; font-weight:900; letter-spacing:.15em; color:rgba(255,255,255,.8); padding:4px; text-align:center; }

    /* Field lines animation */
    .field-lines{
      position:absolute; top:25%; left:24px; right:24px; height:110px;
      overflow:hidden; opacity:.25;
    }
    .field-lines svg{ width:100%; height:100%; }

    /* Equipment on wall shelves */
    .wall-shelf{ position:absolute; left:0; right:0; height:6px; background:#1e3a5f; border-bottom:2px solid #0e4d6e; }
    .wall-shelf-1{ top:55%; }
    .wall-shelf-2{ top:75%; }
    .shelf-eq{ position:absolute; bottom:6px; display:flex; align-items:flex-end; gap:8px; }
    .shelf-eq-left{ left:16px; }
    .shelf-eq-right{ right:16px; }

    /* Floor — steel plating */
    .lab-floor{
      flex:0 0 38%;
      background:repeating-linear-gradient(90deg, #0f1c2e 0, #0f1c2e 60px, #0c1820 60px, #0c1820 120px);
      position:relative; border-top:4px solid #0e7490;
      box-shadow:0 -4px 20px rgba(14,116,144,.15);
    }
    .floor-glow{
      position:absolute; top:0; left:0; right:0; height:40px;
      background:linear-gradient(180deg, rgba(14,116,144,.08) 0%, transparent 100%);
    }
    .lab-bench-phys{
      position:absolute; bottom:0; height:70%; width:160px;
      background:#0c1e30; border-top:6px solid #1e4060; border-radius:4px 4px 0 0;
    }
    .lab-bench-phys.left{ left:10px; }
    .lab-bench-phys.right{ right:10px; }
    .bench-top-phys{
      position:absolute; top:-14px; left:-6px; right:-6px; height:14px;
      background:#1e4060; border-radius:4px 4px 0 0; border-top:2px solid #2a5580;
    }

    /* Floating particles - electric blue */
    #particles{ position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
    .particle{ position:absolute; bottom:-10px; border-radius:50%; animation:particleFloat linear infinite; }
    @keyframes particleFloat{ from{transform:translateY(0) translateX(0);opacity:.8;} to{transform:translateY(calc(-100vh - 20px)) translateX(var(--dx,10px));opacity:0;} }

    /* ── Header ── */
    .header{ position:fixed!important; top:0!important; left:0!important; right:0!important; width:100%!important; z-index:50; background:rgba(6,13,24,.75)!important; backdrop-filter:blur(12px)!important; -webkit-backdrop-filter:blur(12px)!important; border-bottom:1px solid rgba(14,116,144,.25)!important; box-shadow:0 1px 12px rgba(14,116,144,.1)!important; padding:0!important; }
    .headerInner{ padding:0 20px!important; height:56px!important; display:flex!important; align-items:center!important; justify-content:space-between; gap:12px; flex-wrap:wrap; max-width:none!important; }
    .brand{ display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .brandIcon{ width:36px!important; height:36px!important; border-radius:10px; background:var(--cyan)!important; color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px!important; box-shadow:0 0 12px rgba(14,116,144,.4); }
    .brandText h1{ margin:0; font-size:15px!important; font-weight:900; color:#e0f2fe!important; }
    .brandText .sub{ font-size:9px; text-transform:uppercase; letter-spacing:.22em; color:#22d3ee!important; font-weight:900; margin-top:2px; display:block; }
    .hud{ display:flex; gap:8px; align-items:center; flex-wrap:nowrap!important; overflow-x:auto!important; }
    .hud::-webkit-scrollbar{ display:none; }
    .pill{ display:inline-flex; align-items:center; justify-content:center; min-height:32px!important; border:1px solid rgba(14,116,144,.25)!important; border-radius:999px; background:rgba(14,116,144,.1)!important; padding:6px 14px; font-size:12px!important; font-weight:800; color:#a5f3fc!important; white-space:nowrap; flex-shrink:0; }
    .pill.score{ background:rgba(14,116,144,.35)!important; color:#e0f2fe!important; border-color:transparent!important; }
    .pill.streak{ background:rgba(251,146,60,.12)!important; color:#fed7aa!important; border-color:rgba(251,146,60,.25)!important; }
    .topBtn{ border:none; background:rgba(14,116,144,.2)!important; color:#a5f3fc!important; font-weight:800; font-size:11px!important; text-transform:uppercase; letter-spacing:.12em; padding:8px 14px!important; border-radius:10px!important; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; white-space:nowrap; flex-shrink:0; transition:background .15s; }
    .topBtn:hover{ background:rgba(14,116,144,.35)!important; }
    #wlLoginBtn{ border:1px solid rgba(14,116,144,.25)!important; background:rgba(14,116,144,.1)!important; color:#a5f3fc!important; border-radius:10px!important; white-space:nowrap!important; flex-shrink:0!important; }

    /* ── Game panel ── */
    .wrap{
      position:fixed!important; top:56px!important; bottom:0!important; left:50%!important;
      transform:translateX(-50%)!important; width:75vw!important; max-width:none!important;
      margin:0!important; z-index:10; display:flex!important; flex-direction:column!important;
      justify-content:center!important; padding:16px 0!important; overflow-y:auto;
    }
    .wrap::-webkit-scrollbar{ width:0; }

    .panel{
      background:rgba(6,20,35,.88)!important;
      backdrop-filter:blur(16px)!important; -webkit-backdrop-filter:blur(16px)!important;
      border:2px solid rgba(14,116,144,.35)!important;
      box-shadow:0 16px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(14,116,144,.1), inset 0 1px 0 rgba(14,116,144,.15)!important;
      border-radius:20px!important;
    }
    .panelInner{ padding:18px 22px!important; }

    /* Fuel bar - electric charge style */
    .bar{ width:100%; height:8px!important; background:rgba(14,116,144,.12)!important; border-radius:999px; overflow:hidden; }
    .barFill{ height:100%; width:100%; background:linear-gradient(90deg,#dc2626 0%,#f59e0b 40%,#06b6d4 70%,#22d3ee 100%); transition:width .2s linear; border-radius:999px; }

    /* Mode selector tabs */
    .modeSel{
      border:1.5px solid rgba(14,116,144,.3); background:rgba(14,116,144,.08); border-radius:10px;
      padding:7px 16px; font-weight:800; font-size:11px; text-transform:uppercase;
      letter-spacing:.1em; cursor:pointer; color:#7dd3fc;
      font-family:'Lexend',sans-serif; transition:all .15s;
    }
    .modeSel.active{ background:#0e7490!important; color:#e0f2fe!important; border-color:#0e7490!important; box-shadow:0 0 12px rgba(14,116,144,.4); }
    .modeSel:hover:not(.active){ border-color:rgba(14,116,144,.5); color:#a5f3fc; }

    /* Target word display */
    .targetWord{
      font-size:clamp(28px,6vw,52px); font-weight:900; color:#e0f2fe;
      text-align:center; letter-spacing:-.02em; line-height:1;
      text-shadow:0 0 30px rgba(14,116,144,.4);
      margin:6px 0;
    }
    .targetLabel{
      font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em;
      color:#22d3ee; text-align:center; margin-bottom:4px;
    }
    .targetClue{
      font-size:13px; font-weight:600; color:#7dd3fc; text-align:center; margin-bottom:12px;
    }
    .targetClue strong{ color:#22d3ee; }

    /* Bubble buttons — cyan theme */
    .options{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin:8px 0 14px; }
    .bubbleBtn{
      width:110px; height:110px; border-radius:999px; border:3px solid;
      background:rgba(6,20,35,.9); cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
      animation:float 3s ease-in-out infinite;
      display:flex; align-items:center; justify-content:center;
    }
    .bubbleBtn:hover{ transform:translateY(-4px) scale(1.04); }
    .bubbleBtn:disabled{ opacity:.45; cursor:not-allowed; transform:none!important; animation:none; }
    .bubbleBtn.cyan{ border-color:#a5f3fc; color:#a5f3fc; }
    .bubbleBtn.cyan:hover{ box-shadow:0 8px 24px rgba(14,116,144,.4); }
    .bubbleBtn.teal{ border-color:#5eead4; color:#5eead4; }
    .bubbleBtn.teal:hover{ box-shadow:0 8px 24px rgba(20,184,166,.35); }
    .bubbleBtn.sky{ border-color:#7dd3fc; color:#7dd3fc; }
    .bubbleBtn.sky:hover{ box-shadow:0 8px 24px rgba(14,116,144,.3); }
    .bubbleBtn.ice{ border-color:#bae6fd; color:#bae6fd; }
    .bubbleBtn.ice:hover{ box-shadow:0 8px 24px rgba(186,230,253,.2); }
    .bubbleInner{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; height:100%; padding:10px; text-align:center; }
    .bubbleInner span{ font-size:15px; font-weight:900; line-height:1.2; }
    @keyframes float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

    /* Spectrum mode - the bar */
    .spectrumWrap{ padding:8px 0 16px; }
    .spectrumAnchors{ display:flex; justify-content:space-between; margin-bottom:6px; }
    .spectrumAnchor{ font-size:13px; font-weight:900; padding:6px 14px; border-radius:10px; color:#e0f2fe; }
    .spectrumAnchor.neg{ background:rgba(220,38,38,.25); border:1.5px solid rgba(220,38,38,.4); color:#fca5a5; }
    .spectrumAnchor.pos{ background:rgba(34,211,238,.15); border:1.5px solid rgba(34,211,238,.3); color:#a5f3fc; }
    .spectrumBar{
      height:10px; border-radius:5px;
      background:linear-gradient(90deg, rgba(220,38,38,.4) 0%, rgba(251,146,60,.3) 25%, rgba(234,179,8,.2) 50%, rgba(34,211,238,.2) 75%, rgba(14,116,144,.4) 100%);
      border:1.5px solid rgba(14,116,144,.25);
      margin-bottom:10px;
    }
    .spectrumTrack{
      display:flex; gap:8px;
      margin-bottom:16px;
    }
    .spectrumZone{
      flex:1; min-width:0; min-height:52px; border-radius:12px;
      background:rgba(14,116,144,.1); border:2px dashed rgba(14,116,144,.4);
      cursor:pointer; transition:all .2s;
      display:flex; align-items:center; justify-content:center;
      padding:6px 4px;
    }
    .spectrumZone:hover{ background:rgba(14,116,144,.2); border-color:rgba(14,116,144,.7); }
    .spectrumZone.filled{ background:rgba(14,116,144,.5); border-color:#22d3ee; border-style:solid; }
    .spectrumZone.correct{ background:rgba(22,163,74,.4)!important; border-color:#4ade80!important; box-shadow:0 0 8px rgba(74,222,128,.4); }
    .spectrumZone.wrong{ background:rgba(220,38,38,.4)!important; border-color:#f87171!important; }
    .spectrumZone .zone-label{
      font-size:12px; font-weight:900; color:#a5f3fc; text-align:center;
      word-break:break-word; line-height:1.2;
    }

    /* Spectrum word tiles to drag/click */
    .spectrumWords{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .spectrumWord{
      padding:8px 16px; border-radius:12px; border:2px solid rgba(14,116,144,.35);
      background:rgba(14,116,144,.12); color:#a5f3fc; font-size:14px; font-weight:900;
      cursor:pointer; transition:all .15s; user-select:none;
    }
    .spectrumWord:hover:not(.placed){ background:rgba(14,116,144,.25); border-color:rgba(14,116,144,.6); transform:translateY(-2px); }
    .spectrumWord.placed{ opacity:.35; cursor:default; transform:none; }
    .spectrumWord.selected{ background:rgba(14,116,144,.4); border-color:#22d3ee; box-shadow:0 0 10px rgba(34,211,238,.3); }

    /* Spectrum slot targets */
    .spectrumSlots{ display:flex; justify-content:space-around; margin-top:28px; }
    .spectrumSlot{
      display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
    }
    .slotCircle{
      width:42px; height:42px; border-radius:50%;
      border:2px dashed rgba(14,116,144,.4); background:rgba(14,116,144,.06);
      display:flex; align-items:center; justify-content:center; font-size:11px;
      font-weight:900; color:rgba(14,116,144,.5); transition:all .2s;
    }
    .slotCircle:hover{ border-color:#22d3ee; background:rgba(14,116,144,.15); color:#22d3ee; }
    .slotCircle.has-word{ background:rgba(14,116,144,.3); border-color:#22d3ee; border-style:solid; color:#e0f2fe; font-size:10px; padding:2px; }
    .slotCircle.correct{ background:rgba(22,163,74,.2); border-color:#4ade80; border-style:solid; }
    .slotCircle.wrong{ background:rgba(220,38,38,.2); border-color:#f87171; border-style:solid; }
    .slotLabel{ font-size:9px; font-weight:900; color:#4b8da8; text-transform:uppercase; letter-spacing:.08em; text-align:center; max-width:60px; }

    /* Feedback */
    .feedback{ min-height:24px; text-align:center; font-size:20px; font-weight:900; }
    .feedback.ok{ color:#4ade80; }
    .feedback.bad{ color:#f87171; }
    .subFeedback{ min-height:20px; text-align:center; color:#7dd3fc; font-weight:700; margin-top:4px; line-height:1.5; font-size:13px; }

    /* Buttons */
    .actionRow{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .secondaryBtn{ border:1.5px solid rgba(14,116,144,.3); background:rgba(14,116,144,.1); color:#7dd3fc; font-weight:800; font-size:12px; padding:10px 18px; border-radius:12px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; transition:all .15s; }
    .secondaryBtn:hover{ background:rgba(14,116,144,.2); }
    .primaryBtn{ border:none; background:#0e7490; color:#e0f2fe; font-weight:900; font-size:12px; padding:12px 24px; border-radius:12px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; box-shadow:0 8px 20px rgba(14,116,144,.3); transition:all .15s; }
    .primaryBtn:hover{ background:#0891b2; transform:translateY(-1px); }

    /* Scientist */
    .scientist-stage{ position:fixed; right:0; width:calc((100vw - 75vw)/2); top:56px; bottom:0; z-index:11; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #sciCharWrap{ width:120px; height:150px; display:flex; align-items:flex-end; justify-content:center; animation:sciIdle 3s ease-in-out infinite; }
    #sciCharWrap.sci-correct{ animation:sciJump .6s ease-out; }
    #sciCharWrap.sci-wrong{ animation:sciShake .5s ease-out; }
    #sciCharWrap.sci-streak{ animation:sciDance .8s ease-in-out infinite; }
    @keyframes sciIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes sciJump{0%{transform:translateY(0)}30%{transform:translateY(-22px)}100%{transform:translateY(0)}}
    @keyframes sciShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg) translateX(-4px)}40%{transform:rotate(4deg) translateX(4px)}60%{transform:rotate(-3deg) translateX(-3px)}80%{transform:rotate(2deg)}}
    @keyframes sciDance{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}

    /* Left prop */
    .scene-prop-left{ position:fixed; left:0; width:calc((100vw - 75vw)/2); top:56px; bottom:0; z-index:11; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }

    /* Flash states */
    .flashSuccess{ box-shadow:0 0 0 3px rgba(74,222,128,.5), 0 16px 48px rgba(0,0,0,.5)!important; border-color:rgba(74,222,128,.5)!important; }
    .flashFail{ box-shadow:0 0 0 3px rgba(248,113,113,.4), 0 16px 48px rgba(0,0,0,.5)!important; border-color:rgba(248,113,113,.4)!important; }

    @media(max-width:700px){
      .lab-scene{ display:none; }
      body{ background:linear-gradient(160deg,#061220 0%,#0e7490 60%,#22d3ee 100%)!important; overflow-y:auto!important; }
      .wrap{ width:calc(100vw - 24px)!important; position:relative!important; top:auto; bottom:auto; left:auto; transform:none; justify-content:flex-start!important; padding-top:72px!important; }
      .scientist-stage,.scene-prop-left{ display:none!important; }
    }
    @media(max-width:480px){
      .wrap{width:min(680px,95vw)!important;}
    }
  </style>
</head>
<body>

<!-- ── Physics Lab Scene ── -->
<div class="lab-scene" aria-hidden="true">
  <div class="lab-wall">
    <!-- Polarity meter at top centre -->
    <div class="polarity-meter">
      <div class="meter-label">⚡ Polarity Meter</div>
      <div class="meter-bar-wrap">
        <span class="meter-pole neg">N−</span>
        <div class="meter-track">
          <div class="meter-needle" id="meterNeedle"></div>
        </div>
        <span class="meter-pole pos">S+</span>
      </div>
    </div>

    <!-- Left magnet -->
    <div class="magnet-left">
      <div class="meter-label" style="writing-mode:vertical-rl;color:rgba(255,255,255,.7);font-size:7px;font-weight:900;letter-spacing:.1em;padding:6px 2px;">N</div>
    </div>

    <!-- Right magnet -->
    <div class="magnet-right" style="display:flex;align-items:center;justify-content:center;">
      <div style="writing-mode:vertical-rl;color:rgba(255,255,255,.7);font-size:7px;font-weight:900;letter-spacing:.1em;padding:6px 2px;">S</div>
    </div>

    <!-- Magnetic field lines -->
    <div class="field-lines">
      <svg viewBox="0 0 400 110" preserveAspectRatio="none">
        <path d="M0 55 Q100 10 200 55 Q300 100 400 55" stroke="#22d3ee" stroke-width="1" fill="none"/>

  { word:"endorse",     options:["condemn","support","approve"],       correct:"condemn",    explain:"Endorse means to approve — condemn means to express strong disapproval." },
  { word:"amplify",     options:["diminish","increase","magnify"],     correct:"diminish",   explain:"Amplify means to increase — diminish means to make smaller or weaker." },
  { word:"transparent", options:["opaque","clear","visible"],          correct:"opaque",     explain:"Transparent means see-through — opaque means impossible to see through." },
];

const EXT_SPECTRUM_SETS = [
  {
    label:"Certainty",
    leftAnchor:"UNCERTAIN", rightAnchor:"DEFINITIVE",
    words:["doubtful","possible","probable","likely","certain","conclusive"],
    order:[0,1,2,3,4,5],
    clue:"Arrange from least to most certain"
  },
  {
    label:"Formality",
    leftAnchor:"COLLOQUIAL", rightAnchor:"FORMAL",
    words:["slang","casual","informal","neutral","professional","academic"],
    order:[0,1,2,3,4,5],
    clue:"Arrange from most informal to most formal"
  },
  {
    label:"Complexity",
    leftAnchor:"SIMPLE", rightAnchor:"INTRICATE",
    words:["basic","straightforward","moderate","involved","complex","elaborate"],
    order:[0,1,2,3,4,5],
    clue:"Arrange from simplest to most complex"
  },
];

// Apply extension mode
(function(){
  if(typeof WordLabData !== 'undefined' && WordLabData.isExtensionMode && WordLabData.isExtensionMode()){
    SYNONYM_PAIRS.push(...EXT_SYNONYM_PAIRS);
    ANTONYM_PAIRS.push(...EXT_ANTONYM_PAIRS);
    SPECTRUM_SETS.push(...EXT_SPECTRUM_SETS);
  }
})();

// ─────────────────────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────────────────────
let mode = 'synonym';
let score = 0, streak = 0, fuel = 100;
let currentQuestion = null, buttonsLocked = false, fuelInterval = null;
let spectrumSelected = null;
let spectrumPlaced = {}; // slotIndex -> word

const targetWordEl   = document.getElementById('targetWord');
const targetLabelEl  = document.getElementById('targetLabel');
const targetClueEl   = document.getElementById('targetClue');
const optionsEl      = document.getElementById('options');
const spectrumAreaEl = document.getElementById('spectrumArea');
const feedbackEl     = document.getElementById('feedback');
const subFeedbackEl  = document.getElementById('subFeedback');
const scorePillEl    = document.getElementById('scorePill');
const streakPillEl   = document.getElementById('streakPill');
const fuelBarEl      = document.getElementById('fuelBar');
const fuelLabelEl    = document.getElementById('fuelLabel');
const missionSubEl   = document.getElementById('missionSubLabel');
const gameCardEl     = document.getElementById('gameCard');
const meterNeedle    = document.getElementById('meterNeedle');

function shuffleArray(arr){ return [...arr].sort(() => Math.random() - .5); }

function updateHud(){
  scorePillEl.textContent = `${score} XP`;
  streakPillEl.textContent = `⚡ Streak: ${streak}`;
  fuelBarEl.style.width = `${Math.max(fuel, 0)}%`;
  fuelLabelEl.textContent = `${Math.max(Math.round(fuel), 0)}%`;
}

function animateMeter(dir){
  // dir: 'left' = antonym (opposite poles), 'right' = synonym (same), 'centre' = spectrum
  const pct = dir === 'left' ? '15%' : dir === 'right' ? '85%' : '50%';
  meterNeedle.style.left = pct;
}

function setMode(m){
  mode = m;
  ['synonym','antonym','spectrum'].forEach(x => {
    document.getElementById('mode'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===m);
  });
  score = 0; streak = 0; fuel = 100; updateHud();
  loadQuestion();
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNONYM / ANTONYM MODE
// ─────────────────────────────────────────────────────────────────────────────
function loadSynonymAntonym(){
  optionsEl.style.display = 'flex';
  spectrumAreaEl.style.display = 'none';
  const pool = mode === 'synonym' ? SYNONYM_PAIRS : ANTONYM_PAIRS;
  currentQuestion = pool[Math.floor(Math.random() * pool.length)];
  const q = currentQuestion;

  targetLabelEl.textContent = mode === 'synonym' ? '≈ Find the Synonym' : '≠ Find the Antonym';
  targetWordEl.textContent = q.word.toUpperCase();
  targetClueEl.innerHTML = mode === 'synonym'
    ? 'Pick the word <strong>closest in meaning</strong>'
    : 'Pick the word <strong>opposite in meaning</strong>';

  missionSubEl.textContent = `Active Mission · Word Spectrum · Find the ${mode}`;
  animateMeter(mode === 'synonym' ? 'right' : 'left');

  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  subFeedbackEl.textContent = '';
  optionsEl.innerHTML = '';
  buttonsLocked = false;

  const colours = ['cyan','teal','sky','ice'];
  shuffleArray(q.options).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `bubbleBtn ${colours[i % colours.length]}`;
    btn.style.animationDelay = `${i * .22}s`;
    btn.type = 'button';
    const inner = document.createElement('div');
    inner.className = 'bubbleInner';
    const span = document.createElement('span');
    span.textContent = opt.toUpperCase();
    if(opt.length > 8) span.style.fontSize = '10px';
    else if(opt.length > 6) span.style.fontSize = '12px';
    inner.appendChild(span);
    btn.appendChild(inner);
    btn.addEventListener('click', () => checkSynonymAntonym(opt));
    optionsEl.appendChild(btn);
  });
}

function lockButtons(){ optionsEl.querySelectorAll('button').forEach(b => b.disabled = true); }

function checkSynonymAntonym(choice){
  if(buttonsLocked || fuel <= 0) return;
  buttonsLocked = true;
  lockButtons();
  const q = currentQuestion;
  const correct = choice === q.correct;
  const cat = mode + ':' + q.word;

  if(correct){
    score += 50 + (streak * 10); streak++; fuel = Math.min(fuel + 8, 100);
    if(typeof WordLabData !== 'undefined' && WordLabData.getSession()){
      const res = WordLabData.recordAttempt('word-spectrum', cat, true, 0);
      if(typeof WLScientist !== 'undefined') WLScientist.react('correct', res);
    }
    if(typeof WLAudio !== 'undefined'){ WLAudio.correct(); if(streak >= 3) WLAudio.streak(streak); }
    feedbackEl.textContent = '✅ Correct!';
    feedbackEl.className = 'feedback ok';
    subFeedbackEl.textContent = q.explain;
    gameCardEl.classList.add('flashSuccess');
    setTimeout(() => gameCardEl.classList.remove('flashSuccess'), 600);
  } else {
    streak = 0; fuel = Math.max(fuel - 12, 0);
    if(typeof WordLabData !== 'undefined' && WordLabData.getSession()) WordLabData.recordAttempt('word-spectrum', cat, false, 0);
    if(typeof WLScientist !== 'undefined') WLScientist.react('wrong');
    if(typeof WLAudio !== 'undefined') WLAudio.wrong();
    feedbackEl.textContent = '❌ Not quite';
    feedbackEl.className = 'feedback bad';
    subFeedbackEl.textContent = `${mode === 'synonym' ? 'Synonym' : 'Antonym'} of "${q.word.toUpperCase()}" is "${q.correct.toUpperCase()}" — ${q.explain}`;
    gameCardEl.classList.add('flashFail');
    setTimeout(() => gameCardEl.classList.remove('flashFail'), 600);
  }
  updateHud();
  if(fuel <= 0){ setTimeout(endGame, 800); return; }
  setTimeout(loadQuestion, 1600);
}

// ─────────────────────────────────────────────────────────────────────────────
// SPECTRUM MODE
// ─────────────────────────────────────────────────────────────────────────────
function loadSpectrum(){
  optionsEl.style.display = 'none';
  spectrumAreaEl.style.display = 'block';
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  subFeedbackEl.textContent = '';
  animateMeter('centre');
  spectrumSelected = null;
  spectrumPlaced = {};

  const pool = SPECTRUM_SETS;
  currentQuestion = pool[Math.floor(Math.random() * pool.length)];
  const q = currentQuestion;

  targetLabelEl.textContent = `〜 ${q.label} Spectrum`;
  targetWordEl.textContent = q.label.toUpperCase();
  targetClueEl.innerHTML = `<strong>${q.clue}</strong>`;
  missionSubEl.textContent = `Active Mission · Word Spectrum · Arrange the words in order`;

  document.getElementById('specAnchorLeft').textContent = q.leftAnchor;
  document.getElementById('specAnchorRight').textContent = q.rightAnchor;

  // Render word tiles
  const wordsEl = document.getElementById('spectrumWords');
  wordsEl.innerHTML = '';
  const shuffled = shuffleArray([...q.words]);
  shuffled.forEach(word => {
    const tile = document.createElement('div');
    tile.className = 'spectrumWord';
    tile.textContent = word.toUpperCase();
    tile.dataset.word = word;
    tile.addEventListener('click', () => selectSpectrumWord(tile));
    wordsEl.appendChild(tile);
  });

  // Render track slots as a flex row
  const track = document.getElementById('spectrumTrack');
  track.innerHTML = '';
  const n = q.words.length;
  q.words.forEach((word, i) => {
    const slot = document.createElement('div');
    slot.className = 'spectrumZone';
    slot.dataset.index = i;
    const lbl = document.createElement('div');
    lbl.className = 'zone-label';
    lbl.textContent = (i + 1);
    slot.appendChild(lbl);
    slot.addEventListener('click', () => placeWordInSlot(i));
    track.appendChild(slot);
  });

  document.getElementById('checkSpectrumBtn').style.display = 'none';
  buttonsLocked = false;
}

function selectSpectrumWord(tile){
  if(tile.classList.contains('placed')) return;
  document.querySelectorAll('.spectrumWord').forEach(t => t.classList.remove('selected'));
  if(spectrumSelected === tile.dataset.word){
    spectrumSelected = null;
  } else {
    spectrumSelected = tile.dataset.word;
    tile.classList.add('selected');
  }
}

function placeWordInSlot(slotIndex){
  if(!spectrumSelected) return;
  const q = currentQuestion;

  // Find if this slot already has a word — swap back
  const existingWord = spectrumPlaced[slotIndex];
  if(existingWord){
    // unplace existing
    delete spectrumPlaced[slotIndex];
    document.querySelectorAll('.spectrumWord').forEach(t => {
      if(t.dataset.word === existingWord){ t.classList.remove('placed'); }
    });
  }

  // Check if selected word is already in another slot — remove it
  Object.keys(spectrumPlaced).forEach(idx => {
    if(spectrumPlaced[idx] === spectrumSelected){
      delete spectrumPlaced[idx];
      const oldSlot = document.querySelector(`.spectrumZone[data-index="${idx}"]`);
      if(oldSlot){ oldSlot.querySelector('.zone-label').textContent = parseInt(idx)+1; oldSlot.classList.remove('filled'); }
    }
  });

  spectrumPlaced[slotIndex] = spectrumSelected;

  // Update slot visual
  const slot = document.querySelector(`.spectrumZone[data-index="${slotIndex}"]`);
  slot.classList.add('filled');
  const lbl = slot.querySelector('.zone-label');
  lbl.textContent = spectrumSelected.toUpperCase();

  // Mark tile as placed
  document.querySelectorAll('.spectrumWord').forEach(t => {
    if(t.dataset.word === spectrumSelected){
      t.classList.add('placed');
      t.classList.remove('selected');
    }
  });

  spectrumSelected = null;

  // Show check button if all slots filled
  const allFilled = Object.keys(spectrumPlaced).length === q.words.length;
  document.getElementById('checkSpectrumBtn').style.display = allFilled ? 'inline-flex' : 'none';
}

function checkSpectrum(){
  if(buttonsLocked || fuel <= 0) return;
  buttonsLocked = true;
  const q = currentQuestion;
  let allCorrect = true;
  let wrongCount = 0;

  q.words.forEach((word, correctIndex) => {
    // Find which slot this word was placed in
    const placedSlot = Object.keys(spectrumPlaced).find(k => spectrumPlaced[k] === word);
    const slot = document.querySelector(`.spectrumZone[data-index="${correctIndex}"]`);
    if(parseInt(placedSlot) === correctIndex){
      slot.classList.add('correct');
    } else {
      slot.classList.add('wrong');
      allCorrect = false;
      wrongCount++;
    }
  });

  const cat = 'spectrum:' + q.label.toLowerCase().replace(/\s+/g,'-');

  if(allCorrect){
    score += 80 + (streak * 10); streak++; fuel = Math.min(fuel + 10, 100);
    if(typeof WordLabData !== 'undefined' && WordLabData.getSession()){
      const res = WordLabData.recordAttempt('word-spectrum', cat, true, 0);
      if(typeof WLScientist !== 'undefined') WLScientist.react('correct', res);
    }
    if(typeof WLAudio !== 'undefined'){ WLAudio.correct(); if(streak >= 3) WLAudio.streak(streak); }
    feedbackEl.textContent = '✅ Perfect spectrum!';
    feedbackEl.className = 'feedback ok';
    subFeedbackEl.textContent = `${q.leftAnchor} → ${q.words.join(' → ')} → ${q.rightAnchor}`;
    gameCardEl.classList.add('flashSuccess');
    setTimeout(() => gameCardEl.classList.remove('flashSuccess'), 600);
  } else {
    streak = 0; fuel = Math.max(fuel - 10, 0);
    if(typeof WordLabData !== 'undefined' && WordLabData.getSession()) WordLabData.recordAttempt('word-spectrum', cat, false, 0);
    if(typeof WLScientist !== 'undefined') WLScientist.react('wrong');
    if(typeof WLAudio !== 'undefined') WLAudio.wrong();
    feedbackEl.textContent = `❌ ${wrongCount} word${wrongCount>1?'s':''} out of order`;
    feedbackEl.className = 'feedback bad';
    subFeedbackEl.textContent = `Correct order: ${q.words.join(' → ')}`;
    gameCardEl.classList.add('flashFail');
    setTimeout(() => gameCardEl.classList.remove('flashFail'), 600);
  }

  updateHud();
  if(fuel <= 0){ setTimeout(endGame, 800); return; }
  document.getElementById('checkSpectrumBtn').style.display = 'none';
  setTimeout(loadQuestion, 2200);
}

// ─────────────────────────────────────────────────────────────────────────────
// GAME FLOW
// ─────────────────────────────────────────────────────────────────────────────
function loadQuestion(){
  gameCardEl.classList.remove('flashSuccess','flashFail');
  if(fuel <= 0) return;
  if(mode === 'spectrum'){
    loadSpectrum();
  } else {
    loadSynonymAntonym();
  }
}

function startFuelDrain(){
  clearInterval(fuelInterval);
  fuelInterval = setInterval(() => {
    fuel -= 0.2;
    if(fuel <= 0){ fuel = 0; updateHud(); endGame(); clearInterval(fuelInterval); return; }
    updateHud();
  }, 220);
}

function endGame(){
  buttonsLocked = true;
  optionsEl.innerHTML = '';
  spectrumAreaEl.style.display = 'none';
  feedbackEl.textContent = 'Charge depleted';
  feedbackEl.className = 'feedback bad';
  subFeedbackEl.textContent = `Final score: ${score} XP — well done!`;
}

function restartGame(){
  score = 0; streak = 0; fuel = 100;
  updateHud(); startFuelDrain(); loadQuestion();
}

function skipQuestion(){
  if(fuel <= 0) return;
  streak = 0; fuel = Math.max(fuel - 8, 0);
  updateHud();
  if(fuel <= 0){ endGame(); return; }
  loadQuestion();
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
updateHud();
startFuelDrain();
loadQuestion();
</script>

<!-- Particles -->
<script>
(function(){
  var w = document.getElementById('particles');
  if(!w) return;
  var cs = ['rgba(34,211,238,.3)','rgba(14,116,144,.25)','rgba(96,165,250,.2)','rgba(165,243,252,.2)'];
  for(var i = 0; i < 20; i++){
    var p = document.createElement('div');
    p.className = 'particle';
    var s = (Math.random()*3+2)+'px';

    w.appendChild(p);
  }
})();

  var w = document.getElementById('sciCharWrap');

  var sd = typeof WordLabData !== 'undefined' ? await WordLabData.getStudentData() : null;
  w.innerHTML = WLScientist.buildSVG(sd ? sd.scientist : {}, 'neutral');
})();
</script>
