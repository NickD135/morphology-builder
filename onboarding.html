<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Get Started</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .skip-link{position:absolute;top:-40px;left:0;background:#4338ca;color:#fff;padding:8px 16px;z-index:10000;font-weight:700;font-size:14px;border-radius:0 0 8px 0;transition:top .2s;}
    .skip-link:focus{top:0;}
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Lexend',sans-serif; background:#f5f5f5; color:#0f172a; min-height:100vh; }

    .topBar{ background:#fff; border-bottom:1px solid #e2e8f0; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
    .brand{ display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brandIcon{ width:36px; height:36px; border-radius:10px; background:#4338ca; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .brandName{ font-size:16px; font-weight:900; color:#312e81; }
    .skipLink{ font-size:12px; font-weight:700; color:#64748b; text-decoration:none; }
    .skipLink:hover{ color:#475569; }

    /* Progress */
    .progress{ max-width:560px; margin:32px auto 0; padding:0 20px; }
    .progressBar{ display:flex; align-items:center; gap:0; }
    .progressStep{ display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
    .progressDot{ width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; border:3px solid #e2e8f0; background:#fff; color:#64748b; transition:all .3s; flex-shrink:0; }
    .progressDot.active{ border-color:#4338ca; background:#4338ca; color:#fff; }
    .progressDot.done{ border-color:#16a34a; background:#16a34a; color:#fff; }
    .progressLabel{ font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:#64748b; text-align:center; }
    .progressLabel.active{ color:#4338ca; }
    .progressLabel.done{ color:#16a34a; }
    .progressLine{ height:3px; background:#e2e8f0; flex:1; margin-bottom:18px; transition:background .3s; }
    .progressLine.done{ background:#16a34a; }

    /* Card */
    .card{ background:#fff; border-radius:28px; padding:40px; max-width:560px; margin:28px auto 40px; box-shadow:0 4px 24px rgba(15,23,42,.07); }
    .stepIcon{ font-size:48px; margin-bottom:16px; }
    .stepTitle{ font-size:26px; font-weight:900; color:#312e81; margin-bottom:8px; }
    .stepSub{ font-size:15px; font-weight:600; color:#64748b; margin-bottom:28px; line-height:1.6; }

    .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field label{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.14em; color:#64748b; }
    .field input, .field textarea{
      border:2px solid #e2e8f0; border-radius:14px; padding:13px 16px;
      font-size:15px; font-family:'Lexend',sans-serif; font-weight:600;
      outline:none; transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus{ border-color:#4338ca; box-shadow:0 0 0 4px rgba(67,56,202,.1); }
    .field textarea{ resize:vertical; min-height:140px; }
    .field .hint{ font-size:12px; color:#64748b; font-weight:600; }

    .primaryBtn{
      width:100%; border:none; background:#4338ca; color:#fff;
      font-family:'Lexend',sans-serif; font-weight:900; font-size:15px;
      padding:14px; border-radius:16px; cursor:pointer;
      text-transform:uppercase; letter-spacing:.07em;
      box-shadow:0 8px 20px rgba(67,56,202,.2);
      transition:all .15s; margin-top:8px;
    }
    .primaryBtn:hover:not(:disabled){ background:#3730a3; transform:translateY(-1px); }
    .primaryBtn:disabled{ opacity:.5; cursor:default; transform:none; }
    .secondaryBtn{
      width:100%; border:2px solid #e2e8f0; background:#fff; color:#334155;
      font-family:'Lexend',sans-serif; font-weight:800; font-size:14px;
      padding:12px; border-radius:14px; cursor:pointer; margin-top:8px; transition:all .15s;
    }
    .secondaryBtn:hover{ border-color:#4338ca; color:#4338ca; }

    .errMsg{ background:#fef2f2; border:2px solid #fecaca; border-radius:12px; padding:12px 16px; font-size:13px; font-weight:700; color:#dc2626; margin-bottom:16px; display:none; }

    /* Student list preview */
    .studentPreview{ display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .studentChip{ background:#eef2ff; border:2px solid #c7d2fe; border-radius:999px; padding:6px 14px; font-size:13px; font-weight:800; color:#4338ca; }

    /* Login cards */
    .codeGrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
    .codeCard{ border:2px solid #e2e8f0; border-radius:16px; padding:16px; text-align:center; }
    .codeName{ font-size:14px; font-weight:800; color:#0f172a; margin-bottom:6px; }
    .codeVal{ font-size:28px; font-weight:900; color:#4338ca; letter-spacing:.2em; background:#eef2ff; border-radius:10px; padding:8px 12px; display:inline-block; }
    .codeClass{ font-size:11px; font-weight:700; color:#64748b; margin-top:6px; }

    /* Activity grid */
    .actGrid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0; }
    @media(max-width:480px){ .actGrid{ grid-template-columns:1fr; } .codeGrid{ grid-template-columns:1fr; } }
    .actCard{ border:2px solid #e2e8f0; border-radius:16px; padding:16px 18px; text-decoration:none; display:flex; align-items:center; gap:12px; transition:all .15s; }
    .actCard:hover{ border-color:#4338ca; background:#eef2ff; }
    .actEmoji{ font-size:24px; }
    .actName{ font-size:14px; font-weight:800; color:#0f172a; }
    .actDesc{ font-size:12px; font-weight:600; color:#64748b; }
    .footer{ text-align:center; padding:32px 20px; color:#64748b; font-size:13px; font-weight:700; border-top:1px solid #e2e8f0; }
    .footer a{ color:#64748b; text-decoration:none; }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="topBar" role="banner">
  <a href="landing.html" class="brand">
    <div class="brandIcon">🧪</div>
    <span class="brandName">Word Labs</span>
  </a>
  <nav role="navigation" aria-label="Main navigation">
    <a href="dashboard.html" class="skipLink">Skip setup → go to dashboard</a>
  </nav>
</div>

<!-- Progress bar -->
<div class="progress" id="main-content">
  <div class="progressBar">
    <div class="progressStep">
      <div class="progressDot active" id="dot1">1</div>
      <div class="progressLabel active" id="lbl1">School</div>
    </div>
    <div class="progressLine" id="line1"></div>
    <div class="progressStep">
      <div class="progressDot" id="dot2">2</div>
      <div class="progressLabel" id="lbl2">Class</div>
    </div>
    <div class="progressLine" id="line2"></div>
    <div class="progressStep">
      <div class="progressDot" id="dot3">3</div>
      <div class="progressLabel" id="lbl3">Students</div>
    </div>
    <div class="progressLine" id="line3"></div>
    <div class="progressStep">
      <div class="progressDot" id="dot4">4</div>
      <div class="progressLabel" id="lbl4">Login codes</div>
    </div>
    <div class="progressLine" id="line4"></div>
    <div class="progressStep">
      <div class="progressDot" id="dot5">5</div>
      <div class="progressLabel" id="lbl5">Try it!</div>
    </div>
  </div>
</div>

<div id="stepContainer" role="main"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wordlab-data.js"></script>
<script>

let currentStep = 1;
let schoolName   = '';
let className    = '';
let classCode    = '';
let classId      = '';
let students     = []; // [{name, student_code}]

// ── Progress ─────────────────────────────────────────────────────
function setProgress(active) {
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById('dot' + i);
    const lbl = document.getElementById('lbl' + i);
    if (i < active) {
      dot.className = 'progressDot done'; dot.textContent = '✓';
      lbl.className = 'progressLabel done';
    } else if (i === active) {
      dot.className = 'progressDot active'; dot.textContent = i;
      lbl.className = 'progressLabel active';
    } else {
      dot.className = 'progressDot'; dot.textContent = i;
      lbl.className = 'progressLabel';
    }
    if (i < 5) {
      document.getElementById('line' + i).className = 'progressLine' + (i < active ? ' done' : '');
    }
  }
}

function renderStep(n) {
  currentStep = n;
  setProgress(n);
  const c = document.getElementById('stepContainer');
  c.innerHTML = steps[n]();
}

// ── Step 1: School name ───────────────────────────────────────────
const steps = {
  1: () => `
    <div class="card">
      <div class="stepIcon">🏫</div>
      <div class="stepTitle">What's your school called?</div>
      <div class="stepSub">This helps personalise the experience for your students.</div>
      <div class="errMsg" id="err" aria-live="assertive"></div>
      <div class="field">
        <label for="schoolInput">School name</label>
        <input type="text" id="schoolInput" value="${schoolName}" placeholder="e.g. Riverside Primary School" autocomplete="organization">
      </div>
      <button class="primaryBtn" onclick="submitStep1()">Next →</button>
    </div>`,

  // ── Step 2: Create class ────────────────────────────────────────
  2: () => `
    <div class="card">
      <div class="stepIcon">📋</div>
      <div class="stepTitle">Create your first class</div>
      <div class="stepSub">A unique login code will be generated automatically for your class.</div>
      <div class="errMsg" id="err" aria-live="assertive"></div>
      <div class="field">
        <label for="classNameInput">Class name</label>
        <input type="text" id="classNameInput" placeholder="e.g. 6D" autocomplete="off">
      </div>
      <div class="field">
        <label for="gameNameInput">Your game name</label>
        <input type="text" id="gameNameInput" placeholder="e.g. Mr Smith, Coach D">
        <div class="hint">You'll be added to the class so you can preview what students see</div>
      </div>
      <button class="primaryBtn" onclick="submitStep2()">Create class →</button>
      <button class="secondaryBtn" onclick="renderStep(3)">Skip for now</button>
    </div>`,

  // ── Step 3: Add students ────────────────────────────────────────
  3: () => `
    <div class="card">
      <div class="stepIcon">👩‍🎓</div>
      <div class="stepTitle">Add your students</div>
      <div class="stepSub">Type one name per line, or paste a list. First names only — no surnames needed.</div>
      <div class="errMsg" id="err" aria-live="assertive"></div>
      <div class="field">
        <label for="namesInput">Student names</label>
        <textarea id="namesInput" placeholder="Emma&#10;Liam&#10;Olivia&#10;Noah&#10;Ava" oninput="updatePreview(this.value.split('\\n').map(n=>n.trim()).filter(Boolean))"></textarea>
        <div class="hint">Or <label style="color:#4338ca;font-weight:800;cursor:pointer;">import a CSV <input type="file" accept=".csv,.txt" id="csvFile" style="display:none;" onchange="loadCSV(this)"></label></div>
      </div>
      <div id="previewWrap" style="display:none;">
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:8px;">Preview</div>
        <div class="studentPreview" id="previewChips"></div>
      </div>
      <button class="primaryBtn" onclick="submitStep3()">Add students →</button>
      <button class="secondaryBtn" onclick="renderStep(4)">Skip for now</button>
    </div>`,

  // ── Step 4: Login codes ─────────────────────────────────────────
  4: () => {
    const cards = students.length
      ? students.map(s => `
          <div class="codeCard">
            <div class="codeName">${s.name}</div>
            <div class="codeVal">${s.student_code}</div>
            <div class="codeClass">Class code: ${classCode || '—'}</div>
          </div>`).join('')
      : `<p style="color:#64748b;font-size:14px;font-weight:700;text-align:center;padding:20px 0;">No students added yet — you can add them from Class Setup.</p>`;
    return `
    <div class="card">
      <div class="stepIcon">🔑</div>
      <div class="stepTitle">Here's how students log in</div>
      <div class="stepSub">Each student gets a unique 3-letter code. They go to <strong>${window.location.host}</strong>, enter the class code <strong>${classCode || '(your class code)'}</strong>, pick their name, then enter their code.</div>
      ${students.length ? `<button class="secondaryBtn" style="margin-bottom:16px;" onclick="printLoginCards()">🖨 Print login cards</button>` : ''}
      <div class="codeGrid">${cards}</div>
      <button class="primaryBtn" onclick="renderStep(5)">Next →</button>
    </div>`;
  },

  // ── Step 5: Try it ──────────────────────────────────────────────
  5: () => `
    <div class="card">
      <div class="stepIcon">🚀</div>
      <div class="stepTitle">You're all set!</div>
      <div class="stepSub">Try an activity yourself to see what your students will experience, or go straight to your dashboard.</div>
      <div class="actGrid">
        <a href="mission-mode.html" class="actCard"><span class="actEmoji">🚀</span><div><div class="actName">Mission Mode</div><div class="actDesc">Prefix & suffix drag game</div></div></a>
        <a href="phoneme-mode.html" class="actCard"><span class="actEmoji">🔊</span><div><div class="actName">Phoneme Splitter</div><div class="actDesc">Split words into sounds</div></div></a>
        <a href="meaning-mode.html" class="actCard"><span class="actEmoji">💡</span><div><div class="actName">Meaning Match-Up</div><div class="actDesc">Match morphemes to meanings</div></div></a>
        <a href="speed-mode.html" class="actCard"><span class="actEmoji">⚡</span><div><div class="actName">Speed Builder</div><div class="actDesc">Build words against the clock</div></div></a>
      </div>
      <a href="dashboard.html" class="primaryBtn" style="text-decoration:none;display:block;text-align:center;margin-top:8px;">Go to Dashboard →</a>
    </div>`
};

// ── Step handlers ─────────────────────────────────────────────────
async function submitStep1() {
  const val = document.getElementById('schoolInput').value.trim();
  if (!val) { showErr('Please enter your school name.'); return; }
  schoolName = val;

  // Update school name in DB
  const teacher = await WordLabData.getTeacherRecord();
  if (teacher?.school_id) {
    await WordLabData._sb().from('schools').update({ name: schoolName }).eq('id', teacher.school_id);
  }
  renderStep(2);
}

async function submitStep2() {
  const name = document.getElementById('classNameInput').value.trim();
  const err  = document.getElementById('err');

  if (!name) { showErr('Please enter a class name.'); return; }

  const btn = document.querySelector('.primaryBtn');
  btn.disabled = true; btn.textContent = 'Creating...';

  try {
    classId   = await WordLabData.createClass(name, '', '', []);
    className = name;
    // Fetch the auto-generated code
    var classes = await WordLabData.getClasses();
    var created = classes.find(function(c){ return c.id === classId; });
    classCode = created ? created.class_code : '';

    var gameName = document.getElementById('gameNameInput').value.trim();
    if (gameName) {
      await WordLabData.createTeacherStudent(classId, gameName);
    }

    renderStep(3);
  } catch(e) {
    showErr(e.message || 'Could not create class. Please try again.');
    btn.disabled = false; btn.textContent = 'Create class →';
  }
}

async function submitStep3() {
  if (!classId) { showErr('You need to create a class first. Go back to Step 2.'); return; }
  const raw   = document.getElementById('namesInput').value;
  const names = raw.split('\n').map(n => n.trim()).filter(n => n.length > 0);
  if (!names.length) { renderStep(4); return; }

  const btn = document.querySelector('.primaryBtn');
  btn.disabled = true; btn.textContent = 'Adding...';

  try {
    students = await WordLabData.addStudentsBulk(classId, names);
    renderStep(4);
  } catch(e) {
    showErr(e.message || 'Could not add students. Please try again.');
    btn.disabled = false; btn.textContent = 'Add students →';
  }
}

function loadCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/[\r\n,]+/).map(l => l.trim()).filter(l => l && l !== 'Name' && l !== 'name');
    document.getElementById('namesInput').value = lines.join('\n');
    updatePreview(lines);
  };
  reader.readAsText(file);
}

function updatePreview(names) {
  const wrap = document.getElementById('previewWrap');
  const chips = document.getElementById('previewChips');
  if (!names.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  chips.innerHTML = names.map(n => `<span class="studentChip">${WordLabData.escapeHtml(n)}</span>`).join('');
}

function showErr(msg) {
  const el = document.getElementById('err');
  if (!el) return;
  el.textContent = msg;
  el.style.display = 'block';
}

function printLoginCards() {
  const rows = students.map(s =>
    `<div class="card">
      <div class="site">${window.location.host}</div>
      <div class="name">${WordLabData.escapeHtml(s.name)}</div>
      <div class="label">Class code</div>
      <div class="code">${WordLabData.escapeHtml(classCode)}</div>
      <div class="label">Your code</div>
      <div class="code">${WordLabData.escapeHtml(s.student_code)}</div>
    </div>`
  ).join('');

  const win = window.open('', '_blank');
  win.document.write(`<!doctype html><html><head><title>Login Cards — ${className}</title>
  <style>
    @page{ size:A4; margin:12mm; }
    body{ font-family:'Lexend',Arial,sans-serif; margin:0; }
    .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8mm; }
    .card{ border:2px solid #c7d2fe; border-radius:12px; padding:14px; text-align:center; background:#fff; page-break-inside:avoid; }
    .site{ font-size:10px; font-weight:700; color:#6366f1; margin-bottom:8px; letter-spacing:.05em; }
    .name{ font-size:18px; font-weight:900; color:#1e1b4b; margin-bottom:10px; }
    .label{ font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:#64748b; margin-bottom:3px; }
    .code{ font-size:22px; font-weight:900; color:#4338ca; background:#eef2ff; border-radius:8px; padding:5px 10px; display:inline-block; margin-bottom:8px; letter-spacing:.15em; }
    @media print{ button{ display:none; } }
  </style></head><body>
  <div style="text-align:center;margin-bottom:8mm;font-family:'Lexend',Arial,sans-serif;">
    <div style="font-size:18px;font-weight:900;color:#312e81;">${WordLabData.escapeHtml(schoolName)} — ${WordLabData.escapeHtml(className)}</div>
    <div style="font-size:12px;color:#64748b;font-weight:700;margin-top:4px;">Student login cards · ${window.location.host}</div>
  </div>
  <div class="grid">${rows}</div>
  <div style="text-align:center;margin-top:8mm;">
    <button onclick="window.print()" style="padding:10px 28px;background:#4338ca;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:'Lexend',Arial,sans-serif;font-weight:800;">🖨 Print</button>
  </div>
  
<footer style="text-align:center;padding:12px 16px;font-size:11px;color:#64748b;border-top:1px solid #e2e8f0;margin-top:auto;font-family:Lexend,sans-serif;">&#129514; Word Labs &middot; <a href="about.html" style="color:#64748b;">About</a> &middot; <a href="privacy.html" style="color:#64748b;">Privacy Policy</a> &middot; <a href="terms.html" style="color:#64748b;">Terms of Service</a> &middot; <a href="mailto:nick@wordlabs.app" style="color:#64748b;">Contact</a></footer>
</body></html>`);
  win.document.close();
}

// ── Boot ─────────────────────────────────────────────────────────
(async function() {
  const user = await WordLabData.requireTeacherAuth();
  if (!user) return;

  // If teacher already has classes and didn't just sign up, skip to dashboard
  const fromSignup = new URLSearchParams(window.location.search).has('from');
  const classes = await WordLabData.getClasses();
  if (classes.length > 0 && !fromSignup) {
    window.location.href = 'dashboard.html';
    return;
  }

  // Pre-fill school name
  const teacher = await WordLabData.getTeacherRecord();
  if (teacher?.school_id) {
    const { data: school } = await WordLabData._sb()
      .from('schools').select('name').eq('id', teacher.school_id).maybeSingle();
    if (school?.name && school.name !== 'My School') schoolName = school.name;
  }

  renderStep(1);
})();
</script>
<div class="footer">
  🧪 Word Labs · <a href="landing.html">Home</a> · <a href="about.html">About</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="pricing.html">Pricing</a> · <a href="mailto:nick@wordlabs.app">Contact</a>
</div>
</body>
</html>
