<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:'Lexend',sans-serif;
      background:linear-gradient(180deg,#0d0b1a 0%,#110f1e 50%,#0d0b1a 100%);
      color:#e0e7ff;
      line-height:1.5;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ── Header ── */
    .header{
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      max-width:1100px;
      width:100%;
      margin:0 auto;
    }
    .brand{ display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brand-icon{
      width:36px; height:36px; border-radius:10px; background:#4338ca; color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:17px;
    }
    .brand-name{ font-size:18px; font-weight:900; color:#e0e7ff; letter-spacing:-.02em; }
    .header-links{ display:flex; align-items:center; gap:16px; }
    .header-links a{ font-size:13px; font-weight:700; color:#94a3b8; text-decoration:none; transition:color .15s; }
    .header-links a:hover{ color:#e0e7ff; }

    /* ── Main ── */
    .main{ flex:1; padding:40px 20px 64px; }

    .page-title{
      text-align:center; margin-bottom:32px;
    }
    .page-title h1{
      font-size:32px; font-weight:900; color:#e0e7ff; margin-bottom:8px;
    }
    .page-title p{
      font-size:15px; font-weight:600; color:#94a3b8; max-width:420px; margin:0 auto;
    }

    /* ── Glass panel ── */
    .glass-panel{
      background:rgba(255,255,255,.03);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      padding:32px;
      max-width:560px;
      margin:0 auto;
    }

    /* ── Form ── */
    .form-group{ margin-bottom:20px; }
    .form-group label{
      display:block;
      font-size:12px; font-weight:800; text-transform:uppercase;
      letter-spacing:.12em; color:#94a3b8; margin-bottom:6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      padding:12px 14px;
      color:#e0e7ff;
      font-family:'Lexend',sans-serif;
      font-size:14px;
      font-weight:500;
      outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus{
      border-color:#6366f1;
      box-shadow:0 0 0 3px rgba(99,102,241,.15);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder{
      color:#94a3b8;
    }
    .form-group select option{
      background:#1e1b2e; color:#e0e7ff;
    }
    .form-group textarea{
      min-height:140px; resize:vertical;
    }
    .optional-tag{
      font-size:10px; font-weight:600; color:#94a3b8;
      text-transform:none; letter-spacing:0; margin-left:6px;
    }

    .submit-btn{
      background:#4338ca; color:#fff; border:none; border-radius:14px;
      padding:14px; font-family:'Lexend',sans-serif; font-weight:900;
      font-size:15px; width:100%; cursor:pointer; text-transform:uppercase;
      letter-spacing:.06em; transition:all .15s;
    }
    .submit-btn:hover{ background:#3730a3; transform:translateY(-1px); }
    .submit-btn:disabled{ opacity:.5; cursor:default; transform:none; }

    .error-msg{
      background:rgba(220,38,38,.12); border:1px solid rgba(220,38,38,.3);
      border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700;
      color:#fca5a5; margin-bottom:16px; display:none; text-align:center;
    }

    .success-panel{
      text-align:center; padding:48px 16px;
    }
    .success-panel .check{
      width:64px; height:64px; border-radius:50%; background:rgba(22,163,74,.15);
      display:flex; align-items:center; justify-content:center;
      font-size:32px; margin:0 auto 20px;
    }
    .success-panel h2{
      font-size:22px; font-weight:900; color:#e0e7ff; margin-bottom:8px;
    }
    .success-panel p{
      font-size:14px; font-weight:600; color:#94a3b8;
    }

    /* ── Footer ── */
    .footer{
      border-top:1px solid rgba(99,102,241,.15);
      background:#080716;
      position:relative; z-index:2;
    }
    .footer-inner{
      max-width:1200px; margin:0 auto;
      padding:20px 24px; display:flex; align-items:center;
      justify-content:space-between; gap:16px; flex-wrap:wrap;
    }
    .footer-brand{ font-size:14px; font-weight:800; color:#6366f1; }
    .footer-note{ font-size:12px; color:#94a3b8; font-weight:600; }
    .footer-note a{ color:#94a3b8; text-decoration:none; }
    .footer-note a:hover{ color:#e0e7ff; }
    .skip-link{position:absolute;top:-40px;left:0;background:#4338ca;color:#fff;padding:8px 16px;z-index:10000;font-weight:700;font-size:14px;border-radius:0 0 8px 0;transition:top .2s;}
    .skip-link:focus{top:0;}

    /* ── Responsive ── */
    @media(max-width:600px){
      .glass-panel{ padding:20px 16px; border-radius:16px; }
      .page-title h1{ font-size:24px; }
      .header{ padding:12px 16px; }
      .brandName{ font-size:15px; }
      .footer-inner{ flex-direction:column; text-align:center; }
    }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- ── Header ── -->
<header class="header" role="banner">
  <a href="landing.html" class="brand">
    <div class="brand-icon">🧪</div>
    <span class="brand-name">Word Labs</span>
  </a>
  <nav class="header-links" role="navigation" aria-label="Main navigation">
    <a href="landing.html">Home</a>
  </nav>
</header>

<!-- ── Main ── -->
<main class="main" id="main-content" role="main">
  <div class="page-title">
    <h1>Send Us Feedback</h1>
    <p>Have a suggestion, found a bug, or just want to say hello? We'd love to hear from you.</p>
  </div>

  <div class="glass-panel" id="formPanel">
    <div class="error-msg" id="errorMsg" aria-live="polite"></div>

    <form id="feedbackForm" novalidate>
      <div class="form-group">
        <label for="nameField">Name <span class="optional-tag">(optional)</span></label>
        <input type="text" id="nameField" placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="emailField">Email <span class="optional-tag">(optional)</span></label>
        <input type="email" id="emailField" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label for="roleField">Role</label>
        <select id="roleField">
          <option value="Teacher">Teacher</option>
          <option value="Student">Student</option>
          <option value="Parent">Parent</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="categoryField">Category</label>
        <select id="categoryField">
          <option value="Bug report">Bug report</option>
          <option value="Feature request">Feature request</option>
          <option value="General feedback">General feedback</option>
          <option value="Content suggestion">Content suggestion</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="messageField">Message</label>
        <textarea id="messageField" placeholder="Tell us what you think..." required minlength="10"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Send Feedback</button>
    </form>
  </div>

  <div class="glass-panel success-panel" id="successPanel" style="display:none;" aria-live="polite">
    <div class="check">&#10003;</div>
    <h2>Thanks for your feedback!</h2>
    <p>We'll review it soon.</p>
  </div>
</main>

<!-- ── Footer ── -->
<footer class="footer">
  <div class="footer-inner">
    <span class="footer-brand">🧪 Word Labs</span>
    <span class="footer-note"><a href="landing.html">Home</a> · <a href="about.html">About</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="pricing.html">Pricing</a> · <a href="mailto:nick@wordlabs.app">Contact</a></span>
  </div>
</footer>

<script>
(function(){
  const SUPABASE_URL = 'https://kdpavfrzmmzknqfpodrl.supabase.co';

  const form      = document.getElementById('feedbackForm');
  const errorMsg  = document.getElementById('errorMsg');
  const formPanel = document.getElementById('formPanel');
  const successPanel = document.getElementById('successPanel');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg){
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }
  function hideError(){
    errorMsg.style.display = 'none';
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    hideError();

    const name     = document.getElementById('nameField').value.trim();
    const email    = document.getElementById('emailField').value.trim();
    const role     = document.getElementById('roleField').value;
    const category = document.getElementById('categoryField').value;
    const message  = document.getElementById('messageField').value.trim();

    if(message.length < 10){
      showError('Please enter a message with at least 10 characters.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    try {
      const res = await fetch(SUPABASE_URL + '/functions/v1/send-feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, role, category, message })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send');

      formPanel.style.display = 'none';
      successPanel.style.display = 'block';
    } catch(err){
      console.error('Feedback submit error:', err);
      showError('Something went wrong. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Feedback';
    }
  });
})();
</script>
</body>
</html>
