<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllable Splitter — Worksheet Generator · Word Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f0f4ff;--line:#e2e8f0;--text:#0f172a;--indigo:#4338ca;--indigo-2:#6366f1;--indigo-soft:#eef2ff;--slate:#475569;--slate-light:#e2e8f0;--slate-mid:#94a3b8;--slate-soft:#f1f5f9;--purple:#7c3aed;--purple-soft:#f5f3ff;--purple-line:#ddd6fe;--purple-dark:#5b21b6;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}
    button,input,select{font:inherit;}
    .header{background:#fff;border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(15,23,42,.06);}
    .brandIcon{width:40px;height:40px;border-radius:11px;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
    .brandText h1{font-size:18px;font-weight:900;color:#312e81;}
    .brandText .sub{font-size:9px;text-transform:uppercase;letter-spacing:.22em;color:var(--indigo-2);font-weight:800;}
    .headerBadge{margin-left:auto;background:var(--purple-soft);color:var(--purple-dark);border:1px solid var(--purple-line);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;}
    .main{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:300px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
    .sideInner{padding:16px;flex:1;overflow-y:auto;}
    .section{margin-bottom:18px;}
    .sectionLabel{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.22em;color:var(--indigo-2);margin-bottom:8px;}
    .radioGroup{display:flex;flex-direction:column;gap:5px;}
    .radioGroup label{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:12px;font-weight:700;color:var(--slate);transition:all .12s;}
    .radioGroup label:has(input:checked){border-color:var(--indigo-2);background:var(--indigo-soft);color:var(--indigo);}
    .radioGroup input[type=radio]{accent-color:var(--indigo);flex-shrink:0;}
    .radioGroup label .hint{font-size:10px;font-weight:600;color:#94a3b8;margin-left:auto;}
    .radioGroup label:has(input:checked) .hint{color:var(--indigo-2);}
    .stepper{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;width:fit-content;}
    .stepperBtn{width:32px;height:32px;border:none;background:#f8fafc;cursor:pointer;font-size:14px;font-weight:700;color:var(--slate);}
    .stepperBtn:hover{background:var(--indigo-soft);color:var(--indigo);}
    .stepperVal{width:38px;text-align:center;font-size:13px;font-weight:800;border:none;border-left:1.5px solid var(--line);border-right:1.5px solid var(--line);height:32px;background:#fff;}
    .toggleRow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;}
    .toggleRow+.toggleRow{border-top:1px solid var(--line);}
    .toggleLabel{font-size:12px;font-weight:700;color:var(--slate);}
    .toggleSub{font-size:10px;color:#94a3b8;font-weight:600;}
    .toggle{position:relative;width:38px;height:21px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggleSlider{position:absolute;inset:0;background:#e2e8f0;border-radius:999px;cursor:pointer;transition:background .15s;}
    .toggleSlider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .toggle input:checked+.toggleSlider{background:var(--indigo);}
    .toggle input:checked+.toggleSlider::before{transform:translateX(17px);}
    .sideFooter{padding:14px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px;background:#fff;flex-shrink:0;}
    .btnGenerate{background:var(--indigo);color:#fff;border:none;border-radius:11px;padding:11px;font-size:13px;font-weight:800;cursor:pointer;width:100%;}
    .btnGenerate:hover{background:#3730a3;}
    .btnRegen{background:#fff;color:var(--indigo);border:1.5px solid var(--indigo-2);border-radius:11px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;width:100%;display:none;}
    .btnPrint{background:#0f172a;color:#fff;border:none;border-radius:11px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;width:100%;display:none;}
    .preview{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
    .previewEmpty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#94a3b8;text-align:center;}
    .previewEmpty .icon{font-size:44px;opacity:.35;}
    .previewEmpty .msg{font-size:14px;font-weight:700;}
    .previewEmpty .sub{font-size:12px;font-weight:600;}
    /* WORKSHEET */
    .worksheet{background:#fff;border-radius:14px;border:1px solid var(--line);padding:26px;box-shadow:0 3px 12px rgba(15,23,42,.06);max-width:860px;margin:0 auto;}
    .ws-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:13px;border-bottom:2px solid #e2e8f0;}
    .ws-logo{display:flex;align-items:center;gap:9px;}
    .ws-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex:0 0 auto;}
    .ws-logo-text{font-size:13px;font-weight:900;color:#312e81;}
    .ws-logo-sub{font-size:8px;text-transform:uppercase;letter-spacing:.2em;color:var(--purple);font-weight:800;}
    .ws-meta{text-align:right;}
    .ws-meta-label{font-size:8px;text-transform:uppercase;letter-spacing:.16em;color:#94a3b8;font-weight:800;margin-bottom:3px;}
    .ws-meta-line{display:flex;align-items:center;gap:7px;justify-content:flex-end;margin-bottom:3px;font-size:10px;font-weight:700;color:#475569;}
    .ws-meta-field{border-bottom:1.5px solid #94a3b8;min-width:90px;height:15px;display:inline-block;}
    .ws-title{font-size:16px;font-weight:900;color:#312e81;margin-bottom:2px;}
    .ws-subtitle{font-size:10px;color:#64748b;font-weight:600;margin-bottom:12px;}
    .ws-instructions{background:var(--purple-soft);border:1.5px solid var(--purple-line);border-radius:8px;padding:8px 13px;margin-bottom:14px;font-size:11px;color:var(--purple-dark);font-weight:700;line-height:1.6;}
    .ws-example{background:#f8fafc;border:1.5px solid var(--line);border-radius:8px;padding:7px 13px;margin-bottom:14px;font-size:10px;color:var(--slate);font-weight:700;}
    /* table */
    .syl-table{width:100%;border-collapse:collapse;margin-bottom:4px;}
    .syl-table th{padding:6px 8px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;border:1.5px solid var(--line);}
    .syl-table th.th-num{background:#f1f5f9;color:var(--slate);width:6%;}
    .syl-table th.th-word{background:#f1f5f9;color:var(--slate);width:22%;}
    .syl-table th.th-chop{background:var(--indigo-soft);color:var(--indigo);width:52%;}
    .syl-table th.th-count{background:var(--purple-soft);color:var(--purple-dark);width:20%;}
    .syl-table td{padding:8px;border:1.5px solid var(--line);vertical-align:middle;}
    .syl-table tr:nth-child(even) td{background:#fafafa;}
    .word-cell{font-weight:900;color:#312e81;font-size:13px;}
    .chop-line{border-bottom:1.5px solid #475569;height:20px;display:block;width:90%;}
    .count-box{width:36px;height:28px;border:1.5px solid var(--purple-line);border-radius:6px;background:var(--purple-soft);display:inline-block;}
    /* answer key */
    .ws-key{margin-top:16px;padding-top:14px;border-top:2px dashed #e2e8f0;}
    .ws-key-title{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.18em;color:#dc2626;margin-bottom:10px;}
    .ws-key-grid{display:flex;flex-wrap:wrap;gap:4px 24px;}
    .ws-key-item{font-size:10px;font-weight:700;color:#475569;}
    .ws-key-item span{color:#0f172a;font-weight:900;}
    @media print{body{display:block;height:auto;}.header,.sidebar{display:none!important;}.main{display:block;}.preview{padding:0;overflow:visible;}.previewEmpty{display:none;}.worksheet{border:none;border-radius:0;box-shadow:none;padding:10px 14px;max-width:none;}.ws-key{page-break-before:always;}@page{size:A4;margin:10mm 12mm;}}
  </style>
</head>
<body>
<div class="header">
  <div class="brandIcon">🔬</div>
  <div class="brandText"><h1>Word Labs</h1><span class="sub">Worksheet Generator</span></div>
  <div class="headerBadge">Syllable Splitter</div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sideInner">
      <div class="section">
        <div class="sectionLabel">Word Source</div>
        <div class="radioGroup">
          <label><input type="radio" name="src" value="builtin" checked onchange="toggleCustom()"> Built-in words</label>
          <label><input type="radio" name="src" value="custom" onchange="toggleCustom()"> Custom word list</label>
        </div>
        <div id="customWrap" style="display:none;margin-top:8px;">
          <input type="text" id="classCodeInput" placeholder="Class code" style="width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;margin-bottom:4px;">
          <button onclick="loadCustomLists()" style="border:none;background:var(--indigo);color:#fff;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:800;cursor:pointer;width:100%;">Load Lists</button>
          <div id="customListMsg" style="font-size:11px;font-weight:600;color:#94a3b8;margin-top:4px;"></div>
          <select id="customListSelect" style="width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;margin-top:6px;display:none;">
            <option value="">— load a list first —</option>
          </select>
        </div>
      </div>
      <div class="section">
        <div class="sectionLabel">Syllable count</div>
        <div class="radioGroup">
          <label><input type="radio" name="sylcount" value="2" checked> 2 syllables <span class="hint">e.g. butter</span></label>
          <label><input type="radio" name="sylcount" value="3"> 3 syllables <span class="hint">e.g. together</span></label>
          <label><input type="radio" name="sylcount" value="4"> 4+ syllables <span class="hint">e.g. information</span></label>
          <label><input type="radio" name="sylcount" value="mixed"> Mixed</label>
        </div>
      </div>
      <div class="section">
        <div class="sectionLabel">Number of words</div>
        <div class="stepper">
          <button class="stepperBtn" onclick="stepCount(-1)">−</button>
          <input type="number" class="stepperVal" id="countInput" min="5" max="20" value="12" readonly>
          <button class="stepperBtn" onclick="stepCount(1)">+</button>
        </div>
      </div>
      <div class="section">
        <div class="sectionLabel">Extras</div>
        <div class="toggleRow">
          <div><div class="toggleLabel">Answer key</div><div class="toggleSub">Teacher copy, separate page</div></div>
          <label class="toggle"><input type="checkbox" id="toggleKey" checked><span class="toggleSlider"></span></label>
        </div>
      </div>
    </div>
    <div class="sideFooter">
      <button class="btnGenerate" onclick="generateWorksheet()">⚡ Generate Worksheet</button>
      <button class="btnRegen" id="regenBtn" onclick="generateWorksheet()">🔄 Regenerate</button>
      <button class="btnPrint" id="printBtn" onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
  </div>
  <div class="preview">
    <div class="previewEmpty" id="previewEmpty">
      <div class="icon">✂️</div>
      <div class="msg">Your Syllable Splitter worksheet will appear here</div>
      <div class="sub">Configure options on the left, then hit Generate</div>
    </div>
    <div id="worksheetOutput" style="display:none;"></div>
  </div>
</div>
<script>
const WORDS = [
  {word:"butter",syllables:["but","ter"]},{word:"open",syllables:["o","pen"]},{word:"paper",syllables:["pa","per"]},{word:"happy",syllables:["hap","py"]},{word:"garden",syllables:["gar","den"]},{word:"pencil",syllables:["pen","cil"]},{word:"basket",syllables:["bas","ket"]},{word:"window",syllables:["win","dow"]},{word:"carpet",syllables:["car","pet"]},{word:"helmet",syllables:["hel","met"]},{word:"rabbit",syllables:["rab","bit"]},{word:"market",syllables:["mar","ket"]},{word:"parrot",syllables:["par","rot"]},{word:"mitten",syllables:["mit","ten"]},{word:"expand",syllables:["ex","pand"]},{word:"protect",syllables:["pro","tect"]},{word:"connect",syllables:["con","nect"]},{word:"perform",syllables:["per","form"]},{word:"reflect",syllables:["re","flect"]},{word:"subtract",syllables:["sub","tract"]},{word:"morning",syllables:["mor","ning"]},{word:"sunshine",syllables:["sun","shine"]},{word:"kingdom",syllables:["king","dom"]},{word:"signal",syllables:["sig","nal"]},{word:"captain",syllables:["cap","tain"]},{word:"carbon",syllables:["car","bon"]},{word:"orbit",syllables:["or","bit"]},{word:"vertex",syllables:["ver","tex"]},{word:"splendid",syllables:["splen","did"]},{word:"blanket",syllables:["blan","ket"]},
  {word:"together",syllables:["to","geth","er"]},{word:"tomorrow",syllables:["to","mor","row"]},{word:"remember",syllables:["re","mem","ber"]},{word:"consider",syllables:["con","sid","er"]},{word:"however",syllables:["how","ev","er"]},{word:"important",syllables:["im","por","tant"]},{word:"wonderful",syllables:["won","der","ful"]},{word:"basketball",syllables:["bas","ket","ball"]},{word:"hamburger",syllables:["ham","bur","ger"]},{word:"elephant",syllables:["el","e","phant"]},{word:"december",syllables:["de","cem","ber"]},{word:"umbrella",syllables:["um","brel","la"]},{word:"example",syllables:["ex","am","ple"]},{word:"computer",syllables:["com","pu","ter"]},{word:"adventure",syllables:["ad","ven","ture"]},{word:"entertain",syllables:["en","ter","tain"]},{word:"understand",syllables:["un","der","stand"]},{word:"educate",syllables:["ed","u","cate"]},{word:"different",syllables:["dif","fer","ent"]},{word:"beautiful",syllables:["beau","ti","ful"]},{word:"fantastic",syllables:["fan","tas","tic"]},{word:"september",syllables:["sep","tem","ber"]},{word:"volcano",syllables:["vol","ca","no"]},{word:"melody",syllables:["mel","o","dy"]},{word:"calendar",syllables:["cal","en","dar"]},{word:"telescope",syllables:["tel","e","scope"]},{word:"victory",syllables:["vic","to","ry"]},{word:"syllable",syllables:["syl","la","ble"]},{word:"decimal",syllables:["dec","i","mal"]},
  {word:"information",syllables:["in","for","ma","tion"]},{word:"communication",syllables:["com","mu","ni","ca","tion"]},{word:"education",syllables:["ed","u","ca","tion"]},{word:"organisation",syllables:["or","gan","i","sa","tion"]},{word:"investigation",syllables:["in","ves","ti","ga","tion"]},{word:"vocabulary",syllables:["vo","cab","u","lar","y"]},{word:"responsibility",syllables:["re","spon","si","bil","i","ty"]},{word:"approximately",syllables:["ap","prox","i","mate","ly"]},{word:"construction",syllables:["con","struc","tion"]},{word:"understanding",syllables:["un","der","stand","ing"]},{word:"independent",syllables:["in","de","pen","dent"]},{word:"celebration",syllables:["cel","e","bra","tion"]},{word:"environment",syllables:["en","vi","ron","ment"]},{word:"international",syllables:["in","ter","na","tion","al"]},{word:"multiplication",syllables:["mul","ti","pli","ca","tion"]},{word:"immediately",syllables:["im","me","di","ate","ly"]},{word:"photography",syllables:["pho","tog","ra","phy"]},{word:"electricity",syllables:["e","lec","tri","ci","ty"]},{word:"democracy",syllables:["de","moc","ra","cy"]},{word:"geography",syllables:["ge","og","ra","phy"]},{word:"temperature",syllables:["tem","per","a","ture"]},{word:"caterpillar",syllables:["cat","er","pil","lar"]},{word:"discovery",syllables:["dis","cov","er","y"]},
];

const SUPABASE_URL  = 'https://kdpavfrzmmzknqfpodrl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcGF2ZnJ6bW16a25xZnBvZHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MjgzOTIsImV4cCI6MjA5MDAwNDM5Mn0.n5fe7HvXWMsM4xN_iaU_N4xLkC5xD4y9Uoer_DG-dlg';
var customListsData = {};

function toggleCustom() {
  var isCustom = document.querySelector('input[name=src]:checked').value === 'custom';
  document.getElementById('customWrap').style.display = isCustom ? '' : 'none';
}

async function loadCustomLists() {
  var code = (document.getElementById('classCodeInput').value || '').trim().toUpperCase();
  var msg = document.getElementById('customListMsg');
  var sel = document.getElementById('customListSelect');
  if (!code) { msg.textContent = 'Enter a class code first.'; msg.style.color = '#dc2626'; return; }
  msg.textContent = 'Loading…'; msg.style.color = '#94a3b8';
  try {
    var classRes = await fetch(SUPABASE_URL + '/rest/v1/classes?class_code=eq.' + encodeURIComponent(code) + '&select=id,name', { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    var classes = await classRes.json();
    if (!classes.length) { msg.textContent = 'Class code not found.'; msg.style.color = '#dc2626'; return; }
    var listsRes = await fetch(SUPABASE_URL + '/rest/v1/class_word_lists?class_id=eq.' + classes[0].id + '&select=id,name,words', { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    var lists = await listsRes.json();
    if (!lists.length) { msg.textContent = 'No word lists for this class.'; msg.style.color = '#dc2626'; return; }
    customListsData = {};
    lists.forEach(function(l) { customListsData[l.id] = { name: l.name, words: l.words || [] }; });
    sel.innerHTML = lists.map(function(l) { return '<option value="' + l.id + '">' + l.name + ' (' + (l.words||[]).length + ' words)</option>'; }).join('');
    sel.style.display = '';
    msg.textContent = '✓ ' + lists.length + ' list' + (lists.length > 1 ? 's' : '') + ' loaded'; msg.style.color = '#16a34a';
  } catch(e) { msg.textContent = 'Could not load lists.'; msg.style.color = '#dc2626'; }
}

function getCustomWords() {
  var listId = document.getElementById('customListSelect').value;
  var list = customListsData[listId];
  if (!list) return [];
  return list.words.filter(function(w) { return w.word && w.syllables && w.syllables.length > 0; }).map(function(w) {
    return { word: w.word, syllables: w.syllables, clue: w.clue || '' };
  });
}

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}
function stepCount(d){const el=document.getElementById('countInput');el.value=Math.min(20,Math.max(5,parseInt(el.value)+d));}

function generateWorksheet(){
  const src      = document.querySelector('input[name=src]:checked').value;
  const sylcount = document.querySelector('input[name=sylcount]:checked').value;
  const count    = parseInt(document.getElementById('countInput').value)||12;
  const showKey  = document.getElementById('toggleKey').checked;

  let pool;
  if (src === 'custom') {
    pool = getCustomWords();
    if (!pool.length) { alert('No words with syllable data in this list. Make sure the list was generated with AI breakdowns.'); return; }
  } else {
    if(sylcount==='2')    pool=WORDS.filter(w=>w.syllables.length===2);
    else if(sylcount==='3') pool=WORDS.filter(w=>w.syllables.length===3);
    else if(sylcount==='4') pool=WORDS.filter(w=>w.syllables.length>=4);
    else pool=[...WORDS];
  }

  const bank=shuffle(pool).slice(0,count);
  const sylLabel = src === 'custom' ? 'Custom List' : {2:'2 syllables',3:'3 syllables',4:'4+ syllables',mixed:'Mixed'}[sylcount];

  const rows=bank.map((w,i)=>`
    <tr>
      <td style="text-align:center;font-size:10px;font-weight:700;color:#94a3b8;">${i+1}</td>
      <td class="word-cell">${w.word}</td>
      <td><span class="chop-line"></span></td>
      <td style="text-align:center;"><span class="count-box"></span></td>
    </tr>`).join('');

  let keyHtml='';
  if(showKey){
    const items=bank.map((w,i)=>
      `<div class="ws-key-item">${i+1}. <span>${w.syllables.join(' | ')}</span> (${w.syllables.length})</div>`
    ).join('');
    keyHtml=`<div class="ws-key"><div class="ws-key-title">Answer Key — Teacher Copy</div><div class="ws-key-grid">${items}</div></div>`;
  }

  document.getElementById('worksheetOutput').innerHTML=`
    <div class="worksheet">
      <div class="ws-header">
        <div class="ws-logo"><div class="ws-logo-icon">SY</div><div><div class="ws-logo-text">Word Labs</div><div class="ws-logo-sub">Syllable Splitter</div></div></div>
        <div class="ws-meta">
          <div class="ws-meta-label">Student details</div>
          <div class="ws-meta-line">Name: <span class="ws-meta-field"></span></div>
          <div class="ws-meta-line">Date: <span class="ws-meta-field"></span></div>
          <div class="ws-meta-line">Class: <span class="ws-meta-field"></span></div>
        </div>
      </div>
      <div class="ws-title">Syllable Splitter</div>
      <div class="ws-subtitle">${count} words · ${sylLabel} · Word Labs</div>
      <div class="ws-instructions">📋 <strong>Instructions:</strong> Write the word with lines ( | ) between each syllable in the middle column. Write the number of syllables in the count box on the right.</div>
      <div class="ws-example">Example: &nbsp; <strong>basket</strong> &nbsp;→&nbsp; bas | ket &nbsp;→&nbsp; <strong>2</strong></div>
      <table class="syl-table">
        <thead><tr>
          <th class="th-num">#</th>
          <th class="th-word">Word</th>
          <th class="th-chop">Write the word — draw lines ( | ) to split into syllables</th>
          <th class="th-count">Syllable count</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${keyHtml}
    </div>`;

  document.getElementById('worksheetOutput').style.display='block';
  document.getElementById('previewEmpty').style.display='none';
  document.getElementById('regenBtn').style.display='block';
  document.getElementById('printBtn').style.display='block';
}
</script>
</body>
</html>
