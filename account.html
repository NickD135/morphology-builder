<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Account Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f5f5; --panel:#fff; --line:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --indigo:#4338ca; --indigo-2:#6366f1; --indigo-soft:#eef2ff;
      --green:#16a34a; --green-soft:#f0fdf4; --green-line:#bbf7d0; --green-text:#166534;
      --orange:#ea580c; --orange-soft:#fff7ed; --orange-line:#fed7aa; --orange-text:#9a3412;
      --bad:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
    button,input,select{ font:inherit; }

    .header{ position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); box-shadow:0 1px 2px rgba(15,23,42,.05); }
    .headerInner{ max-width:900px; margin:0 auto; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brandIcon{ width:50px; height:50px; border-radius:14px; background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 12px 24px rgba(67,56,202,.18); }
    .brandText h1{ margin:0; font-size:22px; font-weight:900; color:#312e81; }
    .brandText .sub{ font-size:10px; text-transform:uppercase; letter-spacing:.25em; color:var(--indigo-2); font-weight:900; display:block; }
    .topBtn{ border:none; background:#0f172a; color:#fff; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.12em; padding:12px 16px; border-radius:14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .topBtn:hover{ background:#000; }

    .wrap{ max-width:900px; margin:0 auto; padding:20px; }
    .panel{ background:var(--panel); border:4px solid var(--line); border-radius:28px; box-shadow:0 20px 28px rgba(15,23,42,.06); margin-bottom:20px; }
    .panelInner{ padding:28px; }
    .panelTitle{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em; color:var(--indigo); margin:0 0 18px; }

    .row{ display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--line); }
    .row:last-child{ border-bottom:none; }
    .rowLabel{ font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    .rowValue{ font-size:15px; font-weight:700; color:var(--text); text-align:right; }

    .badge{ display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; }
    .badge-active{ background:var(--green-soft); color:var(--green-text); border:1px solid var(--green-line); }
    .badge-trial{ background:var(--indigo-soft); color:var(--indigo); border:1px solid #c7d2fe; }
    .badge-expired{ background:#fef2f2; color:var(--bad); border:1px solid #fecaca; }
    .badge-failed{ background:var(--orange-soft); color:var(--orange-text); border:1px solid var(--orange-line); }

    .actionBtn{
      border:none; background:var(--indigo); color:#fff; font-weight:900; font-size:14px;
      padding:14px 28px; border-radius:16px; cursor:pointer; width:100%;
      box-shadow:0 10px 20px rgba(67,56,202,.2); transition:all .15s;
      text-transform:uppercase; letter-spacing:.08em;
    }
    .actionBtn:hover{ background:#3730a3; }
    .actionBtn:disabled{ opacity:.5; cursor:not-allowed; }
    .actionBtn.secondary{ background:#334155; box-shadow:0 10px 20px rgba(51,65,85,.15); }
    .actionBtn.secondary:hover{ background:#1e293b; }

    .loading{ text-align:center; padding:60px 20px; color:var(--muted); font-weight:700; font-size:15px; }

    @media(max-width:600px){
      .headerInner{ padding:12px 14px; }
      .brandIcon{ width:40px; height:40px; font-size:18px; border-radius:10px; }
      .brandText h1{ font-size:18px; }
      .topBtn{ padding:10px 12px; font-size:11px; }
      .panelInner{ padding:20px 16px; }
      .row{ flex-direction:column; align-items:flex-start; gap:4px; }
      .rowValue{ text-align:left; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="headerInner">
    <div class="brand">
      <div class="brandIcon">👤</div>
      <div class="brandText"><h1>Account Settings</h1><span class="sub">Word Labs</span></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="dashboard.html" class="topBtn">📊 Dashboard</a>
      <a href="class-setup.html" class="topBtn">⚙️ Setup</a>
      <a href="landing.html" class="topBtn" style="background:#334155;">🏠 Home</a>
      <button class="topBtn" style="background:#334155;" onclick="WordLabData.teacherSignOut()">Sign Out</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="loadingState" class="loading">Loading account details...</div>

  <div id="accountContent" style="display:none;">

    <!-- Account info -->
    <div class="panel">
      <div class="panelInner">
        <div class="panelTitle">Account</div>
        <div class="row">
          <div class="rowLabel">Email</div>
          <div class="rowValue" id="acctEmail">—</div>
        </div>
        <div class="row">
          <div class="rowLabel">School</div>
          <div class="rowValue" id="acctSchool">—</div>
        </div>
      </div>
    </div>

    <!-- Subscription -->
    <div class="panel">
      <div class="panelInner">
        <div class="panelTitle">Subscription</div>
        <div class="row">
          <div class="rowLabel">Plan</div>
          <div class="rowValue" id="acctPlan">—</div>
        </div>
        <div class="row" id="trialRow" style="display:none;">
          <div class="rowLabel">Trial ends</div>
          <div class="rowValue" id="acctTrialEnd">—</div>
        </div>
        <div class="row" id="renewRow" style="display:none;">
          <div class="rowLabel">Next billing date</div>
          <div class="rowValue" id="acctRenew">—</div>
        </div>
        <div class="row" id="studentLimitRow" style="display:none;">
          <div class="rowLabel">Student limit</div>
          <div class="rowValue" id="acctStudentLimit">—</div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="panel" id="actionsPanel">
      <div class="panelInner">
        <div class="panelTitle">Manage</div>
        <div id="portalBtnWrap" style="display:none;margin-bottom:12px;">
          <button class="actionBtn" onclick="openPortal()" id="portalBtn">Manage Subscription</button>
          <div style="font-size:12px;color:var(--muted);font-weight:600;text-align:center;margin-top:8px;">
            Update payment method, view invoices, or cancel your subscription
          </div>
        </div>
        <div id="upgradeBtnWrap" style="display:none;margin-bottom:12px;">
          <a href="pricing.html" class="actionBtn secondary" style="display:block;text-align:center;text-decoration:none;">View Plans & Upgrade</a>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wordlab-data.js"></script>
<script>
const SUPABASE_URL = 'https://qutsbcfkgiihcwaktsaz.supabase.co';

async function initAccount() {
  const user = await WordLabData.requireTeacherAuth();
  if (!user) return;

  const teacher = await WordLabData.getTeacherRecord();
  if (!teacher?.school_id) {
    document.getElementById('loadingState').textContent = 'Could not load account. Please try logging in again.';
    return;
  }

  // Fetch school details
  const { data: school } = await WordLabData._sb()
    .from('schools')
    .select('name, plan, trial_ends_at, student_limit, stripe_customer_id')
    .eq('id', teacher.school_id)
    .maybeSingle();

  if (!school) {
    document.getElementById('loadingState').textContent = 'Could not load school details.';
    return;
  }

  // Populate account info
  document.getElementById('acctEmail').textContent = user.email;
  document.getElementById('acctSchool').textContent = school.name || '—';

  // Plan badge
  const plan = school.plan || 'trial';
  const planEl = document.getElementById('acctPlan');
  const badgeClass = plan === 'active' ? 'badge-active'
    : plan === 'expired' ? 'badge-expired'
    : plan === 'payment_failed' ? 'badge-failed'
    : 'badge-trial';
  const planLabel = plan === 'active' ? 'Active'
    : plan === 'expired' ? 'Expired'
    : plan === 'payment_failed' ? 'Payment Failed'
    : 'Free Trial';
  planEl.innerHTML = '<span class="badge ' + badgeClass + '">' + planLabel + '</span>';

  // Trial end date
  if (plan === 'trial' && school.trial_ends_at) {
    const trialEnd = new Date(school.trial_ends_at);
    const daysLeft = Math.ceil((trialEnd - Date.now()) / 86400000);
    document.getElementById('acctTrialEnd').textContent = trialEnd.toLocaleDateString('en-AU', {
      day: 'numeric', month: 'long', year: 'numeric'
    }) + (daysLeft > 0 ? ' (' + daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' left)' : ' (expired)');
    document.getElementById('trialRow').style.display = '';
  }

  // Student limit
  if (school.student_limit) {
    document.getElementById('acctStudentLimit').textContent = school.student_limit + ' students';
    document.getElementById('studentLimitRow').style.display = '';
  }

  // Show manage subscription button if they have a Stripe customer
  if (school.stripe_customer_id) {
    document.getElementById('portalBtnWrap').style.display = '';

    // Fetch subscription details from Stripe
    try {
      const { data: { session: authSession } } = await WordLabData._sb().auth.getSession();
      if (authSession) {
        const subResp = await fetch(SUPABASE_URL + '/functions/v1/get-subscription', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authSession.access_token,
          },
          body: '{}',
        });
        const subData = await subResp.json();
        if (subData.subscription) {
          const sub = subData.subscription;
          const renewDate = new Date(sub.current_period_end * 1000);
          const daysUntilRenew = Math.ceil((renewDate - Date.now()) / 86400000);
          const renewEl = document.getElementById('acctRenew');

          if (sub.cancel_at_period_end) {
            renewEl.innerHTML = '<span style="color:var(--orange);">Cancels on ' +
              renewDate.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' }) +
              ' (' + daysUntilRenew + ' day' + (daysUntilRenew === 1 ? '' : 's') + ' left)</span>';
          } else {
            renewEl.textContent = renewDate.toLocaleDateString('en-AU', {
              day: 'numeric', month: 'long', year: 'numeric'
            }) + ' (' + daysUntilRenew + ' day' + (daysUntilRenew === 1 ? '' : 's') + ')';
          }
          document.getElementById('renewRow').style.display = '';
        }
      }
    } catch (e) {
      console.warn('Could not fetch subscription details:', e);
    }
  }

  // Show upgrade button if on trial or expired
  if (plan === 'trial' || plan === 'expired' || plan === 'payment_failed') {
    document.getElementById('upgradeBtnWrap').style.display = '';
  }

  // Hide loading, show content
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('accountContent').style.display = '';
}

async function openPortal() {
  const btn = document.getElementById('portalBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    const { data: { session } } = await WordLabData._sb().auth.getSession();
    if (!session) { window.location.href = 'teacher-login.html'; return; }

    const base = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');
    const resp = await fetch(SUPABASE_URL + '/functions/v1/create-portal-session', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token,
      },
      body: JSON.stringify({
        returnUrl: base + 'account.html',
      }),
    });

    const data = await resp.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert(data.error || 'Could not open subscription portal. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Manage Subscription';
    }
  } catch (e) {
    alert('Something went wrong: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Manage Subscription';
  }
}

initAccount();
</script>
</body>
</html>
