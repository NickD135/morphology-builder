<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Teacher Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Lexend',sans-serif; background:#f5f5f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

    .card{ background:#fff; border-radius:28px; padding:40px 36px; max-width:420px; width:100%; box-shadow:0 20px 60px rgba(15,23,42,.1); }

    .logo{ display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .logoIcon{ width:48px; height:48px; border-radius:14px; background:#4338ca; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 8px 20px rgba(67,56,202,.25); }
    .logoText h1{ font-size:20px; font-weight:900; color:#312e81; }
    .logoText span{ font-size:10px; text-transform:uppercase; letter-spacing:.22em; color:#6366f1; font-weight:900; display:block; }

    h2{ font-size:22px; font-weight:900; color:#0f172a; margin-bottom:6px; }
    .sub{ font-size:14px; font-weight:600; color:#64748b; margin-bottom:28px; }

    .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field label{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.14em; color:#64748b; }
    .field input{
      border:2px solid #e2e8f0; border-radius:14px; padding:13px 16px;
      font-size:15px; font-family:'Lexend',sans-serif; font-weight:600;
      outline:none; transition:border-color .15s, box-shadow .15s;
    }
    .field input:focus{ border-color:#4338ca; box-shadow:0 0 0 4px rgba(67,56,202,.1); }

    .errMsg{ background:#fef2f2; border:2px solid #fecaca; border-radius:12px; padding:12px 16px; font-size:13px; font-weight:700; color:#dc2626; margin-bottom:16px; display:none; }
    .successMsg{ background:#f0fdf4; border:2px solid #bbf7d0; border-radius:12px; padding:12px 16px; font-size:13px; font-weight:700; color:#166534; margin-bottom:16px; display:none; }

    .primaryBtn{
      width:100%; border:none; background:#4338ca; color:#fff;
      font-family:'Lexend',sans-serif; font-weight:900; font-size:15px;
      padding:14px; border-radius:16px; cursor:pointer;
      text-transform:uppercase; letter-spacing:.08em;
      box-shadow:0 10px 20px rgba(67,56,202,.2);
      transition:background .15s, transform .1s, opacity .15s;
    }
    .primaryBtn:hover:not(:disabled){ background:#3730a3; transform:translateY(-1px); }
    .primaryBtn:disabled{ opacity:.6; cursor:default; transform:none; }

    .divider{ text-align:center; color:#94a3b8; font-size:13px; font-weight:700; margin:20px 0; }

    .links{ text-align:center; font-size:13px; font-weight:700; color:#64748b; margin-top:20px; }
    .links a{ color:#4338ca; text-decoration:none; }
    .links a:hover{ text-decoration:underline; }

    .backLink{ display:inline-flex; align-items:center; gap:6px; color:#94a3b8; font-size:12px; font-weight:700; text-decoration:none; margin-bottom:24px; }
    .backLink:hover{ color:#475569; }
  </style>
</head>
<body>
<div class="card">
  <a href="landing" class="backLink">← Back to Word Labs</a>

  <div class="logo">
    <div class="logoIcon">🔬</div>
    <div class="logoText">
      <h1>Word Labs</h1>
      <span>Teacher Portal</span>
    </div>
  </div>

  <h2>Sign in</h2>
  <p class="sub">Welcome back! Sign in to access your classes.</p>

  <div class="errMsg" id="errMsg"></div>
  <div class="successMsg" id="successMsg"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="you@school.edu.au" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') signIn()">
  </div>

  <button class="primaryBtn" id="signInBtn" onclick="signIn()">Sign In →</button>

  <div class="links" style="margin-top:16px;">
    <a href="#" onclick="showForgotPassword(); return false;">Forgot password?</a>
  </div>

  <div class="divider">— or —</div>

  <div class="links">
    Don't have an account? <a href="teacher-signup">Create one here →</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL  = 'https://qutsbcfkgiihcwaktsaz.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1dHNiY2ZrZ2lpaGN3YWt0c2F6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDE1NDksImV4cCI6MjA4OTUxNzU0OX0.h1N26KCcyHDrW4FRk6iBNmJUMQcFCYi8eHpOC818B8E';
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // If already logged in, redirect away
  _sb.auth.getSession().then(({ data: { session } }) => {
    if (session) redirectAfterLogin();
  });

  function getReturnTo() {
    const params = new URLSearchParams(window.location.search);
    const rt = params.get('returnTo');
    return rt || '/class-setup';
  }

  function redirectAfterLogin() {
    window.location.href = getReturnTo();
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errMsg').style.display = 'none';
  }

  async function signIn() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('signInBtn');

    if (!email || !password) { showErr('Please enter your email and password.'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    document.getElementById('errMsg').style.display = 'none';

    const { data, error } = await _sb.auth.signInWithPassword({ email, password });

    if (error) {
      showErr(error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message);
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      return;
    }

    redirectAfterLogin();
  }

  async function showForgotPassword() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) {
      showErr('Enter your email address above, then click "Forgot password?".');
      return;
    }
    const { error } = await _sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/teacher-login'
    });
    if (error) { showErr(error.message); return; }
    showSuccess('Password reset email sent! Check your inbox.');
  }
</script>
<p style="text-align:center;font-size:12px;font-weight:600;color:#94a3b8;margin-top:24px;">
  <a href="privacy" style="color:#94a3b8;">Privacy Policy</a> · <a href="terms" style="color:#94a3b8;">Terms of Service</a>
</p>
</body>
</html>
