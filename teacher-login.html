<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Labs – Teacher Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .skip-link{position:absolute;top:-40px;left:0;background:#4338ca;color:#fff;padding:8px 16px;z-index:10000;font-weight:700;font-size:14px;border-radius:0 0 8px 0;transition:top .2s;}
    .skip-link:focus{top:0;}
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Lexend',sans-serif; background:linear-gradient(180deg,#0d0b1a 0%,#110f1e 50%,#0d0b1a 100%); color:#e0e7ff; min-height:100vh; }

    .header{ position:sticky; top:0; z-index:50; background:rgba(13,11,26,.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(99,102,241,.1); }
    .headerInner{ max-width:1200px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand{ display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brandIcon{ width:36px; height:36px; border-radius:10px; background:#4338ca; color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; }
    .brandName{ font-size:18px; font-weight:900; color:#e0e7ff; letter-spacing:-.02em; }
    .headerRight{ display:flex; align-items:center; gap:8px; }
    .headerLink{ border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#94a3b8; font-weight:700; font-size:12px; padding:7px 14px; border-radius:10px; text-decoration:none; transition:all .15s; }
    .headerLink:hover{ background:rgba(255,255,255,.08); color:#e0e7ff; }

    .page-wrap{ display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 65px); padding:40px 20px; }
    .auth-panel{ background:rgba(255,255,255,.03); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.06); border-radius:24px; padding:40px 36px; max-width:440px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,.25); }
    .auth-icon{ font-size:48px; text-align:center; margin-bottom:12px; }
    .auth-title{ font-size:24px; font-weight:900; text-align:center; margin-bottom:6px; }
    .auth-sub{ font-size:14px; color:#94a3b8; font-weight:600; text-align:center; margin-bottom:24px; }

    .tabs{ display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,.04); border-radius:12px; padding:4px; }
    .tab{ flex:1; border:none; background:transparent; color:#94a3b8; font-weight:800; font-size:13px; padding:10px; border-radius:10px; cursor:pointer; transition:all .15s; font-family:'Lexend',sans-serif; }
    .tab.active{ background:#4338ca; color:#fff; }

    .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .field label{ font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:#94a3b8; }
    .field input{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 14px; color:#e0e7ff; font-size:14px; outline:none; transition:border-color .15s; font-family:'Lexend',sans-serif; }
    .field input:focus{ border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .field input::placeholder{ color:#475569; }

    .submit-btn{ width:100%; border:none; background:#4338ca; color:#fff; font-weight:900; font-size:14px; padding:14px; border-radius:14px; cursor:pointer; font-family:'Lexend',sans-serif; transition:background .15s; margin-top:8px; text-transform:uppercase; letter-spacing:.06em; }
    .submit-btn:hover{ background:#3730a3; }
    .submit-btn:disabled{ opacity:.5; cursor:default; }

    .err-msg{ color:#f87171; font-size:13px; font-weight:700; text-align:center; min-height:20px; margin-top:8px; }
    .success-msg{ color:#4ade80; font-size:13px; font-weight:700; text-align:center; margin-top:8px; }

    .forgot-link{ display:block; text-align:center; margin-top:14px; color:#94a3b8; font-size:12px; font-weight:700; cursor:pointer; text-decoration:underline; }
    .forgot-link:hover{ color:#e0e7ff; }

    .divider{ border:none; border-top:1px solid rgba(255,255,255,.06); margin:20px 0; }

    .confirmed-banner{ background:rgba(22,163,74,.15); border:1px solid rgba(74,222,128,.2); border-radius:12px; padding:12px 16px; font-size:13px; font-weight:700; color:#4ade80; text-align:center; margin-bottom:20px; display:none; }
    .confirmed-banner.show{ display:block; }

    .alt-link{ display:block; text-align:center; color:#94a3b8; font-size:13px; font-weight:700; }
    .alt-link a{ color:#a5b4fc; text-decoration:none; font-weight:800; }
    .alt-link a:hover{ text-decoration:underline; }

    .footer{ border-top:1px solid rgba(99,102,241,.1); background:#080716; margin-top:auto; }
    .footer-inner{ max-width:1200px; margin:0 auto; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .footer-brand{ font-size:14px; font-weight:800; color:#4338ca; }
    .footer-note{ font-size:12px; color:#94a3b8; font-weight:600; }
    .footer-note a{ color:#94a3b8; text-decoration:none; }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="header" role="banner">
  <div class="headerInner">
    <a class="brand" href="landing.html">
      <div class="brandIcon">🧪</div>
      <span class="brandName">Word Labs</span>
    </a>
    <nav class="headerRight" role="navigation" aria-label="Main navigation">
      <a href="landing.html" class="headerLink">Home</a>
    </nav>
  </div>
</header>

<div class="page-wrap" id="main-content" role="main">
  <div class="auth-panel">
    <div class="auth-icon">🔬</div>
    <div class="auth-title">Teacher Access</div>
    <div class="auth-sub">Log in or create an account to manage your classes</div>

    <div class="confirmed-banner" id="confirmedBanner">Email verified! You can now log in.</div>

    <div class="tabs" role="navigation" aria-label="Login or register">
      <button class="tab active" onclick="showTab('login')">Log In</button>
      <button class="tab" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="loginTab">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="teacher@school.edu.au" autocomplete="email">
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="loginBtn" onclick="doLogin()">Log In</button>
      <div class="err-msg" id="loginErr" aria-live="assertive"></div>
      <div class="forgot-link" onclick="doForgotPassword()">Forgot password?</div>
      <div class="success-msg" id="forgotSuccess" aria-live="polite"></div>
    </div>

    <!-- Register Form -->
    <div id="registerTab" style="display:none;">
      <div class="field">
        <label for="regSchool">School name</label>
        <input type="text" id="regSchool" placeholder="e.g. Riverside Primary School" autocomplete="organization">
      </div>
      <div class="field">
        <label for="regName">Full name</label>
        <input type="text" id="regName" placeholder="Ms Smith" autocomplete="name">
      </div>
      <div class="field">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="teacher@school.edu.au" autocomplete="email">
      </div>
      <div class="field">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password (min 6 chars)" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="regConfirm">Confirm password</label>
        <input type="password" id="regConfirm" placeholder="Confirm your password" autocomplete="new-password">
      </div>
      <button class="submit-btn" id="regBtn" onclick="doRegister()">Create Account</button>
      <div class="err-msg" id="regErr" aria-live="assertive"></div>
      <div class="success-msg" id="regSuccess" aria-live="polite"></div>
    </div>

    <hr class="divider">
    <div class="alt-link">Need help? <a href="faq.html">Read the FAQ</a> or <a href="teacher-guide.html">Teacher Guide</a></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <span class="footer-brand">🧪 Word Labs</span>
    <span class="footer-note">Built for Australian classrooms · <a href="about.html">About</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a> · <a href="mailto:nick@wordlabs.app">Contact</a></span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="wordlab-data.js"></script>
<script>
const SUPABASE_URL  = 'https://kdpavfrzmmzknqfpodrl.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkcGF2ZnJ6bW16a25xZnBvZHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MjgzOTIsImV4cCI6MjA5MDAwNDM5Mn0.n5fe7HvXWMsM4xN_iaU_N4xLkC5xD4y9Uoer_DG-dlg';
const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Show confirmation banner if redirected from email verification
if (new URLSearchParams(window.location.search).get('confirmed') === '1') {
  document.getElementById('confirmedBanner').classList.add('show');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('loginTab').style.display = '';
    document.getElementById('registerTab').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('loginTab').style.display = 'none';
    document.getElementById('registerTab').style.display = '';
  }
  // Clear errors
  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
  document.getElementById('regSuccess').textContent = '';
  document.getElementById('forgotSuccess').textContent = '';
}

function getReturnUrl() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('returnTo') || 'dashboard';
  // Only allow relative URLs to prevent open redirect attacks
  if (/^[a-zA-Z0-9\-_\/]+(\?[a-zA-Z0-9\-_=&%]*)?$/.test(raw)) return raw;
  return 'dashboard';
}

async function ensureSchoolAndTeacher(authUserId, email) {
  const { data: existing } = await _sb
    .from('teachers')
    .select('id, school_id')
    .eq('auth_user_id', authUserId)
    .maybeSingle();
  if (existing?.school_id) return; // already set up

  // Pull school name from signup metadata if available
  const { data: { user } } = await _sb.auth.getUser();
  const schoolName = user?.user_metadata?.school_name || 'My School';

  // Create school — active plan with 1-year window (matches teacher-signup.html)
  const { data: school, error: schoolErr } = await _sb
    .from('schools')
    .insert({ name: schoolName, plan: 'active', trial_ends_at: new Date(Date.now() + 365 * 86400000).toISOString() })
    .select('id')
    .single();
  if (schoolErr) { console.warn('School creation failed:', schoolErr); return; }

  // Create or update teacher record
  if (existing) {
    await _sb.from('teachers').update({ school_id: school.id, email }).eq('auth_user_id', authUserId);
  } else {
    await _sb.from('teachers').insert({ auth_user_id: authUserId, school_id: school.id, email });
  }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';

  if (!email || !password) { errEl.textContent = 'Please enter email and password.'; return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Ensure school + teacher records exist (handles email-confirmed signups)
    await ensureSchoolAndTeacher(data.user.id, email);

    // New teachers (no classes) go to onboarding instead of dashboard
    const returnUrl = getReturnUrl();
    if (returnUrl === 'dashboard') {
      const { data: cls } = await _sb.from('classes').select('id').limit(1);
      if (!cls || cls.length === 0) {
        window.location.href = 'onboarding.html';
        return;
      }
    }
    window.location.href = returnUrl;
  } catch(e) {
    errEl.textContent = e.message || 'Login failed. Check your credentials.';
    btn.disabled = false; btn.textContent = 'Log In';
  }
}

async function doRegister() {
  const schoolName = document.getElementById('regSchool').value.trim();
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const errEl = document.getElementById('regErr');
  const successEl = document.getElementById('regSuccess');
  errEl.textContent = ''; successEl.textContent = '';

  if (!schoolName) { errEl.textContent = 'Please enter your school name.'; return; }
  if (!name) { errEl.textContent = 'Please enter your name.'; return; }
  if (!email) { errEl.textContent = 'Please enter your email.'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; return; }

  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  try {
    // Create Supabase auth account
    const { data, error } = await _sb.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name, school_name: schoolName },
        emailRedirectTo: window.location.origin + '/teacher-login.html?confirmed=1'
      }
    });
    if (error) throw error;

    // Also insert into teacher_accounts table for tier tracking
    const trialEnds = new Date();
    trialEnds.setDate(trialEnds.getDate() + 7);

    await _sb.from('teacher_accounts').insert({
      email: email,
      name: name,
      school_name: schoolName,
      password_hash: '(supabase_auth)',
      tier: 'free',
      student_cap: 5,
      trial_ends_at: trialEnds.toISOString()
    });

    // Notify Nick of new signup (fire-and-forget)
    fetch(SUPABASE_URL + '/functions/v1/send-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: schoolName,
        email: email,
        role: 'Teacher',
        category: 'New signup',
        message: 'New teacher signup: ' + email + ' (' + name + ') from ' + schoolName + ' via teacher-login page.'
      })
    }).catch(function() {});

    // Check if email confirmation is required
    if (data.user && !data.session) {
      successEl.textContent = 'Account created! Check your email to confirm, then log in.';
      btn.textContent = 'Create Account'; btn.disabled = false;
    } else {
      // Auto-logged in — new account, go to onboarding
      window.location.href = 'onboarding.html?from=signup';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Registration failed. Please try again.';
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

async function doForgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  const errEl = document.getElementById('loginErr');
  const successEl = document.getElementById('forgotSuccess');
  errEl.textContent = ''; successEl.textContent = '';

  if (!email) { errEl.textContent = 'Enter your email above, then click Forgot password.'; return; }

  try {
    const { error } = await _sb.auth.resetPasswordForEmail(email);
    if (error) throw error;
    successEl.textContent = 'Password reset email sent. Check your inbox.';
  } catch(e) {
    errEl.textContent = e.message || 'Could not send reset email.';
  }
}

// Check if already logged in
(async function() {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    const returnUrl = getReturnUrl();
    if (returnUrl === 'dashboard') {
      const { data: cls } = await _sb.from('classes').select('id').limit(1);
      if (!cls || cls.length === 0) {
        window.location.href = 'onboarding.html';
        return;
      }
    }
    window.location.href = returnUrl;
  }
})();

// Handle Enter key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('loginTab').style.display !== 'none') doLogin();
    else doRegister();
  }
});

// Clear validation errors when user starts typing
['regName','regEmail','regPassword','regConfirm'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('input', function() { document.getElementById('regErr').textContent = ''; });
});
['loginEmail','loginPassword'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('input', function() { document.getElementById('loginErr').textContent = ''; });
});
</script>
</body>
</html>
