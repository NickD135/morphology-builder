<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meaning Match-Up</title>
  <style>
    :root{
      --bg:#f5f5f5;
      --panel:#ffffff;
      --line:#e5e7eb;
      --text:#1f2937;
      --muted:#6b7280;
      --orange:#f59e0b;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#60a5fa;
      --purple:#c084fc;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 18px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
    }

    .brand .icon{
      width:34px;
      height:34px;
      border-radius:10px;
      background:var(--orange);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
    }

    .hud{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      background:#fff7ed;
      color:#92400e;
      border:1px solid #fed7aa;
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      font-size:14px;
    }

    .backBtn{
      border:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .backBtn:hover{
      background:#f8fafc;
    }

    .energyCard,
    .missionCard,
    .gameCard{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
    }

    .label{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.18em;
      color:var(--muted);
      font-weight:800;
      margin-bottom:10px;
    }

    .energyRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
      font-weight:800;
    }

    .bar{
      width:100%;
      height:16px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
    }

    .barFill{
      height:100%;
      width:100%;
      background:linear-gradient(90deg,#ef4444 0%, #f59e0b 50%, #22c55e 100%);
      transition:width .2s linear;
    }

    h1,h2,p{
      margin:0;
    }

    .missionBadge{
      display:inline-block;
      background:#fef3c7;
      color:#92400e;
      padding:7px 10px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:12px;
    }

    .missionTitle{
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .missionSub{
      color:var(--muted);
      font-weight:600;
    }

    .challengeTop{
      text-align:center;
      margin-bottom:22px;
    }

    .challengeTop .mini{
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.18em;
    }

    .challengeTop .miniSub{
      color:var(--muted);
      font-weight:700;
      margin-top:6px;
    }

    .wordArea{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
      margin:30px 0 20px;
    }

    .dropZone{
      width:160px;
      height:110px;
      border:4px dashed #c7d2fe;
      border-radius:24px;
      background:#eef2ff;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .dropZoneText{
      font-size:40px;
      font-weight:900;
      color:#a5b4fc;
      letter-spacing:.05em;
    }

    .baseWord{
      font-size:60px;
      line-height:1;
      font-weight:900;
      color:#1f2a44;
      text-align:center;
    }

    .baseMeaning{
      text-align:center;
      color:var(--muted);
      font-weight:700;
      margin-bottom:28px;
      font-size:18px;
      line-height:1.6;
    }

    .options{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin:10px 0 22px;
    }

    .bubbleBtn{
      width:120px;
      height:120px;
      border-radius:999px;
      border:4px solid;
      background:#fff;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease;
      animation:float 3s ease-in-out infinite;
    }

    .bubbleBtn:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 12px 24px rgba(0,0,0,.12);
    }

    .bubbleBtn:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .bubbleBtn.blue{ border-color:var(--blue); color:#2563eb; }
    .bubbleBtn.green{ border-color:#4ade80; color:#16a34a; }
    .bubbleBtn.purple{ border-color:var(--purple); color:#9333ea; }
    .bubbleBtn.orange{ border-color:#fdba74; color:#ea580c; }

    .bubbleInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      height:100%;
      width:100%;
      padding:8px;
      text-align:center;
    }

    .bubbleInner span{
      font-size:26px;
      font-weight:900;
    }

    .bubbleInner small{
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      line-height:1.25;
    }

    .feedback{
      min-height:28px;
      text-align:center;
      font-size:24px;
      font-weight:900;
    }

    .feedback.ok{ color:var(--green); }
    .feedback.bad{ color:var(--red); }

    .subFeedback{
      min-height:26px;
      text-align:center;
      color:var(--muted);
      font-weight:700;
      margin-top:4px;
      line-height:1.5;
    }

    .actionRow{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .secondaryBtn,
    .primaryBtn{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-weight:800;
      cursor:pointer;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .secondaryBtn{
      background:#fff;
      border:1px solid var(--line);
      color:#6b7280;
    }

    .secondaryBtn:hover{
      background:#f8fafc;
    }

    .primaryBtn{
      background:var(--orange);
      color:#fff;
      box-shadow:0 10px 24px rgba(245,158,11,.25);
    }

    .primaryBtn:hover{
      background:#d97706;
    }

    .flashSuccess{
      background:#ecfdf5;
      border-color:#4ade80;
    }

    .flashFail{
      background:#fef2f2;
      border-color:#f87171;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-10px); }
    }

    @media (max-width:700px){
      .baseWord{ font-size:42px; }
      .dropZone{ width:130px; height:95px; }
      .dropZoneText{ font-size:30px; }
      .baseMeaning{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="icon">🧠</div>
        <div>
          <div>Meaning Match-Up</div>
          <div style="font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:.14em;">Mission Mode</div>
        </div>
      </div>

      <div class="hud">
        <div class="pill" id="streakPill">Streak: 0</div>
        <div class="pill" id="scorePill">0 XP</div>
        <button class="backBtn" onclick="window.location.href='index.html'">Back to Builder</button>
      </div>
    </div>

    <div class="energyCard">
      <div class="label">Energy level</div>
      <div class="energyRow">
        <span></span>
        <span id="fuelLabel">100%</span>
      </div>
      <div class="bar">
        <div class="barFill" id="fuelBar"></div>
      </div>
    </div>

    <div class="missionCard">
      <div class="missionBadge">Active mission</div>
      <div class="missionTitle">Meaning Match-Up</div>
      <div class="missionSub">Read the meaning clue and choose the morpheme that matches it.</div>
    </div>

    <div class="gameCard">
      <div class="challengeTop">
        <div class="mini">Meaning challenge</div>
        <div class="miniSub">Choose the morpheme that matches the clue.</div>
      </div>

      <div class="wordArea">
        <div class="dropZone" id="prefixDropZone">
          <div class="dropZoneText" id="dropZoneText">?</div>
        </div>
        <div class="baseWord" id="word">MATCH</div>
      </div>

      <div class="baseMeaning" id="baseMeaning">Which morpheme matches this meaning?</div>

      <div class="options" id="options"></div>

      <div class="feedback" id="feedback"></div>
      <div class="subFeedback" id="subFeedback"></div>

      <div class="actionRow">
        <button class="secondaryBtn" id="recalibrateBtn" type="button">Recalibrate</button>
        <button class="primaryBtn" id="skipBtn" type="button">Skip</button>
      </div>
    </div>
  </div>

  <script>
    const PREFIXES = [
      { id:"ad", form:"ad", meaning:"towards; to", allowedPos:["noun","adj","verb"] },
      { id:"anti", form:"anti", meaning:"against", allowedPos:["noun","adj","verb"] },
      { id:"de", form:"de", meaning:"undo; remove; down", allowedPos:["verb"] },
      { id:"dis", form:"dis", meaning:"not; opposite; apart", allowedPos:["noun","adj","verb"] },
      { id:"in", form:"in", meaning:"not; into", allowedPos:["adj","verb"] },
      { id:"inter", form:"inter", meaning:"between", allowedPos:["noun","adj","verb"] },
      { id:"mis", form:"mis", meaning:"wrong", allowedPos:["verb"] },
      { id:"non", form:"non", meaning:"not", allowedPos:["noun","adj"] },
      { id:"over", form:"over", meaning:"too much", allowedPos:["verb","adj"] },
      { id:"post", form:"post", meaning:"after", allowedPos:["noun","adj"] },
      { id:"pre", form:"pre", meaning:"before", allowedPos:["noun","adj","verb"] },
      { id:"re", form:"re", meaning:"again", allowedPos:["verb"] },
      { id:"sub", form:"sub", meaning:"under; below", allowedPos:["noun","adj","verb"] },
      { id:"super", form:"super", meaning:"above; beyond", allowedPos:["noun","adj","verb"] },
      { id:"trans", form:"trans", meaning:"across", allowedPos:["noun","adj","verb"] },
      { id:"un", form:"un", meaning:"not", allowedPos:["adj","verb"] },
      { id:"under", form:"under", meaning:"below", allowedPos:["noun","adj","verb"] }
    ];

    let score = 0;
    let streak = 0;
    let fuel = 100;
    let currentQuestion = null;
    let buttonsLocked = false;
    let fuelInterval = null;

    const wordEl = document.getElementById("word");
    const baseMeaningEl = document.getElementById("baseMeaning");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const subFeedbackEl = document.getElementById("subFeedback");
    const scorePillEl = document.getElementById("scorePill");
    const streakPillEl = document.getElementById("streakPill");
    const fuelBarEl = document.getElementById("fuelBar");
    const fuelLabelEl = document.getElementById("fuelLabel");
    const dropZoneEl = document.getElementById("prefixDropZone");
    const dropZoneTextEl = document.getElementById("dropZoneText");

    function shuffleArray(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function getPrefixLabel(prefix) {
      return (prefix.form || "").toUpperCase() + "-";
    }

    function updateHud() {
      scorePillEl.textContent = `${score} XP`;
      streakPillEl.textContent = `Streak: ${streak}`;
      fuelBarEl.style.width = `${Math.max(fuel, 0)}%`;
      fuelLabelEl.textContent = `${Math.max(Math.round(fuel), 0)}%`;
    }

    function generateQuestion() {
      const correct = PREFIXES[Math.floor(Math.random() * PREFIXES.length)];
      const wrongOptions = shuffleArray(
        PREFIXES.filter(p => p.id !== correct.id)
      ).slice(0, 2);

      return {
        correct,
        options: shuffleArray([correct, ...wrongOptions])
      };
    }

    function resetDropZone() {
      dropZoneEl.classList.remove("flashSuccess", "flashFail");
      dropZoneTextEl.textContent = "?";
      dropZoneTextEl.style.color = "#a5b4fc";
    }

    function loadQuestion() {
      if (fuel <= 0) return;

      buttonsLocked = false;
      currentQuestion = generateQuestion();

      wordEl.textContent = "MEANING";
      baseMeaningEl.innerHTML = `
        <strong>Which morpheme means:</strong><br>
        "${currentQuestion.correct.meaning}"
      `;

      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";
      subFeedbackEl.textContent = "";
      resetDropZone();

      optionsEl.innerHTML = "";

      currentQuestion.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `bubbleBtn ${["blue","green","purple","orange"][index % 4]}`;
        btn.style.animationDelay = `${index * 0.18}s`;

        const inner = document.createElement("div");
        inner.className = "bubbleInner";

        const main = document.createElement("span");
        main.textContent = getPrefixLabel(option);

        inner.appendChild(main);
        btn.appendChild(inner);

        btn.addEventListener("click", () => checkAnswer(option));
        optionsEl.appendChild(btn);
      });
    }

    function lockButtons() {
      optionsEl.querySelectorAll("button").forEach(btn => btn.disabled = true);
    }

    function checkAnswer(choice) {
      if (buttonsLocked || fuel <= 0) return;

      buttonsLocked = true;
      lockButtons();
      dropZoneTextEl.textContent = getPrefixLabel(choice);

      if (choice.id === currentQuestion.correct.id) {
        score += 50 + (streak * 10);
        streak += 1;
        fuel = Math.min(fuel + 8, 100);

        feedbackEl.textContent = "Correct";
        feedbackEl.className = "feedback ok";
        subFeedbackEl.textContent = `${getPrefixLabel(choice)} means "${choice.meaning}"`;
        dropZoneTextEl.style.color = "#16a34a";
        dropZoneEl.classList.add("flashSuccess");
      } else {
        streak = 0;
        fuel = Math.max(fuel - 12, 0);

        feedbackEl.textContent = "Not quite";
        feedbackEl.className = "feedback bad";
        subFeedbackEl.textContent = `Correct answer: ${getPrefixLabel(currentQuestion.correct)} — ${currentQuestion.correct.meaning}`;
        dropZoneTextEl.style.color = "#dc2626";
        dropZoneEl.classList.add("flashFail");
      }

      updateHud();

      if (fuel <= 0) {
        setTimeout(endGame, 800);
        return;
      }

      setTimeout(loadQuestion, 1400);
    }

    function startFuelDrain() {
      clearInterval(fuelInterval);
      fuelInterval = setInterval(() => {
        fuel -= 0.25;
        if (fuel <= 0) {
          fuel = 0;
          updateHud();
          endGame();
          clearInterval(fuelInterval);
          return;
        }
        updateHud();
      }, 220);
    }

    function endGame() {
      buttonsLocked = true;
      optionsEl.innerHTML = "";
      feedbackEl.textContent = "Mission over";
      feedbackEl.className = "feedback bad";
      subFeedbackEl.textContent = `Final score: ${score} XP`;
    }

    document.getElementById("recalibrateBtn").addEventListener("click", () => {
      score = 0;
      streak = 0;
      fuel = 100;
      updateHud();
      startFuelDrain();
      loadQuestion();
    });

    document.getElementById("skipBtn").addEventListener("click", () => {
      if (fuel <= 0) return;
      streak = 0;
      fuel = Math.max(fuel - 8, 0);
      updateHud();

      if (fuel <= 0) {
        endGame();
        return;
      }

      loadQuestion();
    });

    updateHud();
    startFuelDrain();
    loadQuestion();
  </script>
</body>
</html>
