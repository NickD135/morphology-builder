<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Lab – Meaning Match-Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f5f5; --panel:#ffffff; --line:#e2e8f0; --text:#0f172a; --muted:#64748b;
      --indigo:#4338ca; --indigo-2:#6366f1; --indigo-soft:#eef2ff;
      --green-soft:#f0fdf4; --green-line:#bbf7d0; --green-text:#166534;
      --orange-soft:#fff7ed; --orange-line:#fed7aa; --orange-text:#9a3412;
      --ok:#15803d; --warn:#b45309; --bad:#dc2626;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; letter-spacing:.02em; }
    button,input{ font:inherit; }
    .header{ position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); box-shadow:0 1px 2px rgba(15,23,42,.05); }
    .headerInner{ max-width:900px; margin:0 auto; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brandIcon{ width:50px; height:50px; border-radius:14px; background:var(--indigo); color:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 12px 24px rgba(67,56,202,.18); flex:0 0 auto; }
    .brandText h1{ margin:0; font-size:24px; font-weight:900; letter-spacing:-.02em; color:#312e81; }
    .brandText .sub{ font-size:10px; text-transform:uppercase; letter-spacing:.25em; color:var(--indigo-2); font-weight:900; margin-top:3px; display:block; }
    .hud{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill{ display:inline-flex; align-items:center; justify-content:center; min-height:40px; border:1px solid var(--line); border-radius:999px; background:#fff; padding:8px 16px; font-size:13px; font-weight:800; color:#334155; }
    .pill.score{ background:var(--indigo); color:#fff; border-color:transparent; }
    .pill.streak{ background:var(--orange-soft); color:var(--orange-text); border-color:var(--orange-line); }
    .topBtn{ border:none; background:#0f172a; color:#fff; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.12em; padding:12px 16px; border-radius:14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .topBtn:hover{ background:#000; }
    .wrap{ max-width:900px; margin:0 auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
    .panel{ background:var(--panel); border:4px solid var(--line); border-radius:28px; box-shadow:0 20px 28px rgba(15,23,42,.06); overflow:hidden; }
    .panelInner{ padding:24px; }
    .panelTitle{ margin:0 0 12px 0; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em; color:var(--indigo); }
    .energyRow{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; font-weight:800; color:var(--muted); }
    .bar{ width:100%; height:14px; background:var(--line); border-radius:999px; overflow:hidden; }
    .barFill{ height:100%; width:100%; background:linear-gradient(90deg,var(--bad) 0%,var(--warn) 50%,var(--ok) 100%); transition:width .2s linear; border-radius:999px; }
    .missionBadge{ display:inline-block; background:var(--indigo-soft); color:var(--indigo); padding:6px 12px; border-radius:999px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.12em; margin-bottom:10px; border:1px solid rgba(99,102,241,.2); }
    .missionTitle{ font-size:20px; font-weight:900; margin:0 0 4px; color:#312e81; }
    .missionSub{ color:var(--muted); font-weight:600; font-size:14px; }
    .challengeLabel{ font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.22em; color:var(--muted); text-align:center; margin-bottom:6px; }
    .challengeSub{ color:var(--muted); font-weight:700; font-size:13px; text-align:center; margin-bottom:24px; }
    .wordArea{ display:flex; justify-content:center; align-items:center; gap:16px; flex-wrap:wrap; margin:24px 0 20px; }
    .dropZone{ width:150px; height:100px; border:4px dashed #c7d2fe; border-radius:20px; background:var(--indigo-soft); display:flex; align-items:center; justify-content:center; transition:.2s ease; }
    .dropZoneText{ font-size:36px; font-weight:900; color:#a5b4fc; letter-spacing:.05em; }
    .baseWord{ font-size:clamp(24px,10vw,56px); line-height:1; font-weight:900; color:#312e81; text-align:center; letter-spacing:-.02em; word-break:break-word; }
    .baseMeaning{ text-align:center; color:#334155; font-weight:700; margin-bottom:24px; font-size:16px; line-height:1.6; }
    .baseMeaning strong{ color:var(--indigo); }
    .options{ display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin:8px 0 20px; }
    .bubbleBtn{ width:116px; height:116px; border-radius:999px; border:4px solid; background:#fff; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; animation:float 3s ease-in-out infinite; }
    .bubbleBtn:hover{ transform:translateY(-4px) scale(1.04); box-shadow:0 16px 28px rgba(0,0,0,.12); }
    .bubbleBtn:disabled{ opacity:.55; cursor:not-allowed; transform:none; animation:none; }
    .bubbleBtn.blue{ border-color:#bfdbfe; color:#1e40af; }
    .bubbleBtn.green{ border-color:#bbf7d0; color:#166534; }
    .bubbleBtn.purple{ border-color:#ddd6fe; color:#6d28d9; }
    .bubbleBtn.orange{ border-color:var(--orange-line); color:var(--orange-text); }
    .bubbleInner{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; height:100%; padding:10px; text-align:center; }
    .bubbleInner span{ font-size:24px; font-weight:900; }
    .feedback{ min-height:28px; text-align:center; font-size:22px; font-weight:900; }
    .feedback.ok{ color:var(--ok); }
    .feedback.bad{ color:var(--bad); }
    .subFeedback{ min-height:24px; text-align:center; color:var(--muted); font-weight:700; margin-top:4px; line-height:1.5; font-size:14px; }
    .actionRow{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .secondaryBtn{ border:2px solid var(--line); background:#fff; color:#334155; font-weight:800; font-size:13px; padding:12px 20px; border-radius:16px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; transition:all .15s; }
    .secondaryBtn:hover{ background:#f8fafc; }
    .primaryBtn{ border:none; background:var(--indigo); color:#fff; font-weight:900; font-size:13px; padding:14px 28px; border-radius:16px; cursor:pointer; text-transform:uppercase; letter-spacing:.08em; box-shadow:0 10px 20px rgba(67,56,202,.2); transition:all .15s; }
    .primaryBtn:hover{ background:#3730a3; transform:translateY(-1px); }
    .flashSuccess{ background:var(--green-soft) !important; border-color:var(--green-line) !important; }
    .flashFail{ background:#fef2f2 !important; border-color:#fecaca !important; }
    @keyframes float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }

    .modeSel{
      border:2px solid var(--line); background:#fff; border-radius:12px;
      padding:8px 18px; font-weight:800; font-size:12px; text-transform:uppercase;
      letter-spacing:.1em; cursor:pointer; color:var(--muted);
      font-family:'Lexend',sans-serif; transition:all .15s;
    }
    .modeSel.active{ background:var(--indigo); color:#fff; border-color:var(--indigo); }
    .modeSel:hover:not(.active){ border-color:#cbd5e1; color:var(--text); }

  /* ── Library/Study Lab scene ── */
  html,body{width:100%;height:100%;overflow:hidden;}
  .lab-scene{position:fixed;inset:0;z-index:0;display:flex;flex-direction:column;pointer-events:none;}
  .lab-wall{flex:0 0 62%;background:#3d2b1f;position:relative;overflow:hidden;}
  .lab-shelf{position:absolute;left:0;right:0;height:8px;background:#6b4c32;border-bottom:3px solid #4a3020;}
  .lab-shelf-1{top:20%;}.lab-shelf-2{top:42%;}.lab-shelf-3{top:64%;}
  .shelf-books{position:absolute;bottom:8px;left:0;right:0;display:flex;align-items:flex-end;gap:2px;padding:0 6px;overflow:hidden;height:52px;}
  .arch-window{position:absolute;right:40px;top:5%;width:88px;height:118px;border:5px solid #8b6940;border-radius:44px 44px 0 0;overflow:hidden;background:linear-gradient(180deg,#1a1a3e 0%,#2d2d6b 50%,#1a1a2e 100%);box-shadow:inset 0 2px 8px rgba(0,0,0,.4);}
  .moon{position:absolute;top:14px;right:12px;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fffde0,#f5d020);box-shadow:0 0 14px 5px rgba(245,208,32,.3);}
  .arch-star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.3;}50%{opacity:1;}}
  .candle-wrap{position:absolute;left:28px;bottom:0;}
  .candle-body{width:11px;height:42px;background:linear-gradient(180deg,#f5e6c8,#e8d5a0);border-radius:3px;margin:0 auto;}
  .candle-flame{width:8px;height:15px;background:radial-gradient(ellipse at 50% 80%,#ff6b00,#ffcc00 50%,transparent 100%);border-radius:50% 50% 30% 30%;margin:0 auto;animation:flicker 1.5s ease-in-out infinite;}
  @keyframes flicker{0%,100%{transform:scaleX(1) scaleY(1) rotate(-1deg);opacity:.9;}33%{transform:scaleX(.85) scaleY(1.1) rotate(2deg);opacity:1;}66%{transform:scaleX(1.1) scaleY(.9) rotate(-2deg);opacity:.85;}}
  .candle-glow{position:absolute;top:-28px;left:50%;transform:translateX(-50%);width:68px;height:68px;border-radius:50%;background:radial-gradient(circle,rgba(255,180,0,.2),transparent 70%);}
  .reading-lamp{position:absolute;left:148px;bottom:0;}
  .lamp-arm{width:4px;height:58px;background:#5c3d1e;margin:0 auto;border-radius:2px;}
  .lamp-head{width:42px;height:22px;background:linear-gradient(160deg,#8b6914,#c8960c);border-radius:4px 4px 20px 20px;margin-left:-19px;box-shadow:0 12px 34px rgba(255,180,0,.32);}
  .lamp-glow{position:absolute;bottom:14px;left:-16px;width:76px;height:48px;border-radius:50%;background:radial-gradient(ellipse,rgba(255,200,80,.2),transparent 70%);}
  .lab-floor{flex:0 0 38%;background:repeating-linear-gradient(90deg,#3d1f0d 0,#3d1f0d 80px,#2d1508 80px,#2d1508 160px);position:relative;border-top:6px solid #6b3d18;}
  .lab-bench{position:absolute;bottom:0;height:72%;width:155px;background:#5c3010;border-top:6px solid #8b5a30;border-radius:4px 4px 0 0;}
  .lab-bench.left{left:10px;}.lab-bench.right{right:10px;}
  .bench-top{position:absolute;top:-15px;left:-6px;right:-6px;height:15px;background:#8b6040;border-radius:4px 4px 0 0;border-top:3px solid #c8a060;}
  #particles{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
  .particle{position:absolute;bottom:-10px;border-radius:50%;animation:particleFloat linear infinite;}
  @keyframes particleFloat{from{transform:translateY(0) translateX(0);opacity:.7;}to{transform:translateY(calc(-100vh - 20px)) translateX(20px);opacity:0;}}
  /* ── Library DNA: slim full-width warm header ── */
  .header{position:fixed!important;top:0!important;left:0!important;right:0!important;width:100%!important;transform:none!important;z-index:50;border-bottom:none!important;background:rgba(18,8,2,.5)!important;backdrop-filter:blur(10px)!important;-webkit-backdrop-filter:blur(10px)!important;border-radius:0!important;padding:0!important;box-shadow:none!important;border:none!important;max-width:none!important;}
  .headerInner{padding:0 20px!important;height:56px!important;display:flex!important;align-items:center!important;max-width:none!important;}
  .brandText h1,.brand h1{color:#f5e6c8!important;font-size:15px!important;}
  .brandText .sub,.brand .sub{color:#c8a060!important;}
  .brandIcon{width:36px!important;height:36px!important;font-size:16px!important;background:#6b3d10!important;}
  .pill{font-size:12px!important;min-height:32px!important;background:rgba(255,210,120,.1)!important;border-color:rgba(200,160,80,.2)!important;color:#f5e6c8!important;white-space:nowrap!important;flex-shrink:0!important;}
  .pill.score{background:rgba(160,80,0,.65)!important;color:#fde68a!important;border-color:transparent!important;}
  .pill.streak{background:rgba(255,237,213,.12)!important;color:#fed7aa!important;border-color:rgba(251,146,60,.25)!important;}
  .hud{flex-wrap:nowrap!important;overflow-x:auto!important;}.hud::-webkit-scrollbar{display:none!important;}.brand{flex-shrink:0!important;}
  .topBtn{padding:7px 13px!important;font-size:11px!important;border-radius:10px!important;background:rgba(255,210,120,.14)!important;color:#f5e6c8!important;white-space:nowrap!important;flex-shrink:0!important;}
  #wlLoginBtn{border:1px solid rgba(200,160,80,.22)!important;background:rgba(255,210,120,.1)!important;color:#f5e6c8!important;border-radius:10px!important;white-space:nowrap!important;flex-shrink:0!important;}
  /* ── Parchment game panel, vertically centred ── */
  .wrap{position:fixed!important;top:56px!important;bottom:0!important;left:50%!important;transform:translateX(-50%)!important;width:min(640px,calc(100vw - 360px))!important;max-width:none!important;margin:0!important;z-index:10;display:flex!important;flex-direction:column!important;justify-content:center!important;padding:16px 0!important;overflow-y:auto;}
  .wrap::-webkit-scrollbar{width:0;}
  .panel{background:rgba(255,250,235,.93)!important;backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important;border:2px solid rgba(180,130,50,.3)!important;box-shadow:0 16px 48px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,240,.85)!important;border-radius:20px!important;}
  .panelInner{padding:16px 20px!important;}
  /* Candle-flame fuel bar */
  .bar{height:8px!important;background:rgba(100,60,20,.12)!important;}
  .barFill{background:linear-gradient(90deg,#7c2d12,#b45309,#d97706,#f59e0b,#fde68a)!important;}
  /* Parchment bubble buttons */
  .bubbleBtn{background:rgba(255,248,220,.96)!important;border-width:3px!important;}
  .bubbleBtn.blue{border-color:#c8a050!important;color:#6b3d10!important;}
  .bubbleBtn.green{border-color:#8b7040!important;color:#4a3008!important;}
  .bubbleBtn.purple{border-color:#a88060!important;color:#5c3010!important;}
  .bubbleBtn.orange{border-color:#c8880a!important;color:#7c4500!important;}
  /* Manuscript word display */
  .baseWord{color:#2d1a06!important;}
  .baseMeaning strong{color:#8b5e20!important;}
  .dropZone{border-color:rgba(160,110,30,.45)!important;background:rgba(255,245,210,.85)!important;border-radius:12px!important;}
  .dropZoneText{color:#b08030!important;}
  /* Parchment mode selector */
  .modeSel{background:rgba(255,243,210,.8)!important;border-color:rgba(160,110,30,.3)!important;color:#7c4a0a!important;}
  .modeSel.active{background:#6b3d10!important;color:#fde68a!important;border-color:#6b3d10!important;}
  /* Compact layout */
  .challengeLabel{color:#8b5e20!important;}
  .challengeSub{margin-bottom:8px!important;font-size:12px!important;}
  .wordArea{margin:8px 0 6px!important;}
  .baseMeaning{margin-bottom:8px!important;font-size:13px!important;}
  .options{margin:4px 0 8px!important;gap:10px!important;}
  .actionRow{margin-top:10px!important;}
  .feedback{font-size:17px!important;min-height:20px!important;}
  .subFeedback{font-size:12px!important;min-height:16px!important;margin-top:2px!important;}
  .secondaryBtn{background:rgba(255,243,210,.9)!important;border-color:rgba(160,110,30,.35)!important;color:#6b3d10!important;}
  .primaryBtn{background:#6b3d10!important;box-shadow:0 8px 20px rgba(107,61,16,.3)!important;}
  .primaryBtn:hover{background:#4a2a08!important;}
  .scientist-stage{position:fixed;left:16px;bottom:12%;z-index:11;display:flex;flex-direction:column;align-items:center;}
  #sciCharWrap{width:80px;height:100px;display:flex;align-items:flex-end;justify-content:center;animation:sciIdle 3s ease-in-out infinite;}
  #sciCharWrap.sci-correct{animation:sciJump .6s ease-out;}#sciCharWrap.sci-wrong{animation:sciShake .5s ease-out;}#sciCharWrap.sci-streak{animation:sciDance .8s ease-in-out infinite;}
  @keyframes sciIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}@keyframes sciJump{0%{transform:translateY(0)}30%{transform:translateY(-22px)}100%{transform:translateY(0)}}@keyframes sciShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-4deg) translateX(-4px)}40%{transform:rotate(4deg) translateX(4px)}60%{transform:rotate(-3deg) translateX(-3px)}80%{transform:rotate(2deg)}}@keyframes sciDance{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
  @media(max-width:700px){.lab-scene{display:none;}body{background:linear-gradient(160deg,#3d2b1f 0%,#6b4c32 60%,#c4a35a 100%)!important;overflow-y:auto!important;}.wrap{width:calc(100vw - 24px)!important;position:relative!important;top:auto;bottom:auto;left:auto;transform:none;justify-content:flex-start!important;padding-top:72px!important;}}
  </style>
</head>
<body>
<div class="lab-scene" aria-hidden="true">
  <div class="lab-wall">
    <div class="arch-window">
      <div class="moon"></div>
      <div class="arch-star" style="width:2px;height:2px;top:28px;left:14px;animation-delay:.3s"></div>
      <div class="arch-star" style="width:2px;height:2px;top:52px;left:48px;animation-delay:1.1s"></div>
      <div class="arch-star" style="width:2px;height:2px;top:78px;left:28px;animation-delay:.7s"></div>
    </div>

<script>
  const PREFIXES=[{id:"ad",form:"ad",meaning:"towards or to"},{id:"anti",form:"anti",meaning:"against"},{id:"de",form:"de",meaning:"undo or remove"},{id:"dis",form:"dis",meaning:"not or opposite"},{id:"in",form:"in",meaning:"not or into"},{id:"inter",form:"inter",meaning:"between"},{id:"mis",form:"mis",meaning:"wrongly"},{id:"non",form:"non",meaning:"not"},{id:"over",form:"over",meaning:"too much"},{id:"post",form:"post",meaning:"after"},{id:"pre",form:"pre",meaning:"before"},{id:"re",form:"re",meaning:"again"},{id:"sub",form:"sub",meaning:"under or below"},{id:"super",form:"super",meaning:"above or beyond"},{id:"trans",form:"trans",meaning:"across"},{id:"un",form:"un",meaning:"not"},{id:"under",form:"under",meaning:"below"},{id:"con",form:"con",meaning:"with or together"},{id:"contra",form:"contra",meaning:"against or opposite"},{id:"en",form:"en",meaning:"cause to or make"},{id:"em",form:"em",meaning:"cause to or make"},{id:"ex",form:"ex",meaning:"out of or former"},{id:"e",form:"e",meaning:"out of"},{id:"extra",form:"extra",meaning:"beyond or outside"},{id:"fore",form:"fore",meaning:"before or in front"},{id:"hyper",form:"hyper",meaning:"over or excessive"},{id:"mal",form:"mal",meaning:"bad or badly"},{id:"mega",form:"mega",meaning:"large or great"},{id:"micro",form:"micro",meaning:"small or tiny"},{id:"mid",form:"mid",meaning:"middle"},{id:"multi",form:"multi",meaning:"many"},{id:"pro",form:"pro",meaning:"in favour of or forward"},{id:"semi",form:"semi",meaning:"half or partly"},{id:"ob",form:"ob",meaning:"against or towards"},{id:"a",form:"a",meaning:"not or without"}];
  const SUFFIXES=[{id:"er",form:"er",meaning:"person who; more"},{id:"or",form:"or",meaning:"person who"},{id:"ing",form:"ing",meaning:"happening now"},{id:"ed",form:"ed",meaning:"past tense"},{id:"ly",form:"ly",meaning:"in a way"},{id:"ful",form:"ful",meaning:"full of"},{id:"less",form:"less",meaning:"without"},{id:"ness",form:"ness",meaning:"state of being"},{id:"ment",form:"ment",meaning:"result of an action"},{id:"ion",form:"ion",meaning:"act or result of"},{id:"able",form:"able",meaning:"able to be"},{id:"ish",form:"ish",meaning:"somewhat or like"},{id:"ist",form:"ist",meaning:"person who"},{id:"ive",form:"ive",meaning:"having the quality of"},{id:"ous",form:"ous",meaning:"full of"},{id:"al",form:"al",meaning:"related to"},{id:"hood",form:"hood",meaning:"state of being"},{id:"ship",form:"ship",meaning:"state or skill"},{id:"ity",form:"ity",meaning:"state or quality"},{id:"ance",form:"ance",meaning:"state of"},{id:"ic",form:"ic",meaning:"related to"}];
  let morphemeMode = 'prefix';
  function setMorphemeMode(mode){
    morphemeMode = mode;
    ['prefix','suffix','mixed'].forEach(m => document.getElementById('mode'+m.charAt(0).toUpperCase()+m.slice(1)).classList.toggle('active', m===mode));
    score=0; streak=0; fuel=100; updateHud(); loadQuestion();
  }
  function getActiveMorphemePool(){
    if(morphemeMode==='prefix') return PREFIXES;
    if(morphemeMode==='suffix') return SUFFIXES;
    return Math.random()>0.5 ? PREFIXES : SUFFIXES;
  }
  let score=0,streak=0,fuel=100,currentQuestion=null,buttonsLocked=false,fuelInterval=null;
  const wordEl=document.getElementById("word"),baseMeaningEl=document.getElementById("baseMeaning"),optionsEl=document.getElementById("options"),feedbackEl=document.getElementById("feedback"),subFeedbackEl=document.getElementById("subFeedback"),scorePillEl=document.getElementById("scorePill"),streakPillEl=document.getElementById("streakPill"),fuelBarEl=document.getElementById("fuelBar"),fuelLabelEl=document.getElementById("fuelLabel"),dropZoneEl=document.getElementById("prefixDropZone"),dropZoneTextEl=document.getElementById("dropZoneText");
  function shuffleArray(arr){return[...arr].sort(()=>Math.random()-.5);}
  function getPrefixLabel(p){
    const isPrefix = PREFIXES.some(x=>x.id===p.id);
    return isPrefix ? (p.form||"").toUpperCase()+"-" : "-"+(p.form||"").toUpperCase();
  }
  function updateHud(){scorePillEl.textContent=`${score} XP`;streakPillEl.textContent=`🔥 Streak: ${streak}`;fuelBarEl.style.width=`${Math.max(fuel,0)}%`;fuelLabelEl.textContent=`${Math.max(Math.round(fuel),0)}%`;}
  function generateQuestion(){
    const pool=getActiveMorphemePool();
    const correct=pool[Math.floor(Math.random()*pool.length)];
    const wrong=shuffleArray(pool.filter(p=>p.id!==correct.id)).slice(0,2);
    return{correct,options:shuffleArray([correct,...wrong])};
  }
  function resetDropZone(){dropZoneEl.classList.remove("flashSuccess","flashFail");dropZoneTextEl.textContent="?";dropZoneTextEl.style.color="#a5b4fc";}
  function loadQuestion(){if(fuel<=0)return;buttonsLocked=false;currentQuestion=generateQuestion();wordEl.textContent="MEANING";baseMeaningEl.innerHTML=`<strong>Which ${PREFIXES.some(x=>x.id===currentQuestion.correct.id)?"prefix":"suffix"} means:</strong><br>"${currentQuestion.correct.meaning}"`;feedbackEl.textContent="";feedbackEl.className="feedback";subFeedbackEl.textContent="";resetDropZone();optionsEl.innerHTML="";currentQuestion.options.forEach((option,index)=>{const btn=document.createElement("button");btn.type="button";btn.className=`bubbleBtn ${["blue","green","purple","orange"][index%4]}`;btn.style.animationDelay=`${index*.18}s`;const inner=document.createElement("div");inner.className="bubbleInner";const main=document.createElement("span");main.textContent=getPrefixLabel(option);inner.appendChild(main);btn.appendChild(inner);btn.addEventListener("click",()=>checkAnswer(option));optionsEl.appendChild(btn);});}
  function lockButtons(){optionsEl.querySelectorAll("button").forEach(b=>b.disabled=true);}
  function checkAnswer(choice){if(buttonsLocked||fuel<=0)return;buttonsLocked=true;lockButtons();dropZoneTextEl.textContent=getPrefixLabel(choice);if(choice.id===currentQuestion.correct.id){score+=50+(streak*10);streak++;fuel=Math.min(fuel+8,100);if(typeof WordLabData!=='undefined'&&WordLabData.getSession()){const _isP=PREFIXES.some(x=>x.id===currentQuestion.correct.id);const _wlResult=WordLabData.recordAttempt('meaning-mode',(_isP?'prefix:':'suffix:')+currentQuestion.correct.id,true,0);if(typeof WLScientist!=='undefined') WLScientist.react('correct',_wlResult);}if(typeof WLAudio!=='undefined'){WLAudio.correct();if(streak>=3)WLAudio.streak(streak);}feedbackEl.textContent="✅ Correct!";feedbackEl.className="feedback ok";subFeedbackEl.textContent=`${getPrefixLabel(choice)} means "${choice.meaning}"`;dropZoneTextEl.style.color="var(--ok)";dropZoneEl.classList.add("flashSuccess");}else{streak=0;fuel=Math.max(fuel-12,0);if(typeof WordLabData!=='undefined'&&WordLabData.getSession()){const _isP2=PREFIXES.some(x=>x.id===currentQuestion.correct.id);WordLabData.recordAttempt('meaning-mode',(_isP2?'prefix:':'suffix:')+currentQuestion.correct.id,false,0);}if(typeof WLScientist!=='undefined') WLScientist.react('wrong');if(typeof WLAudio!=='undefined') WLAudio.wrong();feedbackEl.textContent="❌ Not quite";feedbackEl.className="feedback bad";subFeedbackEl.textContent=`Correct answer: ${getPrefixLabel(currentQuestion.correct)} — ${currentQuestion.correct.meaning}`;dropZoneTextEl.style.color="var(--bad)";dropZoneEl.classList.add("flashFail");}updateHud();if(fuel<=0){setTimeout(endGame,800);return;}setTimeout(loadQuestion,1400);}
  function startFuelDrain(){clearInterval(fuelInterval);fuelInterval=setInterval(()=>{fuel-=.25;if(fuel<=0){fuel=0;updateHud();endGame();clearInterval(fuelInterval);return;}updateHud();},220);}
  function endGame(){buttonsLocked=true;optionsEl.innerHTML="";feedbackEl.textContent="Mission over";feedbackEl.className="feedback bad";subFeedbackEl.textContent=`Final score: ${score} XP`;}
  document.getElementById("recalibrateBtn").addEventListener("click",()=>{score=0;streak=0;fuel=100;updateHud();startFuelDrain();loadQuestion();});
  document.getElementById("skipBtn").addEventListener("click",()=>{if(fuel<=0)return;streak=0;fuel=Math.max(fuel-8,0);updateHud();if(fuel<=0){endGame();return;}loadQuestion();});
  updateHud();startFuelDrain();loadQuestion();
</script>
<script>
(function(){var w=document.getElementById('particles');if(!w)return;var cs=['rgba(255,180,0,.25)','rgba(255,200,80,.2)','rgba(245,240,232,.3)','rgba(180,140,60,.18)'];for(var i=0;i<18;i++){var p=document.createElement('div');p.className='particle';var s=(Math.random()*4+2)+'px';var c=cs[Math.floor(Math.random()*cs.length)];p.style.cssText='width:'+s+';height:'+s+';left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*100)+'%;background:'+c+';animation-duration:'+(12+Math.random()*16)+'s;animation-delay:'+(Math.random()*14)+'s;';w.appendChild(p);}})();
(async function(){var w=document.getElementById('sciCharWrap');if(!w||typeof WLScientist==='undefined')return;var sd=typeof WordLabData!=='undefined'?await WordLabData.getStudentData():null;w.innerHTML=WLScientist.buildSVG(sd?sd.scientist:{},'neutral');})();
</script>
