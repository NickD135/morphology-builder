<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Sorter — Worksheet Generator · Word Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f0f4ff;--line:#e2e8f0;--text:#0f172a;--indigo:#4338ca;--indigo-2:#6366f1;--indigo-soft:#eef2ff;--slate:#475569;--slate-light:#e2e8f0;--slate-mid:#94a3b8;--slate-soft:#f1f5f9;--teal:#0d9488;--teal-soft:#f0fdfa;--teal-line:#99f6e4;--amber:#d97706;--amber-soft:#fef3c7;--amber-line:#fcd34d;--amber-dark:#92400e;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;}
    button,input,select{font:inherit;}
    .header{background:#fff;border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 4px rgba(15,23,42,.06);}
    .brandIcon{width:40px;height:40px;border-radius:11px;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
    .brandText h1{font-size:18px;font-weight:900;color:#312e81;}
    .brandText .sub{font-size:9px;text-transform:uppercase;letter-spacing:.22em;color:var(--indigo-2);font-weight:800;}
    .headerBadge{margin-left:auto;background:var(--teal-soft);color:var(--teal);border:1px solid var(--teal-line);border-radius:999px;padding:4px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;}
    .main{display:flex;flex:1;overflow:hidden;}
    .sidebar{width:300px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
    .sideInner{padding:16px;flex:1;overflow-y:auto;}
    .section{margin-bottom:18px;}
    .sectionLabel{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.22em;color:var(--indigo-2);margin-bottom:8px;}
    .radioGroup{display:flex;flex-direction:column;gap:5px;}
    .radioGroup label{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:12px;font-weight:700;color:var(--slate);transition:all .12s;}
    .radioGroup label:has(input:checked){border-color:var(--indigo-2);background:var(--indigo-soft);color:var(--indigo);}
    .radioGroup input[type=radio]{accent-color:var(--indigo);flex-shrink:0;}
    .radioGroup label .hint{font-size:10px;font-weight:600;color:#94a3b8;margin-left:auto;}
    .radioGroup label:has(input:checked) .hint{color:var(--indigo-2);}
    select.soundSelect{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:8px 11px;font-size:12px;font-weight:700;color:var(--slate);background:#fff;cursor:pointer;outline:none;}
    select.soundSelect:focus{border-color:var(--indigo-2);}
    .stepper{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;width:fit-content;}
    .stepperBtn{width:32px;height:32px;border:none;background:#f8fafc;cursor:pointer;font-size:14px;font-weight:700;color:var(--slate);}
    .stepperBtn:hover{background:var(--indigo-soft);color:var(--indigo);}
    .stepperVal{width:38px;text-align:center;font-size:13px;font-weight:800;border:none;border-left:1.5px solid var(--line);border-right:1.5px solid var(--line);height:32px;background:#fff;}
    .toggleRow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;}
    .toggleRow+.toggleRow{border-top:1px solid var(--line);}
    .toggleLabel{font-size:12px;font-weight:700;color:var(--slate);}
    .toggleSub{font-size:10px;color:#94a3b8;font-weight:600;}
    .toggle{position:relative;width:38px;height:21px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggleSlider{position:absolute;inset:0;background:#e2e8f0;border-radius:999px;cursor:pointer;transition:background .15s;}
    .toggleSlider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .toggle input:checked+.toggleSlider{background:var(--indigo);}
    .toggle input:checked+.toggleSlider::before{transform:translateX(17px);}
    .sideFooter{padding:14px 16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px;background:#fff;flex-shrink:0;}
    .btnGenerate{background:var(--indigo);color:#fff;border:none;border-radius:11px;padding:11px;font-size:13px;font-weight:800;cursor:pointer;width:100%;}
    .btnGenerate:hover{background:#3730a3;}
    .btnRegen{background:#fff;color:var(--indigo);border:1.5px solid var(--indigo-2);border-radius:11px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;width:100%;display:none;}
    .btnPrint{background:#0f172a;color:#fff;border:none;border-radius:11px;padding:9px;font-size:12px;font-weight:800;cursor:pointer;width:100%;display:none;}
    .preview{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
    .previewEmpty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#94a3b8;text-align:center;}
    .previewEmpty .icon{font-size:44px;opacity:.35;}
    .previewEmpty .msg{font-size:14px;font-weight:700;}
    .previewEmpty .sub{font-size:12px;font-weight:600;}
    /* WORKSHEET */
    .worksheet{background:#fff;border-radius:14px;border:1px solid var(--line);padding:26px;box-shadow:0 3px 12px rgba(15,23,42,.06);max-width:860px;margin:0 auto;}
    .ws-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:13px;border-bottom:2px solid #e2e8f0;}
    .ws-logo{display:flex;align-items:center;gap:9px;}
    .ws-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex:0 0 auto;}
    .ws-logo-text{font-size:13px;font-weight:900;color:#312e81;}
    .ws-logo-sub{font-size:8px;text-transform:uppercase;letter-spacing:.2em;color:var(--teal);font-weight:800;}
    .ws-meta{text-align:right;}
    .ws-meta-label{font-size:8px;text-transform:uppercase;letter-spacing:.16em;color:#94a3b8;font-weight:800;margin-bottom:3px;}
    .ws-meta-line{display:flex;align-items:center;gap:7px;justify-content:flex-end;margin-bottom:3px;font-size:10px;font-weight:700;color:#475569;}
    .ws-meta-field{border-bottom:1.5px solid #94a3b8;min-width:90px;height:15px;display:inline-block;}
    .ws-title{font-size:16px;font-weight:900;color:#312e81;margin-bottom:2px;}
    .ws-subtitle{font-size:10px;color:#64748b;font-weight:600;margin-bottom:12px;}
    .ws-instructions{background:var(--teal-soft);border:1.5px solid var(--teal-line);border-radius:8px;padding:8px 13px;margin-bottom:14px;font-size:11px;color:var(--teal);font-weight:700;line-height:1.6;}
    /* table */
    .ss-table{width:100%;border-collapse:collapse;}
    .ss-table th{padding:6px 8px;font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;border:1.5px solid var(--line);}
    .ss-table th.th-num{background:#f1f5f9;color:var(--slate);width:5%;}
    .ss-table th.th-word{background:var(--indigo-soft);color:var(--indigo);width:24%;}
    .ss-table th.th-clue{background:#f1f5f9;color:var(--slate);width:26%;}
    .ss-table th.th-opts{background:var(--teal-soft);color:var(--teal);width:30%;}
    .ss-table th.th-ans{background:var(--amber-soft);color:var(--amber-dark);width:15%;}
    .ss-table td{padding:7px 8px;border:1.5px solid var(--line);vertical-align:middle;}
    .ss-table tr:nth-child(even) td{background:#fafafa;}
    .blank-word{font-size:14px;font-weight:900;color:#312e81;letter-spacing:.05em;}
    .blank-char{display:inline-block;border-bottom:2px solid #312e81;min-width:14px;margin:0 1px;}
    .clue-cell{font-size:10px;font-weight:600;color:var(--slate);}
    .opt-bubble{display:inline-block;border:1.5px solid var(--teal-line);background:var(--teal-soft);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:800;color:var(--teal);margin:2px;}
    .ans-line{border-bottom:1.5px solid #475569;height:18px;display:block;width:85%;}
    /* key */
    .ws-key{margin-top:16px;padding-top:14px;border-top:2px dashed #e2e8f0;}
    .ws-key-title{font-size:8px;font-weight:900;text-transform:uppercase;letter-spacing:.18em;color:#dc2626;margin-bottom:10px;}
    .ws-key-grid{display:flex;flex-wrap:wrap;gap:4px 24px;}
    .ws-key-item{font-size:10px;font-weight:700;color:#475569;}
    .ws-key-item span{color:#0f172a;font-weight:900;}
    @media print{body{display:block;height:auto;}.header,.sidebar{display:none!important;}.main{display:block;}.preview{padding:0;overflow:visible;}.previewEmpty{display:none;}.worksheet{border:none;border-radius:0;box-shadow:none;padding:10px 14px;max-width:none;}.ws-key{page-break-before:always;}@page{size:A4;margin:10mm 12mm;}}
  </style>
</head>
<body>
<div class="header">
  <div class="brandIcon">🔬</div>
  <div class="brandText"><h1>Word Labs</h1><span class="sub">Worksheet Generator</span></div>
  <div class="headerBadge">Sound Sorter</div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sideInner">
      <div class="section">
        <div class="sectionLabel">Focus sound</div>
        <select class="soundSelect" id="soundSelect">
          <option value="all">All sounds (mixed)</option>
        </select>
      </div>
      <div class="section">
        <div class="sectionLabel">Difficulty</div>
        <div class="radioGroup">
          <label><input type="radio" name="level" value="starter" checked> Starter</label>
          <label><input type="radio" name="level" value="levelup"> Level Up</label>
          <label><input type="radio" name="level" value="challenge"> Challenge</label>
          <label><input type="radio" name="level" value="mixed"> Mixed</label>
        </div>
      </div>
      <div class="section">
        <div class="sectionLabel">Number of words</div>
        <div class="stepper">
          <button class="stepperBtn" onclick="stepCount(-1)">−</button>
          <input type="number" class="stepperVal" id="countInput" min="5" max="20" value="10" readonly>
          <button class="stepperBtn" onclick="stepCount(1)">+</button>
        </div>
      </div>
      <div class="section">
        <div class="sectionLabel">Extras</div>
        <div class="toggleRow">
          <div><div class="toggleLabel">Show explanation</div><div class="toggleSub">Why this grapheme makes this sound</div></div>
          <label class="toggle"><input type="checkbox" id="toggleExplain"><span class="toggleSlider"></span></label>
        </div>
        <div class="toggleRow">
          <div><div class="toggleLabel">Answer key</div><div class="toggleSub">Teacher copy, separate page</div></div>
          <label class="toggle"><input type="checkbox" id="toggleKey" checked><span class="toggleSlider"></span></label>
        </div>
      </div>
    </div>
    <div class="sideFooter">
      <button class="btnGenerate" onclick="generateWorksheet()">⚡ Generate Worksheet</button>
      <button class="btnRegen" id="regenBtn" onclick="generateWorksheet()">🔄 Regenerate</button>
      <button class="btnPrint" id="printBtn" onclick="window.print()">🖨️ Print / Save as PDF</button>
    </div>
  </div>
  <div class="preview">
    <div class="previewEmpty" id="previewEmpty">
      <div class="icon">👁️</div>
      <div class="msg">Your Sound Sorter worksheet will appear here</div>
      <div class="sub">Choose a focus sound, configure options, then hit Generate</div>
    </div>
    <div id="worksheetOutput" style="display:none;"></div>
  </div>
</div>
<script>
const WORDS = [
  {word:"rain",sound:"long-a",soundLabel:"Long A",grapheme:"ai",before:"r",after:"n",clue:"water falling from the sky",level:"starter",distractors:["ay","a_e"],explain:"The 'ai' grapheme makes the long a sound in the middle of words."},
  {word:"play",sound:"long-a",soundLabel:"Long A",grapheme:"ay",before:"pl",after:"",clue:"have fun",level:"starter",distractors:["ai","a_e"],explain:"The 'ay' grapheme usually comes at the end of words."},
  {word:"cake",sound:"long-a",soundLabel:"Long A",grapheme:"a_e",before:"c",after:"k",clue:"a birthday treat",level:"starter",distractors:["ai","ay"],explain:"The split digraph a_e (magic e) makes a long a sound."},
  {word:"break",sound:"long-a",soundLabel:"Long A",grapheme:"ea",before:"br",after:"k",clue:"snap or rest",level:"levelup",distractors:["ai","ay","a_e"],explain:"The 'ea' grapheme usually makes a long e sound, but in 'break' it makes long a."},
  {word:"they",sound:"long-a",soundLabel:"Long A",grapheme:"ey",before:"th",after:"",clue:"those people",level:"levelup",distractors:["ay","ai","a_e"],explain:"The 'ey' grapheme at the end of some words makes a long a sound."},
  {word:"eight",sound:"long-a",soundLabel:"Long A",grapheme:"eigh",before:"",after:"t",clue:"the number after seven",level:"challenge",distractors:["ai","ay","a_e","ea"],explain:"The 'eigh' grapheme makes a long a sound — this is an unusual spelling."},
  {word:"straight",sound:"long-a",soundLabel:"Long A",grapheme:"aigh",before:"str",after:"t",clue:"not curved",level:"challenge",distractors:["ai","ay","eigh","a_e"],explain:"The 'aigh' grapheme is rare but makes a long a sound here."},
  {word:"lady",sound:"long-a",soundLabel:"Long A",grapheme:"a",before:"l",after:"dy",clue:"a woman",level:"levelup",distractors:["ai","ay","a_e"],explain:"A single 'a' before a consonant cluster can make a long a sound."},
  {word:"steak",sound:"long-a",soundLabel:"Long A",grapheme:"ea",before:"st",after:"k",clue:"a thick cut of meat",level:"challenge",distractors:["ai","ay","a_e","ey"],explain:"'ea' usually makes long e, but in 'steak' it makes long a — a tricky one!"},
  {word:"feet",sound:"long-e",soundLabel:"Long E",grapheme:"ee",before:"f",after:"t",clue:"you walk on these",level:"starter",distractors:["ea","e_e"],explain:"The 'ee' grapheme is one of the most common ways to spell the long e sound."},
  {word:"seat",sound:"long-e",soundLabel:"Long E",grapheme:"ea",before:"s",after:"t",clue:"where you sit",level:"starter",distractors:["ee","e_e"],explain:"The 'ea' grapheme is very common for the long e sound."},
  {word:"these",sound:"long-e",soundLabel:"Long E",grapheme:"e_e",before:"th",after:"s",clue:"the ones here",level:"levelup",distractors:["ee","ea","e"],explain:"The split digraph e_e makes a long e sound."},
  {word:"me",sound:"long-e",soundLabel:"Long E",grapheme:"e",before:"m",after:"",clue:"referring to yourself",level:"starter",distractors:["ee","ea"],explain:"A single 'e' at the end of short words often makes a long e sound."},
  {word:"baby",sound:"long-e",soundLabel:"Long E",grapheme:"y",before:"bab",after:"",clue:"a very young child",level:"starter",distractors:["ee","ey","ie"],explain:"The 'y' grapheme at the end of words often makes a long e sound."},
  {word:"money",sound:"long-e",soundLabel:"Long E",grapheme:"ey",before:"mon",after:"",clue:"coins and notes",level:"levelup",distractors:["ee","ea","y","ie"],explain:"The 'ey' grapheme at the end of words makes a long e sound."},
  {word:"babies",sound:"long-e",soundLabel:"Long E",grapheme:"ie",before:"bab",after:"s",clue:"more than one baby",level:"levelup",distractors:["ee","ea","y","ey"],explain:"The 'ie' grapheme makes a long e sound in plurals like babies."},
  {word:"steel",sound:"long-e",soundLabel:"Long E",grapheme:"ee",before:"st",after:"l",clue:"a strong metal",level:"starter",distractors:["ea","e_e","ie"],explain:"The 'ee' grapheme is used in 'steel' — not 'ea' like in 'steal'."},
  {word:"people",sound:"long-e",soundLabel:"Long E",grapheme:"eo",before:"p",after:"ple",clue:"human beings",level:"challenge",distractors:["ee","ea","ie","ey"],explain:"The 'eo' grapheme is unusual for long e — found in only a few words."},
  {word:"receive",sound:"long-e",soundLabel:"Long E",grapheme:"ei",before:"r",after:"ve",clue:"to get something",level:"challenge",distractors:["ee","ea","ie","ey"],explain:"'i before e except after c' — after c, use 'ei' for the long e sound."},
  {word:"beach",sound:"long-e",soundLabel:"Long E",grapheme:"ea",before:"b",after:"ch",clue:"sand beside the ocean",level:"starter",distractors:["ee","e_e"],explain:"The 'ea' grapheme makes a long e sound in 'beach'."},
  {word:"field",sound:"long-e",soundLabel:"Long E",grapheme:"ie",before:"f",after:"ld",clue:"an open area of grass",level:"levelup",distractors:["ee","ea","ey"],explain:"The 'ie' grapheme makes a long e sound in many words."},
  {word:"night",sound:"long-i",soundLabel:"Long I",grapheme:"igh",before:"n",after:"t",clue:"when it is dark",level:"starter",distractors:["i_e","ie"],explain:"The 'igh' grapheme is very common for long i in the middle of words."},
  {word:"pie",sound:"long-i",soundLabel:"Long I",grapheme:"ie",before:"p",after:"",clue:"a baked pastry dish",level:"starter",distractors:["igh","i_e"],explain:"The 'ie' grapheme makes long i at the end of short words."},
  {word:"time",sound:"long-i",soundLabel:"Long I",grapheme:"i_e",before:"t",after:"m",clue:"measured in hours and minutes",level:"starter",distractors:["igh","ie"],explain:"The split digraph i_e (magic e) makes a long i sound."},
  {word:"fly",sound:"long-i",soundLabel:"Long I",grapheme:"y",before:"fl",after:"",clue:"move through the air",level:"starter",distractors:["i_e","ie","igh"],explain:"The 'y' at the end of a single-syllable word often makes long i."},
  {word:"spider",sound:"long-i",soundLabel:"Long I",grapheme:"i",before:"sp",after:"der",clue:"an eight-legged creature",level:"levelup",distractors:["i_e","igh","ie"],explain:"A single 'i' before a consonant + er can make a long i sound."},
  {word:"height",sound:"long-i",soundLabel:"Long I",grapheme:"eigh",before:"h",after:"t",clue:"how tall something is",level:"challenge",distractors:["igh","i_e","ie","y"],explain:"The 'eigh' grapheme makes long i in 'height' — the same letters make long a in 'eight'!"},
  {word:"bright",sound:"long-i",soundLabel:"Long I",grapheme:"igh",before:"br",after:"t",clue:"very light or clever",level:"starter",distractors:["i_e","ie","y"],explain:"The 'igh' grapheme makes long i in 'bright'."},
  {word:"tried",sound:"long-i",soundLabel:"Long I",grapheme:"ie",before:"tr",after:"d",clue:"made an attempt",level:"levelup",distractors:["i_e","igh","y"],explain:"When 'y' changes to 'i' and adds 'ed', the 'ie' makes a long i sound."},
  {word:"boat",sound:"long-o",soundLabel:"Long O",grapheme:"oa",before:"b",after:"t",clue:"a vessel on water",level:"starter",distractors:["o_e","ow"],explain:"The 'oa' grapheme is very common for long o in the middle of words."},
  {word:"rose",sound:"long-o",soundLabel:"Long O",grapheme:"o_e",before:"r",after:"s",clue:"a flowering plant",level:"starter",distractors:["oa","ow"],explain:"The split digraph o_e makes a long o sound."},
  {word:"window",sound:"long-o",soundLabel:"Long O",grapheme:"ow",before:"wind",after:"",clue:"a glass opening in a wall",level:"starter",distractors:["oa","o_e"],explain:"The 'ow' grapheme at the end of words often makes a long o sound."},
  {word:"toe",sound:"long-o",soundLabel:"Long O",grapheme:"oe",before:"t",after:"",clue:"a digit on your foot",level:"levelup",distractors:["oa","o_e","ow"],explain:"The 'oe' grapheme makes long o at the end of short words."},
  {word:"comb",sound:"long-o",soundLabel:"Long O",grapheme:"o",before:"c",after:"mb",clue:"used to tidy hair",level:"levelup",distractors:["oa","o_e","ow","oe"],explain:"In 'comb', a single 'o' makes the long o sound — the 'b' is silent."},
  {word:"though",sound:"long-o",soundLabel:"Long O",grapheme:"ough",before:"th",after:"",clue:"despite that",level:"challenge",distractors:["oa","ow","o_e","oe"],explain:"The 'ough' grapheme makes long o in 'though' — one of its many sounds!"},
  {word:"road",sound:"long-o",soundLabel:"Long O",grapheme:"oa",before:"r",after:"d",clue:"a path for vehicles",level:"starter",distractors:["o_e","ow","oe"],explain:"The 'oa' grapheme makes long o in 'road'."},
  {word:"snow",sound:"long-o",soundLabel:"Long O",grapheme:"ow",before:"sn",after:"",clue:"frozen white precipitation",level:"starter",distractors:["oa","o_e","oe"],explain:"The 'ow' grapheme makes long o at the end of 'snow'."},
  {word:"boot",sound:"long-u",soundLabel:"Long U",grapheme:"oo",before:"b",after:"t",clue:"a shoe for the whole foot",level:"starter",distractors:["ue","ew"],explain:"The 'oo' grapheme is the most common way to spell the long oo sound."},
  {word:"glue",sound:"long-u",soundLabel:"Long U",grapheme:"ue",before:"gl",after:"",clue:"sticky substance",level:"starter",distractors:["oo","ew"],explain:"The 'ue' grapheme makes the long oo sound, especially at the end of words."},
  {word:"screw",sound:"long-u",soundLabel:"Long U",grapheme:"ew",before:"scr",after:"",clue:"a type of fastener",level:"levelup",distractors:["oo","ue","ou"],explain:"The 'ew' grapheme makes the long oo sound at the end of words."},
  {word:"flute",sound:"long-u",soundLabel:"Long U",grapheme:"u_e",before:"fl",after:"t",clue:"a wind instrument",level:"levelup",distractors:["oo","ue","ew"],explain:"The split digraph u_e makes the long oo sound."},
  {word:"group",sound:"long-u",soundLabel:"Long U",grapheme:"ou",before:"gr",after:"p",clue:"a collection of people",level:"levelup",distractors:["oo","ue","ew"],explain:"The 'ou' grapheme makes the long oo sound in 'group'."},
  {word:"through",sound:"long-u",soundLabel:"Long U",grapheme:"ough",before:"thr",after:"",clue:"from one side to the other",level:"challenge",distractors:["oo","ue","ew","ou"],explain:"The 'ough' grapheme makes the long oo sound in 'through' — one of its many sounds!"},

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}
function stepCount(d){const el=document.getElementById('countInput');el.value=Math.min(20,Math.max(5,parseInt(el.value)+d));}

// Populate sound dropdown
(function(){
  const labels=[...new Set(WORDS.map(w=>w.soundLabel))].sort();
  const sel=document.getElementById('soundSelect');
  labels.forEach(l=>{
    const o=document.createElement('option');
    o.value=l; o.textContent=l; sel.appendChild(o);
  });
})();

function buildBlankWord(before, grapheme, after){
  const blanks='_'.repeat(grapheme.replace('_','').length);
  return before + '<span style="border-bottom:2px solid #312e81;padding:0 2px;font-style:italic;color:#94a3b8;">' + blanks + '</span>' + after;
}

function generateWorksheet(){
  const soundSel   = document.getElementById('soundSelect').value;
  const level      = document.querySelector('input[name=level]:checked').value;
  const count      = parseInt(document.getElementById('countInput').value)||10;
  const showExpl   = document.getElementById('toggleExplain').checked;
  const showKey    = document.getElementById('toggleKey').checked;

  let pool = [...WORDS];
  if(soundSel!=='all') pool=pool.filter(w=>w.soundLabel===soundSel);
  if(level!=='mixed')  pool=pool.filter(w=>w.level===level);

  if(!pool.length){alert('No words for that combination. Try Mixed difficulty or All sounds.');return;}
  const actualCount = Math.min(count, pool.length);
  if(actualCount < count){
    const el=document.getElementById('countInput');
    el.value=actualCount;
  }
  const bank=shuffle(pool).slice(0,actualCount);

  const soundLabel = soundSel==='all'?'Mixed sounds':soundSel;
  const levelLabel = {starter:'Starter',levelup:'Level Up',challenge:'Challenge',mixed:'Mixed'}[level];

  const rows=bank.map((w,i)=>{
    const allOpts=shuffle([w.grapheme,...w.distractors]).slice(0,Math.min(3,w.distractors.length+1));
    // Make sure correct is always in
    if(!allOpts.includes(w.grapheme)){allOpts[0]=w.grapheme; shuffle(allOpts);}
    const optBubbles=allOpts.map(o=>`<span class="opt-bubble">${o}</span>`).join('');
    const explainRow=showExpl?`<tr><td colspan="5" style="font-size:9px;font-weight:600;color:#64748b;padding:4px 8px;background:#f8fafc;border:1.5px solid #e2e8f0;">${w.explain}</td></tr>`:'';
    return `
      <tr>
        <td style="text-align:center;font-size:10px;font-weight:700;color:#94a3b8;">${i+1}</td>
        <td><span class="blank-word">${buildBlankWord(w.before,w.grapheme,w.after)}</span></td>
        <td class="clue-cell">${w.clue}</td>
        <td style="text-align:center;">${optBubbles}</td>
        <td><span class="ans-line"></span></td>
      </tr>${explainRow}`;
  }).join('');

  let keyHtml='';
  if(showKey){
    const items=bank.map((w,i)=>
      `<div class="ws-key-item">${i+1}. ${w.before}[<span>${w.grapheme}</span>]${w.after} = ${w.grapheme}</div>`
    ).join('');
    keyHtml=`<div class="ws-key"><div class="ws-key-title">Answer Key — Teacher Copy</div><div class="ws-key-grid">${items}</div></div>`;
  }

  document.getElementById('worksheetOutput').innerHTML=`
    <div class="worksheet">
      <div class="ws-header">
        <div class="ws-logo"><div class="ws-logo-icon">SS</div><div><div class="ws-logo-text">Word Labs</div><div class="ws-logo-sub">Sound Sorter</div></div></div>
        <div class="ws-meta">
          <div class="ws-meta-label">Student details</div>
          <div class="ws-meta-line">Name: <span class="ws-meta-field"></span></div>
          <div class="ws-meta-line">Date: <span class="ws-meta-field"></span></div>
          <div class="ws-meta-line">Class: <span class="ws-meta-field"></span></div>
        </div>
      </div>
      <div class="ws-title">Sound Sorter — ${soundLabel}</div>
      <div class="ws-subtitle">${actualCount} words · ${levelLabel} · Word Labs</div>
      <div class="ws-instructions">📋 <strong>Instructions:</strong> Look at each word — the grapheme (spelling) for the focus sound is missing. Circle the correct grapheme from the options, then write the complete word in the answer box.</div>
      <table class="ss-table">
        <thead><tr>
          <th class="th-num">#</th>
          <th class="th-word">Word</th>
          <th class="th-clue">Clue</th>
          <th class="th-opts">Options — circle the correct grapheme</th>
          <th class="th-ans">Write the word</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${keyHtml}
    </div>`;

  document.getElementById('worksheetOutput').style.display='block';
  document.getElementById('previewEmpty').style.display='none';
  document.getElementById('regenBtn').style.display='block';
  document.getElementById('printBtn').style.display='block';
}
</script>
