  // -------------------- WORD CHECKER --------------------
  let DICT_SET = null;

  async function loadDictionary(){
    try{
      const res = await fetch("dictionary.txt", { cache:"no-store" });
      if (!res.ok) throw new Error("no dictionary");
      const text = await res.text();
      const set = new Set();
      for (const raw of text.split(/\r?\n/)){
        const w = raw.trim().toLowerCase();
        if (!w) continue;
        if (w.startsWith("#")) continue;
        set.add(w);
      }
      DICT_SET = set;
      els.dictPill.textContent = `Word checker: dictionary.txt loaded (${set.size.toLocaleString()} words)`;
    } catch {
      DICT_SET = new Set(FALLBACK_ALLOWED_WORDS.map(x=>String(x).toLowerCase()));
      els.dictPill.textContent = "Word checker: dictionary.txt not found (using small fallback list)";
    }
    renderAll();
  }

  function isRealWord(word){
    if (!word) return false;
    return DICT_SET && DICT_SET.has(String(word).toLowerCase());
  }

  // -------------------- SPELLING RULES --------------------
  function vowels(){ return new Set(["a","e","i","o","u"]); }

  function applySpellingRules(baseForm, suffixForm) {
    if (!suffixForm) return baseForm;
    const v = vowels();
    const last = baseForm.slice(-1).toLowerCase();
    const first = suffixForm.slice(0,1).toLowerCase();
    let out = baseForm;
    if (last === "e" && v.has(first)) out = baseForm.slice(0, -1);
    if (last === "y" && !v.has(first)) out = baseForm.slice(0, -1) + "i";
    return out;
  }

  function computeWord(prefixObj, baseObj, suffixObj) {
    if (!baseObj) return "";
    const p = prefixObj ? prefixObj.form : "";
    const b = baseObj.form;
    const s = suffixObj ? suffixObj.form : "";
    const bAdj = suffixObj ? applySpellingRules(b, s) : b;
    return (p + bAdj + s).toLowerCase();
  }

  function computeMeaning(prefixObj, baseObj, suffixObj) {
    if (!baseObj) return "";
    const parts = [];
    if (prefixObj) parts.push(prefixObj.meaning);
    parts.push(baseObj.meaning);
    if (suffixObj) parts.push(suffixObj.meaning);
    return parts.join(" + ");
  }

  function posCompatible(affixObj, baseObj){
    if (!affixObj || !baseObj) return false;
    const basePos = new Set(baseObj.pos || []);
    return (affixObj.allowedPos || []).some(p => basePos.has(p));
  }

  // Block redundant prefixing (con+construct etc)
  function redundantPrefix(prefixObj, baseObj){
    if (!prefixObj || !baseObj) return false;
    const p = (prefixObj.form || "").toLowerCase();
    const b = (baseObj.form || "").toLowerCase();
    if (!p || !b) return false;
    return b.startsWith(p);
  }

  // -------------------- CORE: viability scans --------------------
  function possibleAffixesForBase(baseObj, lockedPrefix=null, lockedSuffix=null){
    const possiblePrefixes = new Set();
    const possibleSuffixes = new Set();
    if (!baseObj) return { possiblePrefixes, possibleSuffixes };

    const prefixCandidates = lockedPrefix ? [lockedPrefix] : [null, ...ALL_PREFIXES];
    const suffixCandidates = lockedSuffix ? [lockedSuffix] : [null, ...ALL_SUFFIXES];

    for (const p of prefixCandidates){
      if (p){
        if (!posCompatible(p, baseObj)) continue;
        if (redundantPrefix(p, baseObj)) continue;
      }
      for (const s of suffixCandidates){
        if (s && !posCompatible(s, baseObj)) continue;
        const w = computeWord(p, baseObj, s);
        if (isRealWord(w)){
          if (p) possiblePrefixes.add(p.uid);
          if (s) possibleSuffixes.add(s.uid);
        }
      }
    }
    return { possiblePrefixes, possibleSuffixes };
  }

  // NEW: when starting from a prefix/suffix, figure out which bases are compatible AND can form at least one real word
  function basesViableWithLocks(lockedPrefix=null, lockedSuffix=null){
    const okBases = new Set();
    for (const b of ALL_BASES){
      if (lockedPrefix){
        if (!posCompatible(lockedPrefix, b)) continue;
        if (redundantPrefix(lockedPrefix, b)) continue;
      }
      if (lockedSuffix){
        if (!posCompatible(lockedSuffix, b)) continue;
      }
      const sets = possibleAffixesForBase(b, lockedPrefix, lockedSuffix);
      const baseItselfOk = !lockedPrefix && !lockedSuffix && isRealWord(b.form);
      const anyOk = baseItselfOk || sets.possiblePrefixes.size > 0 || sets.possibleSuffixes.size > 0 || isRealWord(computeWord(lockedPrefix, b, lockedSuffix));
      if (anyOk) okBases.add(b.uid);
    }
    return okBases;
  }

  function prefixViableGlobally(prefixObj){
    if (!prefixObj) return false;

    // If base already selected, use the tight rules
    if (current.base){
      if (!posCompatible(prefixObj, current.base)) return false;
      if (redundantPrefix(prefixObj, current.base)) return false;
      if (current.suffix) return isRealWord(computeWord(prefixObj, current.base, current.suffix));
      if (isRealWord(computeWord(prefixObj, current.base, null))) return true;
      const sets = possibleAffixesForBase(current.base, prefixObj, null);
      return sets.possibleSuffixes.size > 0;
    }

    // No base selected: viable if there exists ANY base that can make a real word with this prefix (and locked suffix if chosen)
    const lockedSuffix = current.suffix ? current.suffix : null;
    const basesOk = basesViableWithLocks(prefixObj, lockedSuffix);
    return basesOk.size > 0;
  }

  function suffixViableGlobally(suffixObj){
    if (!suffixObj) return false;

    if (current.base){
      if (!posCompatible(suffixObj, current.base)) return false;
      if (current.prefix){
        if (redundantPrefix(current.prefix, current.base)) return false;
        return isRealWord(computeWord(current.prefix, current.base, suffixObj));
      }
      if (isRealWord(computeWord(null, current.base, suffixObj))) return true;
      const sets = possibleAffixesForBase(current.base, null, suffixObj);
      return sets.possiblePrefixes.size > 0;
    }

    const lockedPrefix = current.prefix ? current.prefix : null;
    const basesOk = basesViableWithLocks(lockedPrefix, suffixObj);
    return basesOk.size > 0;
  }

  function baseViableGivenCurrentLocks(baseObj){
    if (!baseObj) return false;
    const lockedPrefix = current.prefix ? current.prefix : null;
    const lockedSuffix = current.suffix ? current.suffix : null;

    if (lockedPrefix){
      if (!posCompatible(lockedPrefix, baseObj)) return false;
      if (redundantPrefix(lockedPrefix, baseObj)) return false;
    }
    if (lockedSuffix){
      if (!posCompatible(lockedSuffix, baseObj)) return false;
    }

    if (lockedPrefix || lockedSuffix){
      // base must be able to form at least one real word with the chosen lock(s)
      if (isRealWord(computeWord(lockedPrefix, baseObj, lockedSuffix))) return true;
      const sets = possibleAffixesForBase(baseObj, lockedPrefix, lockedSuffix);
      return sets.possiblePrefixes.size > 0 || sets.possibleSuffixes.size > 0;
    }

    // no locks
    const sets = possibleAffixesForBase(baseObj, null, null);
    return isRealWord(baseObj.form) || sets.possiblePrefixes.size > 0 || sets.possibleSuffixes.size > 0;
  }

  // After a base is chosen, show which prefixes/suffixes are viable for that base AND any other lock
  function prefixViableForSelectedBase(prefixObj){
    if (!current.base) return false;
    return prefixViableGlobally(prefixObj);
  }

  function suffixViableForSelectedBase(suffixObj){
    if (!current.base) return false;
    return suffixViableGlobally(suffixObj);
  }

  // -------------------- UI --------------------
  function makeTile(item, type) {
    const div = document.createElement("div");
    div.className = "tile";
    div.draggable = true;
    div.dataset.uid = item.uid;
    div.dataset.type = type;

    const form = document.createElement("div");
    form.className = "form";
    form.textContent = item.form;

    const meaning = document.createElement("div");
    meaning.className = "meaning";
    meaning.textContent = item.meaning || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    if (type === "base") meta.textContent = `base (${(item.pos||[]).join(", ")})`;
    if (type === "prefix") meta.textContent = `prefix`;
    if (type === "suffix") meta.textContent = `suffix${item.hint ? " • " + item.hint : ""}`;

    div.appendChild(form);
    div.appendChild(meaning);
    div.appendChild(meta);

    div.addEventListener("dragstart", (e) => {
      if (div.classList.contains("disabled")) { e.preventDefault(); return; }
      e.dataTransfer.setData("text/plain", JSON.stringify({ type, uid: item.uid }));
    });

    div.addEventListener("click", () => {
      if (div.classList.contains("disabled")) return;
      addToBuilder(type, item);
    });

    return div;
  }

  function renderBanks(){
    els.prefixBank.innerHTML = "";
    els.baseBank.innerHTML = "";
    els.suffixBank.innerHTML = "";

    // Compute which bases are viable under current locks so they can float to the top
    const lockedPrefix = current.prefix ? current.prefix : null;
    const lockedSuffix = current.suffix ? current.suffix : null;
    const baseOkSet = basesViableWithLocks(lockedPrefix, lockedSuffix);

    // Bases
    const q = (els.baseSearch.value || "").trim().toLowerCase();
    const basesFiltered = ALL_BASES
      .filter(b => !q || b.form.toLowerCase().includes(q))
      .sort((a,b)=>a.form.localeCompare(b.form));

    const baseEnabled = [];
    const baseDisabled = [];
    for (const b of basesFiltered){
      const t = makeTile(b, "base");
      const enabled = baseViableGivenCurrentLocks(b) && (baseOkSet.size === 0 ? true : baseOkSet.has(b.uid) || (!lockedPrefix && !lockedSuffix));
      if (!enabled) { t.classList.add("disabled"); baseDisabled.push(t); }
      else baseEnabled.push(t);
    }
    els.baseBank.append(...baseEnabled, ...baseDisabled);
    els.baseCount.textContent = String(baseEnabled.length);

    // Prefixes (now selectable even with no base)
    let prefixEnabledCount = 0;
    const prefixEnabled = [];
    const prefixDisabled = [];
    for (const p of ALL_PREFIXES){
      const t = makeTile(p, "prefix");
      const enabled = prefixViableGlobally(p);
      if (!enabled) { t.classList.add("disabled"); prefixDisabled.push(t); }
      else { prefixEnabledCount++; prefixEnabled.push(t); }
    }
    els.prefixBank.append(...prefixEnabled, ...prefixDisabled);
    els.prefixCount.textContent = String(prefixEnabledCount);

    // Suffixes (now selectable even with no base)
    let suffixEnabledCount = 0;
    const suffixEnabled = [];
    const suffixDisabled = [];
    for (const s of ALL_SUFFIXES){
      const t = makeTile(s, "suffix");
      const enabled = suffixViableGlobally(s);
      if (!enabled) { t.classList.add("disabled"); suffixDisabled.push(t); }
      else { suffixEnabledCount++; suffixEnabled.push(t); }
    }
    els.suffixBank.append(...suffixEnabled, ...suffixDisabled);
    els.suffixCount.textContent = String(suffixEnabledCount);
  }

  function clearZone(zoneEl){ zoneEl.innerHTML = ""; }

  function renderZones(){
    clearZone(els.prefixZone);
    clearZone(els.baseZone);
    clearZone(els.suffixZone);

    if (current.prefix) els.prefixZone.appendChild(makeTile(current.prefix, "prefix"));
    if (current.base) els.baseZone.appendChild(makeTile(current.base, "base"));
    if (current.suffix) els.suffixZone.appendChild(makeTile(current.suffix, "suffix"));
  }

  function updateOutput(){
    if (!current.base){
      els.wordOut.textContent = "Choose a base word";
      els.meaningOut.textContent = "Then add a prefix or suffix to change the meaning.";
      if (current.prefix && current.suffix){
        els.statusOut.textContent = "Now choose a base word that works with both (enabled bases are valid).";
      } else if (current.prefix){
        els.statusOut.textContent = "Now choose a base word that works with this prefix (enabled bases are valid).";
      } else if (current.suffix){
        els.statusOut.textContent = "Now choose a base word that works with this suffix (enabled bases are valid).";
      } else {
        els.statusOut.textContent = "Only combinations that create real words are enabled.";
      }
      els.statusOut.className = "status warn";
      return;
    }

    if (current.prefix && redundantPrefix(current.prefix, current.base)){
      els.wordOut.textContent = computeWord(null, current.base, current.suffix);
      els.meaningOut.textContent = computeMeaning(null, current.base, current.suffix);
      els.statusOut.textContent = "That prefix is already in the base word, so it has been blocked.";
      els.statusOut.className = "status bad";
      return;
    }

    const w = computeWord(current.prefix, current.base, current.suffix);
    els.wordOut.textContent = w;
    els.meaningOut.textContent = computeMeaning(current.prefix, current.base, current.suffix);

    if (!current.prefix && !current.suffix){
      els.statusOut.textContent = "Add a prefix or suffix. Only real-word options are available.";
      els.statusOut.className = "status warn";
      return;
    }

    if (isRealWord(w)){
      els.statusOut.textContent = "Real word.";
      els.statusOut.className = "status ok";
    } else {
      els.statusOut.textContent = "Not a real word. Try a different part (enabled options are valid).";
      els.statusOut.className = "status bad";
    }
  }

  function selectionIsStillPossible(next){
    // No base yet: allow prefix/suffix selection if there exists at least one base that can work with the lock(s)
    if (!next.base){
      const lockedPrefix = next.prefix ? next.prefix : null;
      const lockedSuffix = next.suffix ? next.suffix : null;
      if (!lockedPrefix && !lockedSuffix) return true;
      const okBases = basesViableWithLocks(lockedPrefix, lockedSuffix);
      return okBases.size > 0;
    }

    // Base present: require that at least one real word is possible given locks
    if (next.prefix && redundantPrefix(next.prefix, next.base)) return false;
    if (next.prefix && !posCompatible(next.prefix, next.base)) return false;
    if (next.suffix && !posCompatible(next.suffix, next.base)) return false;

    const exact = computeWord(next.prefix, next.base, next.suffix);
    if ((next.prefix || next.suffix) && isRealWord(exact)) return true;

    const sets = possibleAffixesForBase(next.base, next.prefix || null, next.suffix || null);
    if (!next.prefix && !next.suffix) return isRealWord(next.base.form) || sets.possiblePrefixes.size > 0 || sets.possibleSuffixes.size > 0;
    if (next.prefix && !next.suffix) return sets.possibleSuffixes.size > 0 || isRealWord(computeWord(next.prefix, next.base, null));
    if (!next.prefix && next.suffix) return sets.possiblePrefixes.size > 0 || isRealWord(computeWord(null, next.base, next.suffix));
    return false;
  }

  function addToBuilder(type, item){
    const next = { ...current };

    if (type === "prefix"){
      next.prefix = item;

      // If base exists, keep compatibility strict
      if (next.base){
        if (!posCompatible(item, next.base)) return;
        if (redundantPrefix(item, next.base)) return;
      }

      if (!selectionIsStillPossible(next)) return;
    }

    if (type === "suffix"){
      next.suffix = item;

      if (next.base){
        if (!posCompatible(item, next.base)) return;
      }

      if (!selectionIsStillPossible(next)) return;
    }

    if (type === "base"){
      next.base = item;

      // Clear incompatible locks when base chosen
      if (next.prefix && (!posCompatible(next.prefix, next.base) || redundantPrefix(next.prefix, next.base))) next.prefix = null;
      if (next.suffix && !posCompatible(next.suffix, next.base)) next.suffix = null;

      if (!selectionIsStillPossible(next)) return;
    }

    current = next;
    renderAll();
  }

  function setupZone(zoneEl){
    zoneEl.addEventListener("dragover", (e) => { e.preventDefault(); zoneEl.classList.add("dragover"); });
    zoneEl.addEventListener("dragleave", () => zoneEl.classList.remove("dragover"));
    zoneEl.addEventListener("drop", (e) => {
      e.preventDefault();
      zoneEl.classList.remove("dragover");

      const payload = e.dataTransfer.getData("text/plain");
      if (!payload) return;

      let data;
      try { data = JSON.parse(payload); } catch { return; }

      const zoneType = zoneEl.dataset.zone;
      if (zoneType !== data.type) return;

      const item = BY_UID.get(data.uid);
      if (!item) return;

      // Block disabled drops using the same viability rules
      if (zoneType === "prefix" && !prefixViableGlobally(item)) return;
      if (zoneType === "suffix" && !suffixViableGlobally(item)) return;
      if (zoneType === "base" && !baseViableGivenCurrentLocks(item)) return;

      addToBuilder(zoneType, item);
    });

    zoneEl.addEventListener("dblclick", () => {
      const zoneType = zoneEl.dataset.zone;
      current[zoneType] = null;
      if (zoneType === "base"){
        // keep prefix/suffix locks if you want to keep filtering; if you want them cleared too, uncomment:
        // current.prefix = null;
        // current.suffix = null;
      }
      renderAll();
    });
  }

  function clearAll(){
    current = { prefix:null, base:null, suffix:null };
    renderAll();
  }

  function renderAll(){
    renderZones();
    renderBanks();
    updateOutput();
  }

  els.baseSearch.addEventListener("input", renderBanks);
  els.clearBtn.addEventListener("click", clearAll);

  setupZone(els.prefixZone);
  setupZone(els.baseZone);
  setupZone(els.suffixZone);

  clearAll();
  loadDictionary();
</script>
