  async function loadDictionary(){
    try{
      const res = await fetch("dictionary.txt", { cache:"no-store" });
      if (!res.ok) throw new Error("no dictionary");
      const text = await res.text();
      const set = new Set();
      for (const raw of text.split(/\r?\n/)){
        const w = raw.trim().toLowerCase();
        if (!w) continue;
        if (w.startsWith("#")) continue;
        set.add(w);
      }
      DICT_SET = set;
      dictLoaded = true;
      els.dictPill.textContent = `Word checker: dictionary.txt loaded (${set.size.toLocaleString()} words)`;
    } catch {
      DICT_SET = new Set(FALLBACK_ALLOWED_WORDS.map(x=>String(x).toLowerCase()));
      dictLoaded = false;
      els.dictPill.textContent = "Word checker: dictionary.txt not found (using small fallback list)";
    }
    renderAll();
  }

  function isRealWord(word){
    return !!word && DICT_SET.has(String(word).toLowerCase());
  }

  /* ===================== SPELLING + BUILD ===================== */

  function vowels(){ return new Set(["a","e","i","o","u"]); }

  function applySpellingRules(baseForm, suffixForm) {
    if (!suffixForm) return baseForm;
    const v = vowels();
    const last = baseForm.slice(-1).toLowerCase();
    const first = suffixForm.slice(0,1).toLowerCase();
    let out = baseForm;

    if (last === "e" && v.has(first)) out = baseForm.slice(0, -1);
    if (last === "y" && !v.has(first)) out = baseForm.slice(0, -1) + "i";
    return out;
  }

  function computeWord(prefixObj, baseObj, suffixObj) {
    if (!baseObj) return "";
    const p = prefixObj ? prefixObj.form : "";
    const b = baseObj.form;
    const s = suffixObj ? suffixObj.form : "";
    const bAdj = suffixObj ? applySpellingRules(b, s) : b;
    return (p + bAdj + s).toLowerCase();
  }

  function computeMeaning(prefixObj, baseObj, suffixObj) {
    if (!baseObj) return "";
    const parts = [];
    if (prefixObj) parts.push(prefixObj.meaning);
    parts.push(baseObj.meaning);
    if (suffixObj) parts.push(suffixObj.meaning);
    return parts.join(" + ");
  }

  function posCompatible(affixObj, baseObj){
    if (!affixObj || !baseObj) return false;
    const basePos = new Set(baseObj.pos || []);
    return (affixObj.allowedPos || []).some(p => basePos.has(p));
  }

  // Block prefixes that are already at the start of the base (con+construct, inter+interact, re+review)
  function redundantPrefix(prefixObj, baseObj){
    if (!prefixObj || !baseObj) return false;
    const p = (prefixObj.form || "").toLowerCase();
    const b = (baseObj.form || "").toLowerCase();
    return !!p && !!b && b.startsWith(p);
  }

  /* ===================== CORE: "DOES THERE EXIST A REAL WORD?" ===================== */
  // Any of prefix/base/suffix can be:
  // - a specific object (locked)
  // - null (meaning "none")
  // - undefined (meaning "wildcard / anything")
  //
  // Example:
  // existsReal({ prefix: somePrefix, base: undefined, suffix: undefined })
  // -> is there ANY base and ANY suffix that makes a real word with that prefix?

  function existsReal({ prefix, base, suffix }){
    const prefixChoices =
      prefix === undefined ? [null, ...ALL_PREFIXES]
      : [prefix];

    const baseChoices =
      base === undefined ? ALL_BASES
      : [base];

    const suffixChoices =
      suffix === undefined ? [null, ...ALL_SUFFIXES]
      : [suffix];

    for (const b of baseChoices){
      if (!b) continue;

      for (const p of prefixChoices){
        if (p){
          if (!posCompatible(p, b)) continue;
          if (redundantPrefix(p, b)) continue;
        }
        for (const s of suffixChoices){
          if (s){
            if (!posCompatible(s, b)) continue;
          }
          const w = computeWord(p, b, s);
          if (isRealWord(w)) return true;
        }
      }
    }
    return false;
  }

  /* ===================== VIABILITY FOR EACH BANK ITEM (depends on current state) ===================== */

  function baseIsEnabled(b){
    // must allow base alone OR base with current locks
    // if a prefix is chosen, base must work with that prefix
    // if a suffix is chosen, base must work with that suffix
    const pLock = current.prefix ?? undefined;
    const sLock = current.suffix ?? undefined;

    // Allow base alone only if it's a real word
    if (!current.prefix && !current.suffix && isRealWord(b.form)) return true;

    // Otherwise: must exist at least one real completion consistent with locks
    return existsReal({ prefix: pLock, base: b, suffix: sLock });
  }

  function prefixIsEnabled(p){
    // If base exists: must be compatible with base and must allow a real word (with current suffix lock)
    if (current.base){
      if (!posCompatible(p, current.base)) return false;
      if (redundantPrefix(p, current.base)) return false;
      const sLock = current.suffix ?? undefined;
      return existsReal({ prefix: p, base: current.base, suffix: sLock });
    }

    // No base yet: prefix must be able to make at least one real word with SOME base and SOME suffix
    return existsReal({ prefix: p, base: undefined, suffix: undefined });
  }

  function suffixIsEnabled(s){
    if (current.base){
      if (!posCompatible(s, current.base)) return false;
      const pLock = current.prefix ?? undefined;
      // (If prefix chosen, redundancy is handled inside existsReal via redundantPrefix)
      return existsReal({ prefix: pLock, base: current.base, suffix: s });
    }

    // No base yet: suffix must be able to make at least one real word with SOME base (and maybe some prefix)
    return existsReal({ prefix: undefined, base: undefined, suffix: s });
  }

  /* ===================== UI BUILDERS ===================== */

  function makeTile(item, type, enabled){
    const div = document.createElement("div");
    div.className = "tile" + (enabled ? "" : " disabled");
    div.draggable = enabled;

    div.dataset.uid = item.uid;
    div.dataset.type = type;

    const form = document.createElement("div");
    form.className = "form";
    form.textContent = item.form;

    const meaning = document.createElement("div");
    meaning.className = "meaning";
    meaning.textContent = item.meaning || "";

    const meta = document.createElement("div");
    meta.className = "meta";
    if (type === "base") meta.textContent = `base (${(item.pos||[]).join(", ")})`;
    if (type === "prefix") meta.textContent = "prefix";
    if (type === "suffix") meta.textContent = `suffix${item.hint ? " • " + item.hint : ""}`;

    div.append(form, meaning, meta);

    div.addEventListener("click", () => {
      if (!enabled) return;
      addToBuilder(type, item);
    });

    div.addEventListener("dragstart", (e) => {
      if (!enabled) { e.preventDefault(); return; }
      e.dataTransfer.setData("text/plain", JSON.stringify({ type, uid: item.uid }));
    });

    return div;
  }

  function renderBanks(){
    els.prefixBank.innerHTML = "";
    els.baseBank.innerHTML = "";
    els.suffixBank.innerHTML = "";

    // Bases filtered by search
    const q = (els.baseSearch.value || "").trim().toLowerCase();
    const basesFiltered = ALL_BASES
      .filter(b => !q || b.form.toLowerCase().includes(q))
      .sort((a,b)=>a.form.localeCompare(b.form));

    // Bases: enabled float to top
    const baseEnabled = [];
    const baseDisabled = [];
    for (const b of basesFiltered){
      const enabled = baseIsEnabled(b);
      const t = makeTile(b, "base", enabled);
      (enabled ? baseEnabled : baseDisabled).push(t);
    }
    els.baseBank.append(...baseEnabled, ...baseDisabled);
    els.baseCount.textContent = String(baseEnabled.length);

    // Prefixes: enabled float to top
    const prefixEnabled = [];
    const prefixDisabled = [];
    for (const p of ALL_PREFIXES){
      const enabled = prefixIsEnabled(p);
      const t = makeTile(p, "prefix", enabled);
      (enabled ? prefixEnabled : prefixDisabled).push(t);
    }
    els.prefixBank.append(...prefixEnabled, ...prefixDisabled);
    els.prefixCount.textContent = String(prefixEnabled.length);

    // Suffixes: enabled float to top
    const suffixEnabled = [];
    const suffixDisabled = [];
    for (const s of ALL_SUFFIXES){
      const enabled = suffixIsEnabled(s);
      const t = makeTile(s, "suffix", enabled);
      (enabled ? suffixEnabled : suffixDisabled).push(t);
    }
    els.suffixBank.append(...suffixEnabled, ...suffixDisabled);
    els.suffixCount.textContent = String(suffixEnabled.length);
  }

      return;
    }

    if (current.prefix && redundantPrefix(current.prefix, current.base)){
      els.wordOut.textContent = computeWord(null, current.base, current.suffix);
      els.meaningOut.textContent = computeMeaning(null, current.base, current.suffix);
      els.statusOut.textContent = "That prefix is already in the base word, so it is blocked.";
      els.statusOut.className = "status bad";
      return;
    }

    const w = computeWord(current.prefix, current.base, current.suffix);
    els.wordOut.textContent = w;
    els.meaningOut.textContent = computeMeaning(current.prefix, current.base, current.suffix);

    if (!current.prefix && !current.suffix){
      els.statusOut.textContent = "Now add a prefix or suffix. Only real-word options are enabled.";
      els.statusOut.className = "status warn";
      return;
    }

    if (isRealWord(w)){
      els.statusOut.textContent = "Real word.";
      els.statusOut.className = "status ok";
    } else {
      els.statusOut.textContent = "Not a real word. Try an enabled option.";
      els.statusOut.className = "status bad";
    }
  }

  function renderAll(){
    renderZones();
    renderBanks();
    updateOutput();
  }

  /* ===================== BUILDER UPDATES ===================== */

  function addToBuilder(type, item){
    const next = { ...current };

    if (type === "prefix"){
      next.prefix = item;
      // If base already chosen and prefix becomes redundant, block it
      if (next.base && redundantPrefix(next.prefix, next.base)) return;

      // If base exists but POS incompatible, block it
      if (next.base && !posCompatible(next.prefix, next.base)) return;

      // If base exists, ensure at least one real completion exists with current suffix lock
      if (next.base){
        const sLock = next.suffix ?? undefined;
        if (!existsReal({ prefix: next.prefix, base: next.base, suffix: sLock })) return;
      }
    }

    if (type === "suffix"){
      next.suffix = item;
      if (next.base && !posCompatible(next.suffix, next.base)) return;

      if (next.base){
        const pLock = next.prefix ?? undefined;
        if (!existsReal({ prefix: pLock, base: next.base, suffix: next.suffix })) return;
      }
    }

    if (type === "base"){
      next.base = item;

      // Clear incompatible prefix/suffix when base changes
      if (next.prefix){
        if (!posCompatible(next.prefix, next.base) || redundantPrefix(next.prefix, next.base)) next.prefix = null;
      }
      if (next.suffix){
        if (!posCompatible(next.suffix, next.base)) next.suffix = null;
      }

      // Ensure the base works with current locks
      const pLock = next.prefix ?? undefined;
      const sLock = next.suffix ?? undefined;

      // base is allowed if it can form at least one real word given locks, OR base alone is real and no locks
      const baseOk =
        (!next.prefix && !next.suffix && isRealWord(next.base.form)) ||
        existsReal({ prefix: pLock, base: next.base, suffix: sLock });

      if (!baseOk) return;
    }

    current = next;
    renderAll();
  }

  /* ===================== DRAG/DROP ZONES + CLEAR ===================== */

  function setupZone(zoneEl){
    zoneEl.addEventListener("dragover", (e) => { e.preventDefault(); zoneEl.classList.add("dragover"); });
    zoneEl.addEventListener("dragleave", () => zoneEl.classList.remove("dragover"));
    zoneEl.addEventListener("drop", (e) => {
      e.preventDefault();
      zoneEl.classList.remove("dragover");

      const payload = e.dataTransfer.getData("text/plain");
      if (!payload) return;

      let data;
      try { data = JSON.parse(payload); } catch { return; }

      const zoneType = zoneEl.dataset.zone;
      if (zoneType !== data.type) return;

      const item = BY_UID.get(data.uid);
      if (!item) return;

      // Only allow if enabled by current rules
      if (zoneType === "prefix" && !prefixIsEnabled(item)) return;
      if (zoneType === "suffix" && !suffixIsEnabled(item)) return;
      if (zoneType === "base" && !baseIsEnabled(item)) return;

      addToBuilder(zoneType, item);
    });

    zoneEl.addEventListener("dblclick", () => {
      const zoneType = zoneEl.dataset.zone;
      current[zoneType] = null;
      if (zoneType === "base"){
        current.prefix = null;
        current.suffix = null;
      }
      renderAll();
    });
  }

  function clearAll(){
    current = { prefix:null, base:null, suffix:null };
    renderAll();
  }

  /* ===================== EVENTS ===================== */

  els.baseSearch.addEventListener("input", () => renderBanks());
  els.clearBtn.addEventListener("click", clearAll);

  setupZone(els.prefixZone);
  setupZone(els.baseZone);
  setupZone(els.suffixZone);

  /* ===================== INIT ===================== */

  clearAll();
  loadDictionary();

})();
</script>
