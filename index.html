<script>
document.addEventListener("DOMContentLoaded", () => {

/* ===================== DATA ===================== */

const PREFIXES = [
  { id:"anti", form:"anti", meaning:"against" },
  { id:"con", form:"con", meaning:"with or together" },
  { id:"de", form:"de", meaning:"undo; remove" },
  { id:"dis", form:"dis", meaning:"not; opposite" },
  { id:"in", form:"in", meaning:"not; into" },
  { id:"inter", form:"inter", meaning:"between" },
  { id:"mis", form:"mis", meaning:"wrong" },
  { id:"non", form:"non", meaning:"not" },
  { id:"over", form:"over", meaning:"too much" },
  { id:"pre", form:"pre", meaning:"before" },
  { id:"re", form:"re", meaning:"again" },
  { id:"sub", form:"sub", meaning:"under" },
  { id:"trans", form:"trans", meaning:"across" },
  { id:"un", form:"un", meaning:"not" }
];

const SUFFIXES = [
  { id:"s", form:"s", meaning:"plural" },
  { id:"ed", form:"ed", meaning:"past tense" },
  { id:"ing", form:"ing", meaning:"happening now" },
  { id:"er", form:"er", meaning:"person who" },
  { id:"est", form:"est", meaning:"most" },
  { id:"able", form:"able", meaning:"able to" },
  { id:"ful", form:"ful", meaning:"full of" },
  { id:"less", form:"less", meaning:"without" },
  { id:"ly", form:"ly", meaning:"in a way" },
  { id:"ment", form:"ment", meaning:"result of action" },
  { id:"ness", form:"ness", meaning:"state of" },
  { id:"ion", form:"ion", meaning:"act or result" }
];

const BASES = [
  "act","appear","apply","build","care","connect","construct","create","develop",
  "educate","employ","help","inform","organise","predict","prepare","protect",
  "react","reduce","respect","review","support","use"
].map(w => ({ id:w, form:w }));

/* ===================== DOM ===================== */

const els = {
  prefixBank: document.getElementById("prefixBank"),
  baseBank: document.getElementById("baseBank"),
  suffixBank: document.getElementById("suffixBank"),
  prefixCount: document.getElementById("prefixCount"),
  baseCount: document.getElementById("baseCount"),
  suffixCount: document.getElementById("suffixCount"),
  prefixZone: document.getElementById("prefixZone"),
  baseZone: document.getElementById("baseZone"),
  suffixZone: document.getElementById("suffixZone"),
  wordOut: document.getElementById("wordOut"),
  meaningOut: document.getElementById("meaningOut"),
  statusOut: document.getElementById("statusOut"),
  clearBtn: document.getElementById("clearBtn"),
  dictPill: document.getElementById("dictPill")
};

/* ===================== STATE ===================== */

let current = { prefix:null, base:null, suffix:null };
let DICT = new Set();

/* ===================== DICTIONARY ===================== */

fetch("dictionary.txt")
  .then(r => r.text())
  .then(t => {
    t.split(/\r?\n/).forEach(w => DICT.add(w.trim().toLowerCase()));
    els.dictPill.textContent = `Word checker: ${DICT.size.toLocaleString()} words loaded`;
    renderAll();
  })
  .catch(() => {
    els.dictPill.textContent = "Word checker: dictionary not found";
    renderAll();
  });

function isReal(word){
  return DICT.has(word.toLowerCase());
}

/* ===================== WORD LOGIC ===================== */

function redundantPrefix(p, b){
  return b.startsWith(p);
}

function applySpelling(base, suffix){
  if (!suffix) return base;
  if (base.endsWith("e") && /^[aeiou]/.test(suffix)) return base.slice(0,-1);
  if (base.endsWith("y") && !/^[aeiou]/.test(suffix)) return base.slice(0,-1)+"i";
  return base;
}

function buildWord(p,b,s){
  if (!b) return "";
  const baseAdj = s ? applySpelling(b, s) : b;
  return `${p||""}${baseAdj}${s||""}`;
}

/* ===================== VIABILITY ===================== */

function baseWorks(b){
  for (const p of [null, ...PREFIXES]){
    if (p && redundantPrefix(p.form, b.form)) continue;
    for (const s of [null, ...SUFFIXES]){
      if (isReal(buildWord(p?.form, b.form, s?.form))) return true;
    }
  }
  return false;
}

function prefixWorks(p){
  for (const b of BASES){
    if (redundantPrefix(p.form, b.form)) continue;
    for (const s of [null, ...SUFFIXES]){
      if (isReal(buildWord(p.form, b.form, s?.form))) return true;
    }
  }
  return false;
}

function suffixWorks(s){
  for (const b of BASES){
    for (const p of [null, ...PREFIXES]){
      if (p && redundantPrefix(p.form, b.form)) continue;
      if (isReal(buildWord(p?.form, b.form, s.form))) return true;
    }
  }
  return false;
}

/* ===================== UI ===================== */

function makeTile(obj,type){
  const d = document.createElement("div");
  d.className = "tile";
  d.innerHTML = `<div class="form">${obj.form}</div><div class="meaning">${obj.meaning||""}</div>`;
  d.onclick = () => add(type,obj);
  return d;
}

function renderBank(list, worksFn, el, countEl, type){
  el.innerHTML="";
  let enabled=[], disabled=[];
  for (const o of list){
    const t = makeTile(o,type);
    if (!worksFn(o)){
      t.classList.add("disabled");
      disabled.push(t);
    } else enabled.push(t);
  }
  el.append(...enabled, ...disabled);
  countEl.textContent = enabled.length;
}

function renderBanks(){
  renderBank(PREFIXES, prefixWorks, els.prefixBank, els.prefixCount, "prefix");
  renderBank(BASES, baseWorks, els.baseBank, els.baseCount, "base");
  renderBank(SUFFIXES, suffixWorks, els.suffixBank, els.suffixCount, "suffix");
}

function renderZones(){
  els.prefixZone.innerHTML = current.prefix ? makeTile(current.prefix,"prefix").outerHTML : "";
  els.baseZone.innerHTML = current.base ? makeTile(current.base,"base").outerHTML : "";
  els.suffixZone.innerHTML = current.suffix ? makeTile(current.suffix,"suffix").outerHTML : "";
}

function renderOutput(){
  if (!current.base){
    els.wordOut.textContent = "Choose a base word";
    els.meaningOut.textContent = "";
    els.statusOut.textContent = "";
    return;
  }
  const w = buildWord(current.prefix?.form, current.base.form, current.suffix?.form);
  els.wordOut.textContent = w;
  els.statusOut.textContent = isReal(w) ? "Real word" : "Not a real word";
}

function renderAll(){
  renderBanks();
  renderZones();
  renderOutput();
}

/* ===================== INTERACTION ===================== */

function add(type,obj){
  if (type==="prefix") current.prefix=obj;
  if (type==="base") current.base=obj;
  if (type==="suffix") current.suffix=obj;
  renderAll();
}

els.clearBtn.onclick = () => {
  current={prefix:null,base:null,suffix:null};
  renderAll();
};

});
</script>
