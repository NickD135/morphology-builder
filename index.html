<script>
document.addEventListener("DOMContentLoaded", () => {

  /* -------------------- MORPHEMES -------------------- */

  // REPLACE your current PREFIXES array with this updated one
  // (Everything is the same as yours, but adds SUB + OB with assimilation options)
  const PREFIXES = [
    { id:"ad", form:"ad", meaning:"towards; to", allowedPos:["noun","adj","verb"], altForms:["ac","af","al","ap","as","at"] },

    { id:"anti", form:"anti", meaning:"against", allowedPos:["noun","adj","verb"] },
    { id:"con", form:"con", meaning:"with or together", allowedPos:["noun","adj","verb"], altForms:["com","col","cor"] },
    { id:"contra", form:"contra", meaning:"against; opposite", allowedPos:["noun","adj","verb"] },
    { id:"de", form:"de", meaning:"undo; remove; down", allowedPos:["verb"] },
    { id:"dis", form:"dis", meaning:"not; opposite; apart", allowedPos:["noun","adj","verb"] },
    { id:"en", form:"en", meaning:"cause to; make", allowedPos:["verb"] },
    { id:"em", form:"em", meaning:"cause to; make", allowedPos:["verb"] },
    { id:"ex", form:"ex", meaning:"out of; former", allowedPos:["noun","adj"] },
    { id:"e", form:"e", meaning:"electronic; online", allowedPos:["noun","adj"] },
    { id:"extra", form:"extra", meaning:"beyond", allowedPos:["noun","adj"] },
    { id:"fore", form:"fore", meaning:"before", allowedPos:["noun","adj"] },
    { id:"hyper", form:"hyper", meaning:"over; excessive", allowedPos:["adj","noun"] },

    { id:"in", form:"in", meaning:"not; into", allowedPos:["adj","verb"], altForms:["im","il","ir"] },

    { id:"inter", form:"inter", meaning:"between", allowedPos:["noun","adj","verb"] },
    { id:"mal", form:"mal", meaning:"bad", allowedPos:["noun","adj"] },
    { id:"mega", form:"mega", meaning:"large", allowedPos:["noun","adj"] },
    { id:"micro", form:"micro", meaning:"small", allowedPos:["noun","adj"] },
    { id:"mid", form:"mid", meaning:"middle", allowedPos:["noun","adj"] },
    { id:"mis", form:"mis", meaning:"wrong", allowedPos:["verb"] },
    { id:"multi", form:"multi", meaning:"many", allowedPos:["noun","adj"] },
    { id:"non", form:"non", meaning:"not", allowedPos:["noun","adj"] },

    // NEW: ob assimilation set
    { id:"ob", form:"ob", meaning:"towards; against", allowedPos:["noun","adj","verb"], altForms:["oc","of","op"] },

    { id:"over", form:"over", meaning:"too much", allowedPos:["verb","adj"] },
    { id:"post", form:"post", meaning:"after", allowedPos:["noun","adj"] },
    { id:"pre", form:"pre", meaning:"before", allowedPos:["noun","adj","verb"] },
    { id:"pro", form:"pro", meaning:"in favour of; forward", allowedPos:["noun","adj"] },
    { id:"re", form:"re", meaning:"again", allowedPos:["verb"] },
    { id:"semi", form:"semi", meaning:"half", allowedPos:["noun","adj"] },

    // UPDATED: sub now includes assimilation options (your rule engine will handle it)
    { id:"sub", form:"sub", meaning:"under", allowedPos:["noun","adj","verb"], altForms:["suc","suf","sug","sup","sur"] },

    { id:"super", form:"super", meaning:"above; beyond", allowedPos:["noun","adj","verb"] },
    { id:"trans", form:"trans", meaning:"across", allowedPos:["noun","adj","verb"] },
    { id:"un", form:"un", meaning:"not", allowedPos:["adj","verb"] },
    { id:"under", form:"under", meaning:"below", allowedPos:["noun","adj","verb"] },
    { id:"a", form:"a", meaning:"not; without", allowedPos:["adj","noun"] }
  ];

  /* -------------------- PREFIX RULES -------------------- */

  // FIND your existing applyPrefixRulesDetailed(prefixForm, baseForm) function,
  // and INSIDE it add the two new blocks below.
  // Place them AFTER your con/en blocks (or anywhere before the final default return).

  function applyPrefixRulesDetailed(prefixForm, baseForm){
    const prefix = String(prefixForm || "");
    const base = String(baseForm || "");
    if (!prefix || !base){
      return { prefixBefore: prefix, prefixAfter: prefix, base, ruleId: null, ruleText: null, stepsHtml: "" };
    }

    const p = prefix.toLowerCase();
    const first = base[0]?.toLowerCase() || "";

    // ...KEEP your existing ad / in / con / en rules above this line...

    // NEW: sub- assimilation: sub + c -> suc; + f -> suf; + g -> sug; + p -> sup; + r -> sur
    if (p === "sub"){
      const map = { c:"suc", f:"suf", g:"sug", p:"sup", r:"sur" };
      if (map[first]){
        const prefixAfter = map[first];
        return {
          prefixBefore: prefix,
          prefixAfter,
          base,
          ruleId: "sub_assim",
          ruleText: `Prefix rule: sub can change to ${prefixAfter} before ${first} to make pronunciation easier (sub + ${base} → ${prefixAfter}${base}).`,
          stepsHtml: `<span class='hlChange'>sub</span><span class='hlAdd'> + </span>${base} <span class='hlAdd'>→</span> <span class='hlChange'>${prefixAfter}</span>${base}`
        };
      }
      return {
        prefixBefore: prefix,
        prefixAfter: prefix,
        base,
        ruleId: "sub_no_change",
        ruleText: "Prefix rule: no sound change needed for sub.",
        stepsHtml: `${prefix}<span class='hlAdd'> + </span>${base} <span class='hlAdd'>→</span> ${prefix}${base}`
      };
    }

    // NEW: ob- assimilation: ob + c -> oc; + f -> of; + p -> op
    if (p === "ob"){
      const map = { c:"oc", f:"of", p:"op" };
      if (map[first]){
        const prefixAfter = map[first];
        return {
          prefixBefore: prefix,
          prefixAfter,
          base,
          ruleId: "ob_assim",
          ruleText: `Prefix rule: ob can change to ${prefixAfter} before ${first} to make pronunciation easier (ob + ${base} → ${prefixAfter}${base}).`,
          stepsHtml: `<span class='hlChange'>ob</span><span class='hlAdd'> + </span>${base} <span class='hlAdd'>→</span> <span class='hlChange'>${prefixAfter}</span>${base}`
        };
      }
      return {
        prefixBefore: prefix,
        prefixAfter: prefix,
        base,
        ruleId: "ob_no_change",
        ruleText: "Prefix rule: no sound change needed for ob.",
        stepsHtml: `${prefix}<span class='hlAdd'> + </span>${base} <span class='hlAdd'>→</span> ${prefix}${base}`
      };
    }

    // ...KEEP your existing final default return below this line...
  }

  // rest of your code continues...
});
</script>
