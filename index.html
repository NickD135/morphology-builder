<script>
document.addEventListener("DOMContentLoaded", () => {

const PREFIXES = [...];   // KEEP YOUR EXISTING PREFIXES ARRAY
const SUFFIXES = [...];   // KEEP YOUR EXISTING SUFFIXES ARRAY
const BASES = [...];      // KEEP YOUR EXISTING BASES ARRAY
const FALLBACK_ALLOWED_WORDS = [...]; // KEEP YOUR EXISTING FALLBACK LIST

const ALL_PREFIXES = PREFIXES.map(p => ({...p, uid:"prefix:"+p.id}));
const ALL_SUFFIXES = SUFFIXES.map(s => ({...s, uid:"suffix:"+s.id}));
const ALL_BASES = BASES.map(b => ({...b, uid:"base:"+b.id}));

const BY_UID = new Map();
[...ALL_PREFIXES, ...ALL_SUFFIXES, ...ALL_BASES].forEach(x => BY_UID.set(x.uid, x));

const els = {
  dictPill: document.getElementById("dictPill"),
  clearBtn: document.getElementById("clearBtn"),
  baseSearch: document.getElementById("baseSearch"),
  prefixBank: document.getElementById("prefixBank"),
  baseBank: document.getElementById("baseBank"),
  suffixBank: document.getElementById("suffixBank"),
  prefixCount: document.getElementById("prefixCount"),
  baseCount: document.getElementById("baseCount"),
  suffixCount: document.getElementById("suffixCount"),
  prefixZone: document.getElementById("prefixZone"),
  baseZone: document.getElementById("baseZone"),
  suffixZone: document.getElementById("suffixZone"),
  wordOut: document.getElementById("wordOut"),
  meaningOut: document.getElementById("meaningOut"),
  statusOut: document.getElementById("statusOut")
};

let current = { prefix:null, base:null, suffix:null };

let DICT = new Set();

async function loadDictionary(){
  try{
    const res = await fetch("dictionary.txt", {cache:"no-store"});
    const text = await res.text();
    text.split(/\r?\n/).forEach(w=>{
      w=w.trim().toLowerCase();
      if(w) DICT.add(w);
    });
    els.dictPill.textContent = `Word checker: ${DICT.size.toLocaleString()} words`;
  }catch{
    FALLBACK_ALLOWED_WORDS.forEach(w=>DICT.add(w.toLowerCase()));
    els.dictPill.textContent = "Word checker: fallback list";
  }
  renderAll();
}

const vowels = new Set(["a","e","i","o","u"]);

function applySpelling(base, suffix){
  if(!suffix) return base;
  const last = base.slice(-1);
  const first = suffix[0];
  if(last==="e" && vowels.has(first)) return base.slice(0,-1);
  if(last==="y" && !vowels.has(first)) return base.slice(0,-1)+"i";
  return base;
}

function redundantPrefix(p,b){
  return b.form.toLowerCase().startsWith(p.form.toLowerCase());
}

function isReal(w){ return DICT.has(w.toLowerCase()); }

function computeWord(p,b,s){
  if(!b) return "";
  const baseAdj = s ? applySpelling(b.form, s.form) : b.form;
  return `${p?p.form:""}${baseAdj}${s?s.form:""}`.toLowerCase();
}

function existsReal({prefix,base,suffix}){
  const bases = base?[base]:ALL_BASES;
  const prefixes = prefix?[prefix]:[null,...ALL_PREFIXES];
  const suffixes = suffix?[suffix]:[null,...ALL_SUFFIXES];

  for(const b of bases){
    for(const p of prefixes){
      if(p && redundantPrefix(p,b)) continue;
      for(const s of suffixes){
        const w = computeWord(p,b,s);
        if(isReal(w)) return true;
      }
    }
  }
  return false;
}

function computeViable(){
  const vP=new Set(), vB=new Set(), vS=new Set();

  ALL_BASES.forEach(b=>{
    if(existsReal({prefix:current.prefix, base:b, suffix:current.suffix}))
      vB.add(b.uid);
  });

  ALL_PREFIXES.forEach(p=>{
    if(existsReal({prefix:p, base:current.base, suffix:current.suffix}))
      vP.add(p.uid);
  });

  ALL_SUFFIXES.forEach(s=>{
    if(existsReal({prefix:current.prefix, base:current.base, suffix:s}))
      vS.add(s.uid);
  });

  return {vP,vB,vS};
}

function tile(item,type){
  const d=document.createElement("div");
  d.className="tile";
  d.textContent=item.form;
  d.onclick=()=>{
    if(d.classList.contains("disabled")) return;
    current[type]=item;
    if(type==="base"){
      if(current.prefix && redundantPrefix(current.prefix,item)) current.prefix=null;
    }
    renderAll();
  };
  return d;
}

function renderBanks(){
  const {vP,vB,vS}=computeViable();

  els.prefixBank.innerHTML="";
  els.baseBank.innerHTML="";
  els.suffixBank.innerHTML="";

  const bases=[...ALL_BASES].sort((a,b)=>a.form.localeCompare(b.form));
  bases.forEach(b=>{
    const t=tile(b,"base");
    if(!vB.has(b.uid)) t.classList.add("disabled");
    els.baseBank.appendChild(t);
  });
  els.baseCount.textContent=vB.size;

  ALL_PREFIXES.forEach(p=>{
    const t=tile(p,"prefix");
    if(!vP.has(p.uid)) t.classList.add("disabled");
    els.prefixBank.appendChild(t);
  });
  els.prefixCount.textContent=vP.size;

  ALL_SUFFIXES.forEach(s=>{
    const t=tile(s,"suffix");
    if(!vS.has(s.uid)) t.classList.add("disabled");
    els.suffixBank.appendChild(t);
  });
  els.suffixCount.textContent=vS.size;
}

function renderZones(){
  els.prefixZone.innerHTML=current.prefix?current.prefix.form:"";
  els.baseZone.innerHTML=current.base?current.base.form:"";
  els.suffixZone.innerHTML=current.suffix?current.suffix.form:"";
}

function renderOutput(){
  if(!current.base){
    els.wordOut.textContent="Choose a base word";
    els.statusOut.textContent="";
    return;
  }
  const w=computeWord(current.prefix,current.base,current.suffix);
  els.wordOut.textContent=w;
  els.statusOut.textContent=isReal(w)?"Real word":"";
}

function renderAll(){
  renderBanks();
  renderZones();
  renderOutput();
}

els.clearBtn.onclick=()=>{
  current={prefix:null,base:null,suffix:null};
  renderAll();
};

loadDictionary();
});
</script>
